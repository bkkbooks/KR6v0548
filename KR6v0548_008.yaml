月影上遲遲空山無迹吾來往異日相逢在水湄紫雲洞寄隱和尚何九真也曾覿面法王前巖畔飛花二月天一吼可聾三日耳亂山何處石能眠附逸事附逸事者志奇也備考也因其備而考之烏乎奇即有奇而志之亦政無容奇也凡物之可久者靈則後應事之可大者機必先兆千秋不易之理也而人多以為奇者聞見寡耳然則風雷震虩草木芽榮獨非聞見之常乎倘從來無有是事一旦突起于寰間寧不駭然共訝之以為奇哉閲茲編者當作如是觀古佛示瑞共三尊銅身鐵座高有四尺鑄造不知何年月係鎮東衛莊真南所施後因詔各處郡邑搜銅鑄錢時里耆報之柳邑遂令舁進藏于庫中以候解送未及一年庫中每放光衆驚疑以為火發近視之則無有焉邑令愕然曰此必古佛示瑞也乃啓庫發出舁還本寺今崇于藏經閣之下靈湫顯異黃檗在清遠里去縣治西南三十五里石壁峭立飛泉如瀑布循崖懸空而下瀦為雨潭遇旱禱雨輒應宋元符二年安撫程邁禱而應為立龍堂宣和二年攝邑陳麟再立祠淳熙元年安撫史浩復增飭之朝奉郎徐師仁為之記獎之刻詩于石上有汋亭咸淳丙寅倉使劉震孫改名九淵第一夷堅志云黃檗在福清南三十八里山頂有龍潭從石穴間成一穴直下無底潭口闊可五丈寺僧曰此福德龍也常行雨歸多聞天樂或于雲霧中隱隱見盤花對舞泉州僧慶元聞而悅之與徒數十人至潭焚香默禱且誦白傘真言願睹其狀先取楮鏹投水中即有自下引之者倏然而沒固已駭之矣時方白晝有黑雲如扇起頃之蔽空對面不相識徐徐睹一物起潭中類蓮花莖柄皆赤色繼而雙眼如日耀采射人突起其上諸僧驚怪急奔下山雷雨已隨其後移時乃止其龍汋亭及詩記今不復見右載在縣志巨蟒神蹤晉安逸志云唐僖宗時山有巨蟒為祟邑人劉孫禮妹三娘姿色妖艷蟒攝入洞中為妻孫禮不勝忿恚誓必死之遂棄家遠遊得遇異人授以驅雷祕法歸與蟒鬬是時其妹已生十一子孫禮殺其八妹奔出再拜為蟒請命孫禮乃止後三子為神曰九使十使十一使閩中往往立廟祀之今吉祥峰下亦有九使神宮五音鱷石狀似鱷魚叩有五音後值倭變物不復存焉九龍古樹距寺數百武植于甬道之右即木橋下溪邊也唐廣明間巢寇入山鴻休師遇害于此事著前篇其樹約高八九丈蜿蜒屈曲勢若虬龍下垂九根于地突兀蒼古因號為九龍樹今廢鄭渚金聲黃檗鄭渚田詳前嘉靖末其田復陷為鹹滷盡落民間厥後鄉民輒修輒壞夜聞壞處往往有金鼓震擊之聲疑是本山迦藍所司嵩岩香乳佛座有嵩頭陀巖出乳香于石罅間以手指揑之香經日不散祥雲現瑞萬曆戊申歲九日慶雲現于黃檗佛座峰林大啓詩有凝成五彩諸天麗之句甲寅秋夜復現于山之西爛熳如錦觀者不知何祥數日後聞請藏經命下矣林伯春作祥雲歌志喜歌曰雲何祥兮縵西方兮瑞徵龍藏寵錫將兮山寺荒涼喜生光兮佛日輝煌永劫長兮又曰綵雲爛兮橫檗山絢日光兮影塵寰明君賢相之所關太史瞻之動聖顏魏公勳業滿人間戊子季夏望日師與客會拱橋忽然天際流輝仰而觀之五彩文明謂客曰此卿雲也斯日嘉會天有瑞氣之兆異時必有禎祥之應因作歌志之曰陰陽調和兮瑞物生師資契會兮學業成中外一如兮禪林振主賓唱和兮大道行慶雲爛縵兮瑞氣之所鍾佛日長懸兮吾皇之德明春畦法雨崇禎庚午季春草七日農民方以旱魃為虐田龜水涸焦逼無奈適密雲和尚飛錫南來到黎灣黑雲忽起大雨隨至田得耕插遠近共慶咸傳為法雨云卓冠詩有妙雲欲覆槃海法雨先滋熱惱田之句彩泥示現壬午仲夏塑大佛將畢欲上細泥遍尋烏有一日驟雨狂發奔流異常午後雨止師溯流覽勝至藏角小澗處祥光映日細觀五彩之泥瑩潤可愛碾如粉末令佛師取之上三尊訖其泥隱矣大衆嘆奇師曰佛之福緣不可思議何奇之有囑侍者記之以曉將來白光貫頂壬午臘旦大佛功成佛師萬象先自入閩中以此功德大獲如意遂受菩薩圓滿大戒朝昏竭誠如法修懺至第八早入毗盧閣中忽見大殿頂上白毫光圓如蓋逾時乃散自慶弗勝入室白師師曰此是誠心所致感應道交白業已成戒法圓滿吾為汝喜益見佛不汝欺也隱祖靈迹隱元祖師順治甲午十一年日本國主請行化彼處番舶啓行風浪大作祖書免參二字貼船首此浪遂平時有巨鱗數萬護舟出洋而散舟夜抵其國海外漁人咸見岸上紅光亘天以為失火各操船來援及將近光隱矣始知祖之瑞光發現也遠州信宦嘗奉祖手書觀音佛號偶遭回祿舍宅俱盡獨祖筆迹如故特來禮覲祖示以偈有真名火不燒之句雍正初年日本大疫流行獲祖真迹懸於中堂則無恙國主繪像於宮中供祀
