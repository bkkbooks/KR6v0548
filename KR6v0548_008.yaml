body:
  text: 重興隆琦隱元祖師原本門弟子性幽獨往等編訂續修監寺道昱道升道本宗儀開滋永悅副寺惠秀舜普永施同靜寺宗堂宗愷德科傳圖華懺常澄紹仁本岐紹修校刊釋詩偈觀葉相國詩扁次韻密雲悟及第心空選佛場個中無地列隅方一毫透體豁惺眼十界通身現法王迷去妄分人與我悟來了却短和長回頭直下情無倚便是高登彼岸航浩然之氣勢旋盤充塞乾坤絶窄寬一雨普施滋草潤密雲彌布蔭人寒西來祖令當頭指東土兒傳正眼端祇為分明人不薦故令高著眼睛看貧僧偏愛破家窮赤體條條露骨風歷歷我人皆實相明明心境總真空月明虛白連天碧日照雲霞映水紅隨色摩尼不墮數祇因逐物著西東本心地不屬陽陰迥出乾坤覆衆岑萬法馬師都吸盡一人龐老絶追尋全身用去頭頭現覿體行時物物沉外境內神無覓處須知憑悟本來心又費隱容就地翻身大覺場一毫端上徹殊方全身披露乘獅子十界總如跨象王栗棘直拈三寸短神珠照握意州長傳提祖令寰中指起日回風鎮遠航其二一句當前踞地盤其風凜凜海天寬用時敗種心徒熱舉著燋芽膽自寒殺活誰分凡聖路縱橫熟辨妙玄端機如掣電誠何旨説似禪人子細看其三無地卓錐尚未窮錐無赤手振家風全身默示離玄象覿面提持脫有空歷歷才思形赤白明明擬契墜青紅吾門作用由來別一棒當頭杳絶東其四本分壇場不落陰當軒踞坐出羣岑毛端剎海猶成迹大地塵收還涉尋遽爾超方忘巨末迥然物外絶浮沉堂堂任運裂情謂獨脫無依達本心寶峰乾坤一寶示形山歷劫巍然碧漢間揭露當前非色相光吞萬象自悠間屏嶂離披底趣妙通神廓落楮毫覿面陳孰道風光如潑黛大悲手眼畫難真紫薇天上人間獨個尊人情稱指紫薇崙呈真象自彌今古惟亘寰中作主元獅子距爪張牙口半開驚羣曾是戲毬來吒沙奮迅威獰惡跳躍身騰吼似雷香爐繫鼎單絲久亦如靈山火種不傳虛暖灰須是兒孫續代代聯芳總嗣渠佛座特爾無依聊指座驀然識此皎靈源摩挲厯的超空有據本分明不涉言羅漢了悟無復後有身孤峰獨坐現前人娑婆界內多方供不動腳根普應真鉢盂佛祖傳來一口鉢山河大地吸皆空人天欲睹如何狀指出危巔見鉢容天柱天柱峰高高亦尊大千咸小不須論我來獨跨峰頭上盡十方中一口吞五雲五種雲從何處來一時湊合惹人猜爭如坐斷迷雲路脫體無垠正眼開報雨峰頭一片微雲起報道天宮雨下來雲既無心能響應無心消息亦奇賅吉祥風光本有瑞騰空光據根元只此中返照窮初者個地靈明亘溢絶朦朧寶峰隱元琦無價奇珍疊滿山流輝千古濟人間試拈白棒當頭指大地貧兒盡改顏屏嶂屏巒羅列展家風面面花開間白紅却有水雲多意氣每來點綴翠微中紫薇一支秀接紫薇宮遍體文章積翠絨尊貴由來堪作主千峰朝拱碧雲籠獅子殘雲斂盡露全身氣宇昂昂孰敢親獨踞威風千里外未曾哮吼也驚人香爐卓立渾成一柄長千年冷焰豈尋常無端落在渠儂手撥著些兒遍界香佛座天為寶蓋地為蓮一座巍巍永不遷日耀玲瓏金相好靈山黃老尚依然羅漢煙收嶽面貌崚嶒兀兀如癡百不能木落秋清貧徹骨陡然富貴彩雲凝鉢盂碧岫雲囊半掩濃儼然寶鉢托虛空一聲霹靂轟天地鉢底掀翻幾臥龍天柱奇哉一脈露機先刺破渾淪獨峭然不為羣巒爭秀氣生成骨格要撑天五雲那邊欲露真消息個裡分明要舉揚倏忽峰頭懸五彩林巒澗壑盡生光報雨傾湫倒嶽事尋常何獨峰愁如夢鄉一滴未曾沾大地片雲拖出舌頭長吉祥氤氳瑞氣結浮圖一道祥光削處孤特地山川俱顯煥看來好事不如無答邑侯禱雨之請抱病寒巖待晚年賢侯何事驀勾牽頭陀非是人間物移向人間不值錢柬縣主凌公颯颯江風徹夜呼捫心靡愧是良圖寒潭皎月空撈摝到底分明一物無其二護藏僧徒困役迷龍樓蕭索野狐啼檀那若負瞿曇囑何處青山不可棲寄外護諸居士萬里迢迢降玉音每開黃卷細沉吟名賢曳曳隨情轉千古何人簡帝心其二江風四起震龍樓煙鎖青山一帶愁幸遇諸公各出手皇恩祖德一時酬重興大殿跨海非常木撑天必大材東君如有意吹入我門來竪中天師祖塔院功成喜得念初堅骨露孤峰獨峭然忤逆兒孫親蓋覆一輪杲日正中天丙戌回山之作一別寒巖閲兩春五湖佳景眼中塵佛恩奚啻丘山重世事渾無半點真雪鬢難忘親敕賜青山豈昧舊時人故園松竹依然在待得余歸翠又新小溪十咏一枕倦雲幾片夢回鳥噪山堂携杖尋流洗耳溪陰肝膽俱涼其二水靜鬚眉可鑑心空身世皆忘坐臥一溪環繞不知幾變滄桑其三偶爾尋幽適意追參雲水茫茫猿鳥也知樂趣銜花各獻溪傍其四靜處爭如養德避名不若韜光盡道溪山可隱誰知天下無藏其五去年此際遊咏今日重新舉揚山色人情仍舊自然吹水成章其六搆著源頭一摘始知正脈流長黃檗尋常苦口舌翻四海汪洋其七量大自然納垢德全必也包荒雲倦愛豫癖懶天豪豈責吟狂其八送客一溪流水接人幾片間雲去住無拘無束何妨分而不分其九若不親師擇友焉知目擊道存一種平懷無寄炎涼何處躲跟其十洞口呵雲作迹峰頭棒月成痕不若橫眠一榻任他地黑天昏報雨峰朗真璣摩霄絶巘跨靈淵神蟄翻騰信得先瞥爾微雲通一線千林萬壑盡傾濺羅漢峯玄密定謾將大地作蒲團坐斷千峰竟日間滿面風光彌宇宙不曾持鉢到人間香爐中柱砥展出精奇本自然渾淪卓立冷含煙分明一段難藏隱撥著氤氳遍大千觀龍潭木菴瑫午後風清淡翠微溪山何處不幽奇嵯峨雨徑苔痕滑嶮峻藤崖日影遲萬丈寒潭藏碧落一條瀑布散瓊枝引他無限奇男子來去紛紛著眼窺羅漢即非一寸絲不挂若癡憨三界翻為一小菴坐久那知天地老禪心竟日照寒潭鉢盂誰將一口托虛空半貯寒煙半貯風莫是老僧收拾懶長年安置白雲中獅子出窟金毛孰敢儔長將日月戲為毬有時忽震風雷舌一吼聲聞億萬州小溪咏有引時學和尚小溪臥咏遠近傳誦所謂遊觀皆足見道東施不能效顰者也時從溯流步韻印可非敢附驥不朽亦以自述追隨云爾老來身世俱休徘徊已絶馳求坐依石屏半幅渴飲一帶潺流豈必寢石方休適趣何用多求數點鳩聲喚雨一行魚影逐流記持了知無益安眠更不圖求葉落推回午夢眼開方覺新秋不學雀巢灌頂寄身翠壁清流驀灑曹溪一滴普潤萬國九洲倦來盤石可臥興至曲澗堪遊新蕙香浮谷滿枯枝旋拾烹流岸花零落誰取溪雲去住何求可憐一般水鳥終日流囀無休尋幽不厭深洞溪小適意便休烈日迎風却暑就涼枕石聽流自從得那些子迥然脫灑林丘卷之退藏於密放則度刃奔流同友人觀龍潭興慈策杖尋溪入迂回灌莽中耳清聲漱玉衣濕沫從風盡浣峰腰翠遙拖日腳紅花飛金粟界簾下水晶宮出峽流還駛延崖路忽通練光山晝夜人語澗西東數里歸猶緩終朝興未窮回看行坐處法雨遍晴空懷中天師祖四首當年杖錫去悠悠薊水閩山萬里秋法雨沾濡千世界宗風浩蕩遍神州巢雲古洞看誰主挂壁飛泉只自流且向祗園高枕臥天書有日到林丘其二年去年來秋又分山中作伴只煙雲談禪恐破天魔膽説法曾驚鹿豕羣月落敲鐘林際曉窗虛流水枕邊聞征鴻千里無書至翹首長空看斗文其三十二峰頭瀑布飛天風吹下薜蘿衣九重日月長繩繫衆壑煙霞滿袖歸詩咏樓前黃鶴舞心遲薊北白雲違道人不耐京塵苦好向岡頭共採薇其四草屩遙從入薊門白雲猶自繞祗園幾宵遠夢驚鐘喚一片幽懷與鶴論窗外人稀塵不到潭中珠映水無痕床頭長有琴書在閉戶誰知日月奔遊龍潭分得宮字峭壁凌層遠接空自然不假五丁工鮫珠倒瀉簾垂雨馬鬣高騫石嘯風溜激雷聲分鷲嶺樹合霜色過琳宮留連未覺千峰晚吟落殘陽一點紅登藏經臺有感子規聲裏嘆春歸草色青青落翠微昔日靈文何處在荒臺惟見鷓鴣飛遊黃檗海容咫尺名山地無緣到此遊樓臺棲日月鐘鼓隱林丘洞鳥窺禪去巖雲度水流探奇須悟趣未得賞心儔遊龍潭隆瑞秋仲探靈境神清爽氣新碧潭今古照洞徹本來真天柱峰隆璋一柱孤高孰與齊亭亭遠際絶攀躋白雲影裡全身現撑住虛空不放低遊石門石門寂寂鎖青山雲冷溪頭屋半間傍午不知天是暑多年惟見水長潺巖花帶雨開猶落沙鳥親人去復還寄語乘時名利客浮生萬事得如間佛座峰性杲不藉良工巧塑成天然一座儼分明從來殊相難思議為度人間強得名遊紫薇菴廣徹一路巍然透紫薇秋風扶我錫如飛峰巒疊疊窺金相花雨紛紛濕毳衣自是境幽聞見杳况兼地峻往來稀清溪對客頻饒舌回首啼鴉帶日歸遊水月菴性政草色携來兩袖青落花風定細堪聽有心蟾影寒相照無意溪流湍自寧松裏鶴鳴因我靜門前獅吼為誰醒芒鞋却喜和雲健冷看鳧鷖戲緑萍次文忠公韻道嶽世路崎嶇成曲盤強將笑語買時寬囊中久客黃金盡匣裏新硎白劍寒鸂鶒羣來煙水上鳳凰飛去紫雲端逢人但説無生話萬里荒丘不忍看其二日落霜飛長夜陰寒猿啼出遠嶔岑三年乳德空中斷十載皇恩夢裏尋衣破自縫愁落落雞鳴欲舞病沉沉茂弘有晉聲還在敢向同人題夙心遊萬松菴性日結伴尋幽興自酣春風處處散晴嵐山留石髮支高隱壑積松濤供老曇竹徑偶携剛是七虎溪頻笑亦仍三歸來藉有孤笻力回首巖西雲滿龕遊獅子菴聲從磬裏寄來真滿眼煙霞入境新柏子菴前松作侶梅花塢上月懷人挹將千仞峰頭水浣盡三年衣上塵尤喜山家風味朴長留笋蕨供嘉賓遊龍潭捫蘿攀石越杉松遠叩澄潭老蟄龍瀑布疑懸千斛淚梅花偶寫半山容繇來傲骨憑芒屩未了間身伴竹笻題詠迹從今日掃姓名不欲挂羣峰遊翠竹菴萬緑深深裏潛開小小居有時携蠟屐隨意訪蓬廬泉石能留偈煙雲每向渠春巢寒乳鵲嘉圃老腴蔬虎迹階前善鐘聲林外疏臺承飼鳥飯案積乞花書坐茗香風遠行吟午夢餘以斯為事業遂可侶樵漁塵境已長謝間情復自如夕陽歸路晚蒼翠點衣裾元日奉誦本師隱和尚雲濤集敬賦寸心能鐵石兩字別雲濤記得焚香處春山片日高遊獅子菴性幽風搖獅臥吼雲低滿耳松濤濺鳥啼萬派穿山流上下羣峰挂日勢東西金家舊種菩根老鶴錫新開草徑迷獨踞茅椽威自猛遙看羅漢靜相携遊水月菴奇峰原不倩松青小搆談玄惹石聽月色凌空千嶂動水流入定一溪寧蟲敲風句呼人寐楓醉霞觴為我醒誰使幽心負菊葉鳥聲啼處冷浮萍遊翠竹菴新竹猶然戀故園一菴招月與高論誰將峰舌晴時吐却把松濤雨後吞雞且有冠迎翰客鶴能無唳灑雲門聽猿三復黃州記談笑應令白日昏遊萬松菴氷心散作滿山寒松嶂呼天却未難階草何曾為露茂籬花原不懟風殘凌空有幹誰能見拂地無枝且共看逸興肯隨日影逝翩翩蝶翅撲雞冠遊龍潭向日在天今在潭晶宮飽取不為貪莫言長臥羞諸葛自是深藏學老聃玉鷺飛時鱗甲動珠簾垂處爪牙含崎嶇鳥道行多露對此能無嘆息三奉次葉台山相國登黃檗絶頂性具自足嵂崒春山百摺盤搘笻極目地天寬靈湫石溜三冬凍古道松號二月寒瀑練千尋垂雨腳簾珠萬斛撒雲端勝遊無限懷興廢峭壁名題剔蘚看陪陳從教參藩觀龍潭道如惟來風風雨雨難升高今日尋秋吟興豪追逐龍門破浪客千仞靈淵探一篙迤𨓦樵徑斜凌虛越磴捫蘿緣緑蕪支笻屹𡿖訝欲跌多少貴遊驚下車俯視寒潭八百尺浴日搖金漾空碧水光嵐氣疑雨飛吹透荷衣草屨濕抱珠神龍千丈眠團蒲靜對長安禪未破天風萬里浪毒雲腥雨掀三千巖頭灑