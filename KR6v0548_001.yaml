body:
  text: 重興隆琦隱元祖師原本門弟子性幽獨往等編訂續修監寺道昱道升道本宗儀開滋永悅副寺惠秀舜普永施同靜寺宗堂宗愷德科傳圖華懺常澄紹仁本岐紹修校刊山十二則勢拔穹窿屹然永固形盤大地覿體全真是以奇巖幽谷雲水居焉廣穴巨川龍象宅焉乃至達觀上士每于山色溪聲脫落見聞與林巒巖壑渾為一體名實並稱千古而不磨也故集是編略示檗山勝槩庶後之君子策杖尋源履踐前轍不迷蹊徑云黃檗山距福清縣城西二十里為宏路驛由驛而南循金印鋪緣大壤而入為清遠里之黎灣黎灣即獅子香爐二峰內本邑葉文忠公有紀遊亭於道左亭西數武為下棋壠壠之右為桑池園接寺拱橋踰橋數武即寺之舊山門也歷內橋為進寺之始寺山故有黃檗因以為名唐貞元間正幹禪師為開山祖繼有斷際希運禪師出家其中厥後闡化江外所住巨剎皆以黃檗稱為酷愛茲山幽邃故也遠溯來源自金雞白鶴踰三溪越靈石北向而下首出大帽峯高出雲表峭拔無雙本縣中龍之祖也剝下兩枝東為寶峰西行十里許為陳九郎故居突起為羅漢峰迤逶曲折至香城自高山脫脈而東宛轉向南磊落而下為絳節峰乃寺之主山也東自絳節分岫由化龍直趨下棋壠為寺左障西自羅漢天柱屏嶂列擁為寺右障西南自五雲報雨吉祥諸峰湧騰而下為寺內案吉祥之餘麓屹然環繞與下棋壠相搆為寺內垣從前案遙引而東復有香爐峰與獅子峰對峙為寺外垣自小帽而東特起一峰曰佛座即寺之外朝也內水則自香城分界發源自羅漢泉注石門溪從內石橋流入放生池拱橋而出與外水會外水則自大帽發源歷九淵而來繞吉祥而逝與內水匯直至徑江誠禪門法苑祖裔福基也自唐迄今千有餘載正幹斷際而下諸師或揚化他方或韜光此土隆替不一未可悉數崇禎庚午歲密雲和尚始于茲山開宗播響重振舊規遠近聞風咸生渴仰嗣是費隱大師得面稟親承之旨單提向上鉗鎚大開爐鞴鈞鑄凡聖以故羣賢間出今隱元禪師以嫡傳繼踵赤手全提具佛祖爪牙統衲僧巴鼻宗綱有賴嗣法得人叢林維新萬言莫罄著述之盛千載希逢則斯山也豈但與宇內之勝僅傳不朽哉峰十五大帽峰此峰最高為本山祖代有黃檗瑞香生成不輟頂圓如帽因以得名靈石指為留雪幛小帽峰與大帽峰相連嵸峻圓頂似之寶峰在大帽前羣巒環翠聳出漢表瑩潤如聚寶然中抽嫩枝靈氣鍾四潭中天老人塔焉屏幛峰在天柱右畔上有三台四時花草菁蔥望若御屏紫微峰在天柱寶峰之間衆山環繞蒼翠異常宛似紫微獅子峰在香爐溪北山勢雄崛形如臥地獅子即本山之捍門也香爐峰端圓而秀一麓下垂如香爐有柄居前案末乃寺之華表也佛座峰一峰獨挺高數百仞有頭顱足膝若大佛寶座寺以此峰作外案羅漢峰在天柱上拔出衆岑狀若羅漢次于大帽乃本山之中峰也鉢盂峰在羅漢肩左側形如釜因鄰羅漢得名天柱峰乃羅漢右巍然獨聳勢若擎天五雲峰自小帽迢下層巒疊巘屈曲有五如雲乍出報雨峰居五雲東每天將雨輒先起雲里人以之占雨吉祥峯與報雨峰連特朝而來作寺前案時有祥光現于其上故名絳節峰即本寺主山一起一伏斷而復連如絳節狀巖一頭陀巖寺之西嵩頭陀巖有乳香出自石罅間洞一蟒洞唐時傳有蟒神棲焉頗知皈依正教顯迹至今其洞口向石竹廣三丈深六丈高亦如之上有圓竅通天傍有小泉流湧內小洞深邃而黑人不敢入在大帽峰西北石七三台石在寺右障中望之森列儼如台星故名飛來石在第一潭下高可數丈三面虛懸屹然而立費邑侯以乙亥夏遊此上篆振鷺之瀑四字釣臺石在報雨峯下前有三潭可釣屏石在寺右茶園上以似屏故名鼓石在四潭前旁甚險遊潭者抱石鼓而上盤陀石在下棋壠上界石在翠竹菴後崙頂上以大石界下以路界從山脊分水出俱係寺業嶺五馬鞍嶺寺右臂天柱峰由此而上馬鞍蓋以形似呼之鐵竈嶺在寺前右障大溪沿路而上為報雨峰俱屬寺山宮後嶺去寺一里許佛座峰由此而上吉祥嶺在寺前案上尉斗萬松菴之捷徑也絳節嶺在寺後逶迤而上之香城旁通路也壠一下棋壠古傳為蟒神與紫雲仙博奕處池一放生池崇禎甲戌歲砌內堂溪為之潭一九淵潭寺西南隅有溪沿溪三里許石壁巉嵒泉色藍光者為龍潭自下而上共有九處惟龍湫石鼓玉筯為最而龍湫即第一潭也縱廣六七丈底深莫測上有飛瀑從空瀉落望若珠簾凡亢旱禱雨多應宋紹興癸丑冬趙公卞觀稼至此祝曰名位淺狹所及者鮮惟龍以時致雨盡蘇一邑之蒼生書以勒石復勒靈淵二大字并七言絶句一首於潭上元符二年安撫程公邁祈雨有應為立龍堂宣和二年攝邑陳麟再立祠淳熙間安撫史公浩復增飭之石上有汮亭咸淳丙寅倉使劉震孫改其額曰九淵第一以九淵為總名自此始而龍堂汮亭則已燬矣其側銘龍湫者郡丞葉嗣昌書住山釋元恭立趙善密者不知何許人亦同住山圓悟來此熙寧春崔令同丕績師亦至勒字于潭右水際國朝天啓元年葉文忠公復搆亭于龍堂舊址莆宗伯林公堯俞書扁曰作霖未幾為山鄰所焚獨石碑一方載登潭詩有人日看山雨乍收之句懸崖之中題潛龍者徑江侍御林公汝翥筆也由潭流下為瀑布泉泉之旁有危石高可數丈三面懸虛屹然而立曰飛來石崇禎乙亥夏費邑侯道用篆振鷺之瀑於上其餘歲久字湮為水所澌不能盡見再歷而上有石鼓即第三潭也一石如鼓鯁于潭旁四潭懸溜數丈亦如瀉珠比龍湫稍差但巖壁極峭遊者不敢履多從崖頭俯矚而已玉筯隱于幽谷是名七潭泉自高瀉望若玉筯然去石鼓則遠矣至九淵則隱顯非常變化莫測或求之弗得有時自現為樵者所覩其餘諸潭各成形勝皆有可觀溪三石門溪去寺西北一里兩石相倚如門狀極奇怪水從下流出繞過寺前棠陰夾岸覆蓋如亭中有亂石可坐大溪源自九淵龍潭而來奔流不絶與拱橋之外石門溪水會直注徑江小溪在寺右澗石門之水注焉陰映如蓋清涼如鏡傍有石壁堪題外石楯石桌十餘禪衲適興烹茗傳韻于此故師有小溪十咏之作從者和之冷然有聲聞之熱惱煩濁不覺冰消矣井三龍井法堂後石巖壁立下有石穴方如盤深不二尺清而甘雖亢旱弗涸辛卯冬搆龍宮於上以便祈禱古井闊六尺圍二丈深二丈餘在應供堂之右金仙井在寺右臂後水筧坑中庚寅春搆翠竹菴尋源得水故名其泉曰般若泉三虎跑泉在寺右虎藪坑上晝夜混混不竭以筧引之直至香積羅漢泉在羅漢峰間石隙流湧去寺五里許係石門溪之本源直匯寺前放生池般若泉在水筧坑中直注坑前而隱遊翠竹菴者勺而烹清香甘美試茗尤嘉
