body:
  text: 重興隆琦隱元祖師原本門弟子性幽獨往等編訂當山世孫了馨清馥達光道暹續修監寺道旵道本道升永悅副寺崇儀舜普開滋慧秀校刊寺毗耶丈室一榻風光舍衛講堂四面通達至于我土琳官紺殿表表可望者皆因人而致之匪徒搆其虛席間雖隆替不一中興每自有待焉是以帝德旌崇民心歸仰寶殿龍樓一時顯煥祖庭僧舍八字打開慕道緇素莫不由斯門而入也萬福禪寺寺之創自唐正幹禪師始蓋貞元五年也額曰般若堂後八年于其東大闢堂宇德宗改為建德禪寺盛于宋微于元重興于明洪武二十三年莆陽心鑑周公為檀樾大休禪師主之規制自本山落脈而下為法堂次為大雄寶殿殿之前有放生池池邊石橋二門其東為香積厨西為轉輪藏前有小溪自天柱石門來遠五里許繞寺而東上有拱橋跨岸而過更百餘武為天王殿殿而下為甬道長可七十餘丈即三門門左右有伽藍祖師二堂及十方寮舍一時殿閣偉麗而田産亦盛以嘉靖乙卯倭變灰焚殆盡僧徒星散又成榛莽之區久之近民生心田地幾為烏有隆慶初僧中天圓公誅茅于斯志圖恢復萬歷辛丑毅然赴闕請賜龍藏崇鎮寶林居八年未蒙諭旨以疾卒于都之長榮茶菴其徒孫興壽興慈不怠先志懇請愈堅越六年相國葉文忠公代力奏請改額曰萬福禪寺神宗皇帝敕賜全藏計六百七十八函敕書一道命中使王舉同僧賫護到山仍發帑金三百兩為賫經費時萬歷甲寅年也是年相國告歸汪邑侯泗論疏令壽慈募化重興太學林守玄林伯春董其事建寶殿于法堂舊址礨築月臺于殿前廊之下由臺而南搆藏經閣珍崇御藏又搆擇木堂于殿之東今相國像在焉移舊佛堂于殿之西為方丈戊午春興慈歸寂丙寅而興壽亦歸崇禎己巳玄孫隆宓隆瑞等復搆二客堂于殿之左右已而念祖庭秋晚正道無聞必有弘法開堂者庶不失古今標格以是謀諸檀樾外護敦請金粟密雲禪師主席庚午春飛錫南來全提向上大機直指當人本旨黃檗宗風于斯始振未幾而還金粟癸酉冬宓瑞復同外護龔居士等恭請費隱禪師住持恢張祖道永為十方禪剎衲子無遠近望風率至丙子夏師應建寧蓮峰之請瑞同檀信等念黃檗為列祖之席不可空懸請隱元禪師以繼其位未期年衲履盈室大振臨濟之風中興黃檗之道師之功於前此殆有加矣庚辰春拆月臺重建大殿于舊址以舊殿仍為法堂移藏閣于西廊之後搆齋堂于雲厨之前辛巳建鐘鼓樓山門雲廚庫房并諸寮舍一一咸備凡所作法遵依祖制成大禪剎入斯門者莫不皈依甲申孟春師有天童掃塔之行寺事請羅山亘禪師主之是冬搆左右兩廊于殿之前奉祀伽藍祖師丙戌春亘公同諸檀信仍接師回山時適世界紛紛僧俗戚戚幸祖道如故大教不祧而親領大乘同悟禪宗者不下數十人所謂長安甚閙我國晏然誠不虛矣殿大雄寶殿計五間高四丈七尺縱六丈七尺廣八丈七尺重簷結角金碧流輝外遊廊之前中階九級明堂深四丈九尺廣八丈六尺五寸上梁時老人升座云托出脊梁橫法界大開眼目耀乾坤都盧一座空王殿百萬四千解脫門正當與麼時撑持者撑持蓋覆者蓋覆且道阿那個作得其中主良久云兒孫卓立如麻粟沒量大人獨個尊舊天王殿在放生池南今廢堂法堂計五間高三丈有六廣八丈深七丈乙卯歲僧興壽等建為殿庚辰春復改為法堂禪堂在閣下西廊之後縱五丈六尺廣六丈二尺有嘲者云和尚不可以經閣混為禪堂師云這裡甚麼所在許你分經分禪苟悟一椎兩當則千七百個古錐三藏爛熳葛藤無地可寄矣學事堂在鐘鼓樓下計三間雲水堂在山門左應供堂在東廊後計三間高二丈有八廣六丈有六深六丈有三師示衆云法眼圓明日費千金非分外偷心不死時嘗滴水也難消樓閣藏閣在殿右計五間高三丈有五廣六丈有二深五丈有六八閩中藏閣甚多奉特賜者甚少惟黃檗僧興壽興慈成中天老人之志叩闕堅請乙卯歲蒙神宗皇帝特差內監王公賫送至山有敕書一道云敕諭福建福州府福清縣黃檗山萬福禪寺住持僧人正圓及僧衆人等朕發誠心造印佛大藏經頒施在京及天下名山寺院供奉經首護敕已諭其由爾住持及僧衆人等務要虔潔供安朝夕禮誦保眇躬康樂宮壼肅清懺已往愆尤祈無疆壽福民安國泰天下太平俾四海八荒咸歸仁慈善教朕成恭己無為之治道焉今特差御馬監太監王舉賫請前去彼處供安各宜仰體知悉欽哉故諭戊寅春諸紳士請師開閲師上堂開閲竟復説偈云四十九年爛葛藤看來真個可憐生大家出手俱翻却始信共途不共行鐘鼓樓在藏閣右計三間高三丈五尺廣四丈八尺深五丈六尺內懸銅鐘一口重千斤庚辰仲冬鑄係監寺能得募請師説偈云黃檗鑄銅鐘虛懸釋梵宮千斤樂信施萬古醒迷蒙器大奚愁晚韻高誰與同婆娑真教體盡在此聲中有大鼓一面係鰲江佩玄林檀越施以配洪鐘禪林禮樂由斯備焉刷印樓在藏閣上凡法寶新舊板俱在此樓遞年刷印者住焉則有黃檗希運禪師心要一本白雲端禪師語録一本虎丘隆禪師語録一本三教平心論一本天童老和尚語録全部費隱容和尚語録二本祖庭鉗鎚録一本心經斫輪解一本禪燈世譜二本禪關策進一本本山隱元和尚語録全部又録二本雲濤集一本寶訓一本石屋語録一本龐居士語録一本梵本普門品一本梵網經二本梵本藥師經一卷四十二章經一本禪林課誦一本毗尼日用一本小法數一本四分戒本一本板藏于斯永為流通庫司樓在應供堂傍計三間廣四丈三尺深六丈三尺高二丈六尺廊東廊從下至上計一十二丈二尺西廊如東寮首座寮在方丈右西堂寮在首座寮右書記寮在方丈左邊知客寮在擇木堂右邊化主寮在擇木堂左典座寮在香積左雜務寮在山門右什物寮在三門右行堂寮在下客堂左房米房在行堂寮左碓房在米房左茶房在擇木堂左小菜房在香積右園房在庫司樓左田房在浴堂右圊房在浴堂後浴房在田房左直牲房在牛房右牛房在直牲房左三門在大殿前高二丈八尺廣五丈四尺深三丈八尺門旁有青石閫聯云千古吉祥臨萬福九重紫氣蓋三門亭環翠亭在外拱橋東首扁係朱晦翁書今廢紀遊亭距外拱橋左半里許內有石碑載葉相國詩茶亭在獅子峰前寺路由此而進作霖亭在龍湫上今廢橋內三樹橋在三門前右有甘棠三樹鬱翠盤蓋其上流泉漱石清音朗朗于下前有石凳三面名曰三樹橋檀樾林伯春坐息其間神情快爽戲吟三字詩以美之詩曰一橋亭三樹下千枝椽萬葉瓦明月篩清風灑坐其間即仙也中木橋在碾前二十餘武有二石人立焉外拱橋在桑池園西即古山門旁有勒石碑載宋時僧妙湛募化壩新壩在三門東南與三樹橋平列崇禎甲戌始築為內堂水口高一丈三尺闊四丈長六丈餘山門通道於寺右碾塔前碾壩東二十餘武碓水碓在大溪壩上百餘武今廢臼尚存江家門口磨水磨在水碓上今廢臺化人臺由絳節峰分枝而下距寺二里許江書院北現有迹存焉菴獅子菴在獅子峰間因峰而得名自外拱橋東去一里許舊傳金長者之宅辛卯春贖回背負獅子面對佛座羣巒拱翠碧水環流如拖毬狀雖形勝之説釋氏不道而地靈人傑得無有返擲獅兒出現于世者乎故師有坐對金仙談主伴臥聞獅子吼風雷之句乾隆間界泉尊道暹和尚道昱首座重建翠竹菴在寺龍臂後崙中庚寅春始搆環圍翠茂可觀亦衛寺之嘉氣所謂居不可無竹也此君虛心待物永夜達旦吟風嘲月冷冷成韻詎假香巖擊節而後有聲哉無價趙居士登此則云天風坐笑語蕭蕭玉版山中頻見招忽憶香巖家裏事竿頭一擊便通霄梅福菴在四潭塔右崙去寺四里餘戊寅冬修中天祖塔始創三間一偏內祀中天祖并諸耆舊牌位旁立一碑聊敘祖之始末遊者沿溪鳥道而上丹崖插漢峭壁凌空懸流玲瓏大暢胸襟偶觸其機詞鋒頓發圍梅百餘株每至雪嶂流輝清香撲鼻可謂名實不虛故師咏之曰素性天然潔臨霜志愈貞破顏微冷笑十里淨無塵萬松庵在佛座峰間必翁塔前一名尉斗山臥雲菴計三間兩偏東西兩坑計田十畝其山場環繞一派東至茶亭下南至佛座山下頭陀菴止連桐管坑田下為界北至寺案西連大小帽自崇禎丁丑歲周圍栽植松柏數萬株今已成林改名萬松菴偈曰百畝青松信手栽千秋耳畔吼風雷眼青可辨龍蛇影那許狸奴暗亂猜白馬庵在獅子峰東距寺三里餘舊曰白馬廟始京師以白馬名寺以其馱經西來有功法門故此亦以白馬名廟襲其迹也尋廟廢為民宅辛卯春贖回一圍五畝餘計五間改廟為庵以存故事右角草餘武即報恩寺舊址有石𥕢在焉水月庵去寺一里餘在吉祥峰之右其山地乃檀越林結夫所施辛卯春始搆為庵三間一偏枕佛座濯清溪紫微影護羅漢來朝鉢盂天柱屏障寶峰獅子香爐羅列圍繞增萬福之勝槩暢達者之大觀名曰水月庵後有大士應現未可知也道光間道本德庸公重建三官庵即聞香菴在水月菴右香爐峰之後去寺三里許古祀三官處尋廢為埔地戊子春贖回受種五畝餘後山三崙連尉斗俱為寺業己丑春略搆一偏以存舊迹絳節庵去寺二里餘自寺西澗溯流而上過石門而入焉脈自羅漢峰左肩迢遞而下如絳節狀故以峰得名庵居峰之右亦以峰名之建自壬辰季春三間一偏前有報雨五雲後得絳節飄揚故有嶽獻五雲供法眼天垂七寶蓋真人之句紫微庵在紫微峰下去寺五里許沿馬鞍而上至天柱峰腰而下蓋寶峰天柱之間壬辰春僧無塵結茅于此日以採薇當供夜則禪靜而樂羣巒拱翠萬壑呈祥紫氣迫人通身錦繡山花映日遍體文章鳥鳴丹壁水奏清溪一曲兩曲無人會惟許幽人獨自知彌勒菴在獅子峰尾崙獅菴左畔數十武前後五間嘉慶丁卯道升公首座重搆前塢一偏背岏巑而迤古道臨略彴而瞰清流薜荔煙蘿扶踈繞屋柟楠露篠邐𨓦垂垣不殊兜率陀天崇祀阿逸多佛有句云放下肚皮笑笑幾家村落解開叉口包包數里溪山當來定有補處菩薩下生應現其間昆崙庵在牛頽洋中去寺里半之遙乾隆乙酉曇會禪宿瑞英公西堂鼎建佛座香爐西聳象峰獅岫東環紫甸朱埢縱橫映帶烏潭碧漵左右濚洄陟岑樓披繡闥山原廣厥遐瞻臨紺宇啓玄扃川澤盈其勝賞白雲半塢古德宗風明月前溪作家境界亶其然乎信足樂也塔菴在下棋壠之麓公媽塔左側離環翠亭一牛㖃地供普陀大士旁列諸上善人牌並尉斗萬松菴報恩塔總套年節晨昏香火罔替門通曲徑室倚層巒日出而林霏開人來人去雲歸而巖穴暝樵唱樵歌野色山圍松送瑤笙雅韻石頭路滑筍藏玉版禪機道光癸未崇暟禪德思璉師重整松隱堂在荔灣墩北紀遊亭東去半里許康熙間良規公開創為本師隱元老人舍利齒髮塔院並祀奉真像春霜秋露虔申追遠之忱夕梵晨燈用達酬恩之悃嘉慶乙丑繼宗和尚監寺永悅師鼎建西偏數間以為香積湢溷寮舍獅嶠左回田疇綺錯象峰後樂澗壑環縈列巘雲開屏障畫圖繚繞前岡日映香爐煙篆氤氳花雨盈庭山色香凝霞磴松風隔隴濤聲翠繞雲堂天寶物華法乳聯芳八表地靈人瑞宗猷丕振千齡誠窣堵之名藍福唐之勝概也院黃檗塔院在下棋壠宋太平興國元年建以衰亂故江氏從而宅左右現存塔五座內有古井一口報恩塔院在香爐峰前莫氏宅右宋建炎間建今廢現存大井一口井欄勒石可據東嶽塔院在南陽莊左百餘武今廢現存基一圍五畝丙戌年贖回塘黃檗海塘在井得隆仁二里東西百五十丈南北一百五十丈陡門三間洪武十四年本寺築灌官民田十五頃今屬民間莊南陽莊在香爐峰前百餘武與鰲江林田舍共焉以中廳為界寺居右邊兩房一偏外護小屋一列又北邊另一座兩偏左右前後計田一百六十餘畝監收僧良聰主之調衆有法不失農時雖歉歲亦有收焉這一假田地分付來多少時也把柄在手任渠反覆所謂栽田博飯尋常事不是飽參人不知何洋莊在獅子峰外土名何厝洋今廢為民居塢桃花塢去寺二里許即往龍潭路溪邊是也今廢田界內田據傳十二峰內外田地俱屬寺業以嘉靖倭焚僧散不還近民請受租稅久假不歸惜哉寺前田自寺前舊址至樜仔裏鐵竈共計三十四畝隆慶間僧中天於民間贖回又大橋外軍民田八畝零己丑年贖回尉斗田計十畝坐佛座峰左右兩坑梨洋田計十畝土名大潭口等處南陽田計一百六十餘畝黎灣洋田計五十六畝牛隊洋田計二十畝餘東滿洋田計一十三畝陳白洋田計四十五畝鄭渚田在蘇溪里漁浦南瀕地也唐天寶中嘗為田後廢至宋天禧間僧履元重堤之長二百二十丈址廣三丈高一丈二尺陡門十四間望若長坂焉今稍壞亦屬民間園桑池園下棋壠西原有池園今為埔地現存有祖塔三座已受塔禁未丈地五畝東至下棋壠西連寺龍臂南至田北連水梘坑前里長陳大綬册據尉斗園計六畝在報恩塔前埢頭畬園計五畝鐵爐墩園計四畝三官壠園計五畝
