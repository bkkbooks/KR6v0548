body:
  text: 重興隆琦隱元祖師原本門弟子性幽獨往等編訂續修監寺道昱道升道本宗儀開滋永悅副寺惠秀舜普永施同靜寺宗堂宗愷德科傳圖華懺常澄紹仁本岐紹修校刊塔三十七座蓋佛之示現咸以三乘正法而利羣機槃之後皆以寶塔而藏舍利凡一瞻一禮亟成佛道故象教之設詎可少哉曰佛塔菩薩塔羅漢塔聲聞塔祖師塔各有層級等差惟海會耆宿諸塔壘石而成則曰卯塔每見水潦鶴之徒一時福緣凑合妄造層級以混佛祖未免為識者哂其僭竊可知矣本山附近諸塔皆非祖塔獨鴻休大休二高僧未詳法嗣而其塔湮沒無存於戲毀之沒之其罪福又何如也僅崇禎辛巳歲造本山說法費和尚壽塔一座係臨濟正傳三十一世乃茲山祖塔之始大丈夫足下具眼或瞻或禮豈可不辨緇素也哉唐鴻休禪師塔舊傳在天柱峰昔人有贊云日出栽松日入宴寂至今山中鬱鬱密密白刃春風了無塵迹山雲海月兩忘形千古寒潭照虛室所載高僧傳今遍覽無踪或年代深遠為土所平不可知也師亦贊云不爽宿債端坐青松頭臨白刃如斬春風咦七粒瑩然揮不破至今洞壑玲瓏明大休禪師塔舊傳在幢幡峰西前有塔院基址頗巨石柱數條石人望柱各二列于甬道為國初所賜葬者今亦無跡萬曆間山鄰欲圖為墳寺僧徹夜以石砌之名為大休墓次日謀者乃息師贊之曰興隆家國妙在休心龍雲際會輥芥投針莖草不拈兮建剎已竟一葉未落兮滿地黃金雪堂塔在桑池園中崙塔禁五畝前里長陳大綬冊據蒙菴達和尚塔在雪堂塔右妙湛塔在雪堂塔左坦翁參塔在雪堂塔前為山鄰所廢今僅存三塔一列俱名雙池園師有感云三塔魂消愁砥柱雙池水涸待金湯藤菴暉塔在下棋壠宅左適軒友塔在藤菴塔左亦為山鄰所廢辛卯春重修改名曰上善塔圓湛師塔在吉祥峰下必翁友塔在尉斗山萬松菴之後甲申冬玄密禪師附葬于此其餘諸塔附寺左右歷代住僧瘞焉天柱峰下壽塔之上有塔四座曰正覺慈覺山堂垾海癸未歲乃合為一勒石以便祭掃又方丈右塔二座一荊巖一失名又寺左山一帶塔三座曰純極曰總菴一失名明第一代重興開山賜紫正圓中天祖師塔在四潭之上建自天啓壬戌仲冬坐辛向乙發祖自大帽踴躍而下突起寶峰中抽嫩枝數節後方結穴紫薇屏幛輔于左五雲報雨弻于右獅子馴伏其前寶蓋輝煌于後倉庫叠叠朝案重重靈淵鍾氣獅象臨門賜紫老人任之不亦宜乎明第二代住持開法費隱容老法祖舍利塔在舊輪藏之後建自崇禎辛巳孟夏發脉由羅漢峰轉天柱巍峨而下坐亥向巳羣巒環繞龍虎重交前案卓立後峰插漢誠天然一座福地也偈曰含冤未雪久成胎活捉空王特地埋不是渠儂誇好手都緣幫惡劈頭來明第三代住持開法應請扶桑隱元琦祖師齒髮塔在松隱堂清第五代住持開法慧門沛和尚塔在海會塔左側清第六代住持開法虛白願和尚塔在梅福菴右崙清第七代住持開法廣超宣和尚塔在尉斗佛座峰右田壠中崙清第八代住持開法清斯淨和尚塔在塔菴公媽塔邊右崙清第十代住持開法易菴謙和尚舍利塔在三塔中壙清第十二代住持開法壁立徑和尚塔在紀遊亭右邊路上清第十四代住持開法良準標和尚塔在三塔右崙清第十八代住持開法濬微聖和尚塔在大壩底清第二十代住持開法晦谷昂和尚塔在紀遊亭右邊大路上清第草三代住持開法朗純愚和尚塔在吉祥峰後邊左崙清第草五代住持開法智泉深和尚塔在紀遊亭裏右邊大路墘清第草八代住持開法若育位和尚塔在屏障峰麓路上清第三十代住持開法雪椿萱和尚塔在塔菴左側清第三十一代住持開法慧隆盛和尚塔在環翠亭右崙清第三十三代住持開法慧國祥和尚塔在環翠亭左崙清第三十五代住持開法了情念和尚塔在頭亭裏晦谷和尚同塔清第三十六代住持開法珩玉璽和尚塔在寺前右側馬鞍嶺清第三十九代住持開法承垠埒和尚塔在三塔左崙清第四十代住持開法道暹光和尚塔在環翠亭左畔清第四十一代住持開法繼宗鈺和尚塔在寺前右側馬鞍嶺清第四十二代住持開法界陽春和尚塔在三塔右崙三塔在下棋壠桑池園雪堂塔左原係藤菴暉蒙菴達坦翁參妙湛諸禪師窣堵久為山鄰廢壞康熙間重修四舍利合瘞中壙為歷代尊宿塔左壙為諸方耆德右壙為本山勤舊皆壘石成之總名三塔海會塔在寺龍臂前崙丙子冬僧良聰重修塔中題淳熙間禪師歸寂有猿鹿悲鳴羣鳥獻花之句丁亥歲常熙耆舊捐資重修局面嚴振規模壯海會之大觀收羣峰之嘉氣請師說偈偈曰翠竹林中無縫塔百千舍利現其中大悲同體雖非別殊勝莊嚴在爾躬報恩塔在尉斗山萬松菴之左辛巳夏諸耆舊同本山和尚共捐衣資三十金以充常住葬諸佛母名曰報恩有碑一座菴中祀牌位春秋祭掃用昭報本之道偈曰人生大本重丘山未報劬勞暗淚潸忽悟萬靈共一體雙親頓證剎那間
