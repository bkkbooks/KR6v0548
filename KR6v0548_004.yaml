隱壽八十餘誕十月初三日寂六月念四日塔在石泉右邊坐丁向癸兼未丑第二十三代際愚朗純禪師派行了愚號厚山仙遊人姓蔡丱歲從邑之龍華寺濬微和尚芟染並承衣拂乾隆癸亥八年八月初三日嗣席黃檗冬至陞座開爐第三日正是冬至節一陽復來生羣陰盡消滅梅蕊放南枝簾櫳綻玉屑時時示當人人胡不自瞥須痛切真秘訣殷勤提出為君說未肯說笑欲絕塵說剎說熾然說直說竪說縱橫說任教說有百千言總似眼中重着楔喝一喝下座生康熙癸酉年十月初七日寂乾隆癸未年十二月念五日卯時世壽七十有一塔在黃檗寺前吉祥峰後崙第二十四代際傳心然禪師號積翠莆田白塘李氏四歲禮誌崑公落䰂傳仲祺老人心印乾隆戊辰年三月十二日嗣席黃檗中秋上堂拈來一片月輪秋照徹閻浮百萬州滿眼清光何所似娟娟如水遍天流復舉寒山子云吾心似秋月碧潭光皎潔無物堪比倫教我如何說山僧今夜放出一輪秋月獨耀乾坤光吞萬象皎潔無塵豈中秋之月可比虛明絕待非照世之珠可倫但要諸人高着眼睛向此一輪秋月中𨁝跳得出如或未然今夜月明人盡望不知秋思落誰家以拄杖卓一卓下座結制上堂云從來黃檗出良工大冶宏開紹古風猛火一團禁不住直教烈焰亘天紅山僧今日開爐有點鐵成金之妙手豈特銀孩兒一鎚打就金彈子一火鑄成任是焦頭爛額底漢到這裏便能令其見山是山見水是水則三藏十二部千七百則葛藤無不洞然了徹且道怎麼生是洞然了徹一句遂喝一喝云開爐不解甚肝腸大地山河盡舉揚但愛諸人叅得透更無佛法可商量除夕小叅年窮此夜欲如何却笑北禪事太多若解山僧分歲意大家齊唱太平歌所以道一年三百六十日今宵正是結交頭山僧也無奧妙理與汝商量也無奇特句子與汝解會秪藉此一盞青燈數杯苦茗與諸兄弟談箇守歲事情雖然如是且如何是守歲事情遂顧示左右云明年更有新條在惱亂春風卒未休誕康熙戊辰年四月念四日午時寂乾隆壬申年三月初四日酉時世壽六十有五臘六十一辛卯年葬嵩山祖塔坐癸向丁語錄二卷幻隱集一卷行世第二十五代際深智泉禪師派行如深雪華公徒法嗣咸照瑞木和尚乾隆壬申繼席黃檗臘八戒期上堂法鼓初鳴卿雲藹藹交集人天雪山現在瞿曇覩星菩薩圓戒妄想蠲除不憎不愛智慧莊嚴無罣無碍信解受持終身頂戴等閒踢倒須彌照顧眉毛臉黛叅得面目本來共入毘盧性海卓拄杖下座後退居本邑福興院舊隱乾隆五月初五日示寂塔在檗山紀遊亭裡大路墘第二十六代達崗傳陵禪師派行如崗莆田宋氏子十歲依福清資福寺大照公薙染秉石龍和尚戒嗣大機老人衣拂乾隆間主席黃檗偈酬陳居士善香臺遲選勝佳日記春秋蠟屐尋前約吟筒遞遠愁神馳三島鶴夢醒六窻猴即景皆成詠奚須秉燭遊後退隱舊居九月念四日入滅第二十七代際郁湛青禪師仙遊林氏傳靡瑕和尚心印乾隆丁丑繼席黃檗開戒上堂向上一着人人本具匡宗一念個個不無所以山僧住高田木食草衣自遣居山逸興今住黃檗匡徒領眾少酬出世平懷若以提持箇事大似行人負重担將過獨木橋恐教失脚既得橋已過矣自有一路坦平東西南北任人所之及乎到家之時便稱慶快汝諸人昨日沙彌戒已受今朝又進比邱亦如行道之人從遠地歸將隣家舍矣但山僧尚有一寶未然舉似更待八日明星現時對人天眾前呈似諸人然知此事且置只知竿頭進步一句作麼生道他家自有通霄路不向如來行處行第二十八代際位若育禪師號蓮隱仙遊謝氏父仁升公母李十歲禮本邑大中三會寺肅安耆德剃度受仲祺律師滿分戒嗣靡瑕和尚衣缽乾隆庚辰二十五年三月初四日主席檗山立兩序執事上堂一水無以和羹一木無以搆室一絲無以成文繡一音無以諧琴瑟况叢林大任尤非一人之力必藉昆仲同心股肱輔弻所以楊岐佐慈明睦州扶黃檗名顯千秋功流當日法苑儀型宗門矜式諸大德須委悉見義勇為毋固毋必顯煥緇林匡扶法席馬無千里漫追風鶴有九臯憑展翼寂乾隆十一月二十日舍利塔造屏嶂峰麓語錄四卷行世第二十九代際茂道林禪師莆田陸霞寺應佐耆德徒並承心印乾隆二十六年辛巳臘月嗣席黃檗金蓮寺用來韜翁掃福嚴費隱法祖墖請上堂巍巍寳藏翠崚嶒濟濟兒孫遶墖前百里到來伸祭掃心香馥郁遍三千遍三千拜福嚴祖印遞傳金蓮閣源流不紊一家禪是以世尊拈華迦葉破顏笑達磨面壁神光傳心印須遇這個人方明這個事要行者個事還他者個人秪如羯磨韜翁飲水知源酬恩有自不辭跋涉登山報本一句作麼生道竪拂子云鴛鴦枕上雙痕淚半是思君半恨君第三十代際萱雪椿禪師號莊齡派行衍萱莆田許氏少聰悟異常經偈過目不忘福清應峰寺純陽大德見而器之年十九為之披剃乾隆辛酉臘得清亮和尚具足戒承碧遠老人心印精持華嚴寒暑弗輟乾隆癸未主席檗山啟戒上堂法昌搬羅漢圍爐人貧智短靈雲見桃花悟道馬瘦毛長雖然各見一邊未色互相鈍置老僧今日開戒不用如何若何只要諸人着些精彩稍遲疑灼破頭顱粉碎秪如心不是佛智不是道劍去久矣方乃刻舟又作麼生不妨於三條椽下七尺單前仔細摸索看忽然摸着鼻孔便知道不遠人喝一喝後退居應峰舊隱誕康熙庚午年七月念四日午時寂乾隆辛卯年十月初五日酉時世壽八十有一臘六十二全身塔黃檗下棋壠塔菴左畔語錄二卷隨大藏流通第三十一代達盛慧隆禪師派行真盛莆田蘇氏康熙壬辰年五月初一日辰時誕十歲依福清江陰東嶽寺智才公落䰂從濬微律師完具得智石老人衣拂乾隆甲申年主席黃檗臘八上堂昔周穆王癸未三年臘八是世尊成道之日今乾隆甲申二十九年臘八是新菩薩圓戒之辰人去二千餘載道傳百有餘代世界總無殊異佛法不分今古清晨天柱峰頭明星燦爛與正覺山前昔日無異若能見此了悟奚必三秪煉性百刧煉心茲者人人登具足個個入圓明趂斯慶讚之期與汝等同向大殿禮釋尊如來叅究奇哉奇哉話頭可也以拄杖子引行乙未退席于後坪構西巖寺靜住丙午年八月念五日巳時入滅世壽七十有五臘六十五塔全身黃檗環翠亭側第三十二代了鏽極鋒禪師派行空鏽號魯川莆田林氏生康熙戊戌年七月念三日髫齡禮仙遊龍華寺愧立禪德薙髮秉曾師祖朗純老人戒並承心印乾隆丙申四十一年三月十八日繼席檗山結制上堂黃檗由來爐火烈純鋼打就無頑鐵逗到于今法式微規模套數盡虛設忝住持難補缺諸人擂鼓請持綱及此冬期制要結伎能檢點皆平常沒甚稀奇好秘訣與君只約法三章聊以循途而守轍第一日中粥二時囫圇吞下須防咽二章夜裏長連床本有光明休撲滅三者山門殿裏磚行來行去踏無裂九旬禁足好安居二六時中惟結舌長期短限總無關秪要人人都打徹寂乾隆辛丑年十二月念七日子時墖在龍華寶幢山麓第三十三代了祥慧國禪師派行真祥覺五其別字也仙遊縣許天常公子母丁氏十齡從福清縣福廬寺智閑導師落䰂弱冠依萬福心然和尚毘尼法席遍探律藏遂稟具足戒叅海內宗匠六十餘員未徹底蘊一日過赤㠌停舟三十六㬵湖值潮漲洶涌如雷從脚下震大悟本來遂有拄杖橫挑海一盃句克明老人見之首肯深為印證焉乾隆丁酉郡邑縉紳本山耆宿敦請開法却之者再己亥入院百廢俱舉波旬雲擾鎮之以定疏經內翰孟諱超然請上堂九禪客俱出問話師以拄杖橫按住照成師問如何是法華細繹一乘說師云窮子三車城外决進云如何是般若尊崇兩足稱師云梵王百部法中因如何是法門舒掌楞伽語師云迥絕達摩文字舉進云如何是方廣惟心法界觀師云秪從兜率內宮看奕賢師問如何是秘藏槃禪海重師云指南總得三經用進云如何是大乘金剛无所住師云天龍八部聲聞懼進云如何是淨名菩薩道塲寬師云最上恒教十力翻進云如何是神通寶篋不思議師云日象三秪妙覺知師問宏槃師如何是華嚴云普眼菩薩欲見普賢不可得問希椿師如何是法華經云如來如實知見三界之相問幻住師如何是楞嚴經云吾不見時何不見吾不見之處問定覺師如何是圓覺經云一切障礙即究竟覺問不愚師云如何是般若經云滿慈白佛觀前義眾無對普青師惠嚴師繞法座一匝振錫三聲而退乃云離性離相非異非同無垢可磨無塵可染三糸淨印楷定疑關八識真燈照開闇室渡迷津以寶筏邀失路以金繩空不自空因性故空有不自有因心故有至於六十二見行徑三十七品願源非五色之能盲豈四維之可量法華一乘之說般若兩足之稱方廣法界之觀楞伽法門之語及以槃之秘藏淨名之道塲寶篋之不思議金剛之無所住皆是匯百川為一滴摶百藥為一丸融釵鎦為一金攪酥酪為一器如坯經鍛似畵得膠從麻出油從木出火毋須擬議宜細叅尋庚子仲夏晦前五日議謝檗山事謂眾曰明年此日能於廬峰相見乎主事岡測辛丑春杪退居十笏軒靜隱五月二十日晨興沐浴禮經十號飯畢書偈云昨夜問龜哥報道今朝吉復留最後句掩龕云五十六年與世呆纏挨到者裏一切了然聻便封載問光等日中未光答正午遂瞑目泥洹時忽風雲慘淡禽鳥哀號入那伽定容色怡然頂心猶溫世壽五十有六坐四十七夏塔於黃檗之下旗壠首癸趾丁語錄四卷入藏第三十四代達捷開科禪師派行繼捷仙遊張氏父宗定公母劉九歲依邑之九座寺文興上人披剃嗣而煌老人衣鉢從慧隆和尚納具乾隆辛丑嗣席黃檗祈雨上堂陸地龜紋實可悲萬民望切在斯時蒼天急慰蒼生意鞭起青龍甘澍施柟檀通上闕聖眼鑒微私遂焚香默念真言復喝一喝云摩斯急聽真言勅盆雨淋漓遍四維上帝臨民皆赤子有求必應豈延遲語錄四卷行世第三十五代際念了情禪師派行真念莆田姓劉幼從福清松隱堂智白大德芟染傳晦谷和尚心印乾隆辛丑嗣席黃檗六月念四日示寂全身葬于紀遊亭大路上本師仝墖第三十六代際璽珩玉禪師派行通璽號琢菴師福清白象寺明璣大德乾隆戊午從曇慇和尚圓戒嗣傳至導師衣缽壬寅臘開法檗山授戒上堂開斷際壇塲授婆離戒律進步毘盧境界遊神華藏行門削髮披緇明心見性親登般若直證沙彌諸人能明如是即入薩婆若海便躋阿那律門祛忍土之迷塵植秪園之勝果翻三界為精舍舉十方作會源齋剎海之聖賢滿恒沙之誓願得象王之廻顧等鶖子之神通且道因齋慶讚一句作麼生舉竪拂子云解脫根塵無着跡磨開心鏡自分明康熙己亥年五月初五日卯時誕乾隆七月念六日巳時寂塔舍利于本山馬鞍嶺第三十七代達鑑成瑛禪師派行慧鑑仙遊吳氏父元疇公母黃十歲從邑之三會寺而煌公得度並傳心印乾隆癸卯嗣席黃檗上堂春風開竹戶夜雨滴花心一一示西來意旨明明闡格外玄音天不言四時行地不言萬物生祖翁留片地的的得耘耕除却無明草靈苗自發榮心王不妄動六國罷行兵卓拄杖云寰中天子垂裳治不動干戈見太平語錄四卷隨大藏流通第三十八代了心慧長禪師派行真心莆田朱氏年二十七從福唐九龍寺智見大德祝髮秉智泉和尚戒承珩玉律師心印乾隆庚戌繼席黃檗啟戒上堂萬法是心光諸緣惟性智本無迷悟人只要今日志所以千巖和尚道叅禪為第一受戒為第二福田為第三梵行為第四這四事什麼解得去也菩提樹下菩提長般若光中般若根卓拄杖下座生雍正甲辰年三月十四日子時寂乾隆五月初九日壽七十七臘五十塔千指菴右側山麓第三十九代達埒承垠禪師派行廣埒福清林氏年十三從邑之香城寺有珠禪德脫白秉智泉律師戒傳智睦公心印嘉慶丙辰臘月開法黃檗啟戒上堂佛祖之道仰之彌高欲學心志貴要堅牢譬架樓臺先須基實基若不實總成百尺也是徒勞汝等不遠千里而來大戒可謂至誠者矣古云一切有心者皆得授佛戒豈唯毘尼律部十支三聚而得受持凡世出世間法種種諸因緣無不可學而得成就汝等既登寶壇更須培增精進積修妙果以報佛恩寂嘉慶三月念二日塔于塔庵右崙第四十代達光道暹禪師派行宏光一菴其別號也閩縣林姓父右武公母吳氏娠有年餘夢吞摩尼誕乾隆乙亥年八月初八日白衣重胞襁褓尠言笑晬辰適師祖慧滿耆德分衛舍間見如舊識愉悅不已遂為摩頂命名齠齔界泉導師携就妙音古剎削染冠依西巖律師納具令看無字昕夕叅究質疑慧國老人獲臻閫奧即承印可五車三乘雖已了了文龍義虎之稱亦俱不屑就迺徧游燕趙吳楚叢席講肆扣擊毋倦辛丑甲辰迎鑾江上嵇彭二中堂有無字尊者之目延住越之招慶豫之延慶嘉慶丁巳主席萬福甲子開法崇聖結制上堂夫佛知見者平等圓宗妙明正覺無生無滅不去不來扶桑國師竪底是兩股火又道山遠祖搬底是一堆土塊紫雲老人剩底是蘆花柳絮麻線竹針今日黃檗十字街前渾身泥水擘開乂口等箇人來不管山河日月草木昆虫石頭瓦礫木杓笊籬醢醬鳧茈餚膳衣服貓頭鼻驢脚龜毛一並收拾緊扎袋口極力拋向香水海中九旬淹殺免得魔魅人家男女大功德在請首座宏敏公上堂輝今耀古胸襟探寶珠於驪龍穴底揭地掀天手段解金鈴於虓虎頷中標榜人天紀綱佛祖傾湫破浪直垂千尺絲綸攫霧拏雲陡起一聲霹靂全生全殺照用歷然有卷有舒主賓煥爾扶勷講席輔建宗猷共竪光明幢齊通正法眼羽翼功成藉大鯤之變化爪牙力擴昭元豹之文章欲要得人須憑知事良久顧大眾云正與麼時且道與上來說話相去多少如若不會問取堂中第一座端午上堂節屆中天時當日午鬱壘神荼門前耳語駕起蒲龍招來艾虎拈須彌槌擊鹽官皷打神山鑼撒極樂土唱德山歌起道吾舞舉趙州無談雲門普海藏龍宮天堂地府摩囉摩囉蘇嚕蘇嚕拍禪床云赤口白舌悉消除朱雀黃旛皆伏俯千妖萬怪永潛蹤百毒五氳齊服肚喝一喝辛酉再退本山席獅菴靜住續修五燈全書省垣紳衿延就雪峰崇聖道塲結制閱數期退隱侯官妙音丁卯又住萬福輯修寺誌造壽墖環翠亭側語錄遊戲三昧集十卷行世第四十一代了鈺繼宗禪師派行智鈺號卓峰福唐陳氏九歲禮邑之香城寺承坅導師得度從道林和尚納具得了情律師印可嘉慶丁巳嗣席檗山上堂心本無心心即不可說之心而心不生法本無法法即不可說之法而法不滅不滅不生獨露常存明如日月淨若氷霜蕩蕩廓週沙界歷歷遍滿十方在聖不增一絲毫在凡不减一絲毫正是金剛不壞寶戒佛性本有之根源大眾還會麼但得一番摩煉淨當臺寶鏡絕纖塵卓拄杖下座戒錄序云嘗聞之師曰經者常也是為人所常行之法心印之傳皆由於此其意旨幽元難以言罄所望解之者剴切詳明俾階前頑石聞之亦能點頭則雪山面目始得其真奈余無宿慧幼年薙髮愚昧不明如誦笤箒者每誦笤而遺箒誦箒而遺笤但恐迄用無成是以力持不已近承闔邑紳衿本寺耆宿謬推承乏一經未諳半偈無聞僅遵不二法門體如來之真心愍眾生之妄想指遺珠於髺上云珠即在此引窮子以歸路曰此即爾家亦何必旁徵遠引歧途之外又遇歧途絲染之中復遭絲染至於似是而非亡羊不返日見差池今者三藏之經博而難窺一字之師約猶可守唯是自以不知是知知之若此亦以無說為說說也何如爾等悉意皈依傾心受具諦聽余言自茲以後當求實行勿務浮華如此之外更無餘法善護念善付囑勉之勉之無復饒舌誕乾隆乙丑年五月念五日寂嘉慶十一年十一月十五日巳時墖全身馬鞍嶺第四十二代悟春界陽禪師派行通春號初菴莆田林氏九歲依福唐黃檗慧實大德芟染從慧隆和尚納具慧恭導師傳以衣拂嘉慶戊午梅月本山開戒上堂靈機奮迅妙用縱橫栗棘蓬要汝生吞黑竹篦忽然煥彩鋸鬼角于泥牛頂上拔龜毛於石虎腰邊最初末後一齊撒向搕𢶍堆頭吉祥峰下然雖如是且道今日直進比邱具戒一句作麼生無邊垢盡煩惱除翻身便作真獅吼下座佛誕陞座風不凉日不𤍠軟非綿硬非鐵呼龍為魚證龜作鼈指天指地稱尊磕底頭破腦裂如麻似粟狠兒孫一棒打殺除妖孽除妖孽沒交涉驀顧大眾云䭾喃軍茶利阿逸多室哩曳佉呬采菽氏大龜氏鶖子馬鳴荳藪婆諸大如來菩薩齊向山僧拄杖子頭上㝗挻扔稱冤呌屈吅𠱠昍昍為汝諸人演說心地戒法去也曳拄杖下座誕乾隆乙丑年五月初七日嘉慶辛酉年十一月初八日說偈泥洹塔于下棋壠第四十三代了曇自芳禪師派行如曇仙遊郭氏生雍正甲寅年八月念七日亥時十一歲邑之靈山寺璨玉耆德為之芟染秉吾山石英和尚戒傳恢立大師衣拂嘉慶辛未嗣席黃檗佛成道日上堂今日世尊成道天氣恁麼溫和大地無霜無雪幽情愜我禪那如寶中選其至寶金內揀厥真金呈拂子云茲乃如來成道佳晨正衲子傾心之際惹得古今天下諸善知識莫不慌慌忙忙抖抖擻擻各立境界別轉家風竪起拂子云萬象漸囘春梅花遲與早直證如來禪心明是至寶大眾仍向殿中伸拜意聻依舊有條只攀條切莫兩相來鈍置下座以拄杖引行登殿拈香山居偈云林泉受用愛斯居處世漫漫豈獨余李愿頻躭盤谷墅王維深結輞川廬竹松環繞青蒼映春夏相交冷煖如一息頓消灰百念波波挈挈總皆虛摘茶偈含春紫莢倍鮮妍一發清香挹曉烟十指輕沾雲外露拈來活對趙州禪第四十四代了馨清馥禪師派行通馨蘭圃其別字也莆田陳氏乾隆己巳年三月十四日卯時誕十歲福清應峰寺慧海耆德為之脫白弱冠得慧隆導師滿分戒歷證元猷勤叅講席檢討三車秘錄灌慧蕊以恒春搜羅九部微言剪智燈而不夜嗣承玉融慧璣老人法道光四年臘月啟戒本山云菩提薩埵悉利莎訶戒月圓明炳臨剎土法雲縹緲彌佈山河定水璇流千尋瑩徹靈山寶墖一座巍峨簾捲半林花雨麈搖萬壑松濤經卷蒲團六時風動門搥拍扳一曲雲和率性窮源明薩婆若觀心面壁證那由他寶律堅修阿鞞跋致金剛不壞波羅密多祇如歸家穩坐一句作麼道聲聲舍那念念彌陀行也彌陀住也彌陀百千三昧樂娑婆畢生菩薩摩訶薩天上人間唱哩羅喝一喝下座五年十二月退隱舊山丙戌四月念六日酉刻說偈曰七十年來有八年蒲團坐破不知禪今朝若問歸何處大地虛空自坦然遂泥洹而寂世壽七十有八臘六十有八語錄二卷
