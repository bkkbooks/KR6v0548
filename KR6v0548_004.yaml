body:
  text: 法上堂小參機緣偈序啓規文摩竭掩室毘耶杜詞不法法也而何嘗無法始鹿野苑終跋提河法無法也而何嘗有法所以貴法者妙悟於謦欬之表超脫乎色相之外默焉清淨絕聖棄智葢其宜爾雖然法以言章固或有繇言而晦法緣言滯未始不因言而通後之學者其亦知正法有所在乎庶不致凐沒此中也若猶未也劍去久矣奚事刻舟斷際運禪師上堂一則機緣四則上堂云汝等眾人欲何所求遂以拄杖趁之大眾不散師却復坐曰汝等眾人盡是噇酒糟漢恁麼行脚取笑于人但見八百一千人處便去不可圖他熱閙也老漢行脚時或遇草根下有一個漢便從頂門上一錐看他若是痛痒可以布袋盛米供養他可中總似汝如此容易何處更有今日事也汝等既稱行脚亦須著些精神好還知道大唐國內無禪師麼時有僧問諸方尊宿盡聚眾開化為甚麼却道無禪師師曰不道無禪只是無師闍黎不見馬大師下有八十四人坐道塲得馬大師正法眼者止兩三人廬山歸宗和尚是其一夫出家人須知有從上來事分始得且如四祖下牛頭橫說𥪡說猶未知向上關棙子有此眼目方辨得邪正宗黨且當人事宜不能體會得但知學者言語念向皮袋裏安著到處稱我會禪替得汝生死麼輕忽老宿入地獄如箭我纔見汝入門來便識得了也還知麼急須努力莫容易事持片衣口食空過一生明眼人笑汝久後總被俗漢算將去在宜自看遠近是阿誰面上事若會即便會若不會即散去珍重師因臨濟義玄問如何是佛法的的意聲未絕師便打如是三度問三度俱打濟皆不領旨遂辭師往諸方行脚去師指叅大愚濟到大愚愚曰那裡來濟曰黃檗來愚曰黃檗有何言句濟曰親問佛法的的意蒙三度賜棒未審有過無過愚曰黃檗恁麼老婆為汝徹困猶覔過在濟於言下大悟曰原來黃檗佛法無多子愚搊住云者尿牀鬼子適來問有過無過如今却道佛法無多子汝見個什麼道理速道速道濟於大愚肋下築三拳愚托開云汝師黃檗非干我事濟囘黃檗師曰汝囘何速生濟曰祇為老婆心切便人事了侍立師曰大愚有何言句濟遂舉前話師曰大愚老漢饒舌待來痛與一頓濟曰說甚待來即今便打隨後便掌師曰者風顛漢來者裏捋虎鬚濟便喝師曰侍者引這風顛漢叅堂去師禮佛次時唐宣宗為沙彌問曰不著佛求不著法求不著僧求長老禮拜當何所求師曰不著佛求不著法求不著僧求常禮如是事彌曰用禮何為師便掌彌曰太麤生師曰者裏是甚麼所在說麤說細隨後又掌裴相國一日托尊佛于師前跪曰請師安名師召曰裴休休應諾師曰與汝安名竟休禮拜師一日捏拳曰天下老和尚總在這裡我若放一線道從汝七縱八橫若不放過不消一捏僧問放一線道時如何師曰七縱八橫曰不放過不消一捏時如何師曰普大安禪師上堂一則機緣二則上堂云汝諸人總來就安求覔甚麼若欲作佛汝自是佛擔佛傍家走如渴鹿趂陽燄相似何時得相應去汝欲作佛但無許多顛倒攀緣妄想惡覺垢淨眾生之心便是初心正覺佛更向何處別討所以安在溈山三十年喫溈山飯屙溈山屎不學溈山禪祇看一頭水牯牛若落路入草便把鼻孔拽轉來纔犯人苗稼即鞭撻調伏既久可憐生受人言語如今變作個露地白牛常在面門終日露迥迥地趂亦不去汝諸人各自有無價大寶從眼門放光照見山河大地耳朶放光領采一切善惡音響如是六門晝夜常放光明亦名放光三昧汝自不識取影在四大身中內外扶持不教傾側如人負重擔從獨木橋上過亦不教失脚且道是什麼物任持便得如是且無絲髮可見豈不見誌公和尚云內外追尋覔總無境上施為渾大有珍重僧問大用現前不存軌則時如何師曰汝用得便用僧乃脫膊遶師三匝師曰向上事何不道取僧擬開口師曰者野狐精出去雪峰因入山採得一枝木其形似蛇于背上題曰本自天然不假彫琢寄與師師曰本色住山人且無刀斧痕右南嶽下月輪禪師上堂一則機緣四則上堂云祖師西來特唱此事自是諸人不薦向外馳求投赤水以尋珠就荊山而覓玉所以道從門入者不是家珍認影迷頭豈非大錯僧問如何是祖師西來意師曰梁殿不施功魏邦絕心迹僧問如何得見本來面目師曰不勞懸石鏡天曉自雞鳴僧問如何是目前意師曰秋風有韵片月無方僧問如何是衲衣下事師曰石牛水上臥東西且自繇右青原下大休禪師偈一首據莆周軫撰心鑑公建寺始末紀錄出不立孤危不背宗水銀墜地鏡懸空道人看盡西湖景畵艇依然繫晚風右法系未詳第一代開法密雲圓悟禪師入院法語二則上堂二則入院至山門師以拄杖指云昔日遠祖斷際禪師從此出今日不肖兒孫從此入雖然出入不同要且同為標格呈拄杖云大眾還見麼便入至方丈師佇立云祗者些兒去處從上佛祖與人解粘去縛之所且道忽遇赤條條地來時如何正好與伊三十拄杖為甚如此不見道青天也須喫棒上堂拈香云者瓣香與天地同根萬物一體向爐中端為祝延今上皇帝聖躬萬歲萬歲萬萬歲恭願皇圖鞏固帝道遐昌天下太平萬民樂業次拈香云者瓣香收來刦遠舉處全真向爐中奉為滿朝文武天下官僚本山護法請主并及遠近檀那伏願同明本地風光共證元初正體復拈香云者瓣香不從他處得來祇向自信中拈出四囘向爐中供養直隸常州府荊溪龍池山禹門禪院傳曹溪正脉第三十三世幻有先師傳和尚用酬法乳之恩斂衣敷坐上首白椎竟師云隻葉扁舟泛海中乘風來到福城東洪波浩渺無餘事只作拋綸擲釣翁還有衝浪金鱗麼出眾相見一僧出以坐具覆頂云和尚還會麼師打云一釣便上僧一喝歸眾僧問昨日金粟今朝黃檗金粟黃檗即不問獅子吼句是如何師云看脚下僧呈坐具師便打僧喝師復打問如何是向上事師云黃檗山頂問慈雲彌布獅象駢臻和尚將何垂示師便打進云恁麼則無影樹下一枝華香滿大千世界師云切莫眼花僧禮拜師乃云口吞佛祖氣葢乾坤剎海無餘大方獨步所以道法隨法行法幢隨處建立全機大用覿面提持若金翅擘海直取龍吞衲僧無凑泊處眾生無迴避處祇要諸人略回光相著眼自看便見透脫分曉驀呈拄杖云還見麼擊香几云還聞麼若也聞處精明見處透徹則聲色翳障全消聞見之元亦脫似透網金鱗通身踴躍正當凭麼時如何舉頭天外看誰是我般人復舉黃檗斷際禪師旅寓洪州開元寺裴相國一日入寺見壁間畵問寺主云畵是什麼寺主云是高僧相國云形影在者裏高僧在什麼處寺主無對相國云是處有禪僧麼寺主云有一人相國遂請黃檗相見舉前話問檗檗召云裴休休應諾檗云在什麼處相國于言下有省師云二大老激揚個事大似焦磚打着連底凍自他不隔於毫端雖然如是簡點將來未免旁觀者哂且道誰是旁觀者良久高聲召云大眾還省麼苟省則知裴相國落處不省則祇知事逐眼前過不覺老從頭上來喝一喝下座解制上堂僧問解制結制總不問不解不結一句作麼生師云舌頭原在口僧拂袖便行師云切莫亂走問三月安居今已滿歸家底事是如何師云看脚下僧頓足師云未在問如何是中元節屆師云今朝七月十五問大座當軒獨露本來面目豁開戶牖放出無位真人元是屋裏底為甚人不識師云為汝眼花進云和尚道什麼師云道汝耳聾僧便出師乃云共來黃檗山聚首三個月愧我無法說白棒當頭楔不圖結良緣却要恨徹骨今朝各自行個個都禿橛復云今朝七月十五家家追宗薦祖寺寺供佛供祖惟是本分衲僧却尚超佛越祖為甚如是丈夫自有冲天志不向他人行處行便下座第二代費隱通容禪師入院法語五則上堂二則序二首入院至山門云盡大地是個解脫門且道從何處入良久從脚跟下入便進佛殿云過去已過去未來猶未來現在作麼生坐斷主人公向何處出氣容上座到者裏即得大展三拜伽藍云叢林藩籬佛法金湯自受靈山囑付直到而今不忘且道以何為驗看燒這一瓣香祖堂云西天四七東土二三盡在者裏日午打三更舉香云今日不肖兒孫到來一時捉敗便燒方丈云釋迦在者裏掩室維摩在者裏默然古今天下老和尚在者裏橫說竪說容上座在者裏作麼生施設一棒一條痕一掌一握血遂據坐當日眾請上堂師至座前拈山門請啟云披厯佛祖肝膽拈掇衲僧性命盡在個裡山僧不敢囊藏被葢時向人間拈出仰煩維那對眾宣讀維那宣疏畢師指法座云寶華王座為眾兄弟顯本分事了也既若眼見耳聞便可休機罷釣設或未然容上座錦土鋪花去也遂陞拈香云者一瓣香如天普葢似地普擎爇向爐中端為祝延今上皇帝聖壽萬歲萬歲萬萬歲恭願皇圖綿鞏固之休峻命衍基隆之運者一瓣香該羅今古統御人寰向爐中奉為滿朝文武天下官僚并及福清縣主諸位高官恭願福祿同滄海壽算等喬松者一瓣香根苗有據不涉繁端爇向爐中奉為現前兄弟本山護法遠近檀那恭願同明向上宗猷共證本地風光者一瓣香最初到處尋覓不得到手一旦到手便乃當陽披露不可指目末後遇著個沒眼睛老和尚伸手一揑直得脫白無光爇向爐中專為現住浙江寧波府鄞縣天童寺傳曹溪正脉三十四世本師密雲悟和尚用酬法乳之恩遂斂衣就座上首白椎竟師云龍象眾目前彌滿第一義理合共知請出來吐露看僧問昔從黃檗去今向黃檗來請問和尚無去無來作麼生道師云頭頂天脚踏地進云去來且止黃檗消息如何師便喝進云砂盆雖破家風還在師云與闍黎無干問坐斷白雲佛祖無處潛踪縱橫十字凡聖不可等階意旨如何師云放汝三十棒進云恁麼則亘古長明祖燈增照去也師云閒言語問未離馬峰遍界風光騰瑞彩纔跨猊座眉間劍氣爍鋒鋩黃檗門庭即不問祝聖報恩事若何師云天長地久進云九天閶闔開宮闕萬國衣冠拜冕旈師云阿誰不願進云一句了然超百億便禮拜師噓一噓問一線陽春曲繇來和者稀如何是陽春曲師云眉毛八尺長僧禮拜師云何不再進後語僧歸位問黃檗祖庭久寂寥蹉跎虛度幾春秋今日蒙師呈此令臨濟家風事若何師便打進云恁麼則昔日臨濟今朝黃檗去也師云汝增我不得乃云全機展演一道提持葢古覆今超聲越色突出報化佛頭拽脫娘生鼻孔向此辨明得去便可施大機發大用與銅頭鐵額敲枷打鎖超宗異目碎骨取髓天上人間解粘去縛佛祖塲中抽釘拔楔所以道縱橫無碍殺活自由我為法王於法自在正當恁麼時安家定業一句作麼生道拈拄杖按膝云橫按鏌鋣全正令太平寰宇斬癡頑復舉當時世尊初降生一手指天一手指地目顧四方週行七步云天上天下惟吾獨尊後來雲門文偃禪師云我當時若見一棒打殺與狗子喫貴圖天下太平師云世尊衍鐵牛機雲門明格外句雖則各露風規要且未合本據且道如何是本據底意天上有星皆拱北人間無水不朝東卓一卓下座居士陳治安林有喜林正立夏春暉吳承啟龔士龍等請上堂僧問身居學海意出雲霄花無戀影之心境不畱人之迹正恁麼時是何境界師云獨步大方進云如何是黃檗境師云十二峰高如何是境中人師云頂天立地如何是人中意師云自家薦取進云人境已蒙師指示人忘境寂事如何師云頂門劈開進云如何是學人自己師便打云還不知羞問色身非我我亦非真如何是本來面目師良久云會麼僧噓一噓師云鼓粥飯氣乃云眉橫錦繡披一念於古今目機銖兩融古今於一念非彼非此非遠非近即躔離躔居世出世游歷宗家舉揚佛事道骨叅天仁風洽爾人天贊之有分緇素誦固無窮然而更要信得當人自己分上有一叚描也描不成畵也畵不就如此底奇特之事佛祖窮之不到人天贊猶莫及坐斷要津不通階級所以發明奇特事須是恁麼人要是恁麼人方明奇特事既若發明得去則與山僧拄杖子同條合命且拄杖子初無多少奇特祇是風標獨立斬釘截鐵喚作山僧拄杖子却是現前眾居士喚作現前眾居士却是山僧拄杖子無二無二分無別無斷故正當恁麼時歸根復本一句作麼生道萬物盡資和氣力靈苗豈藉四時推以拄杖卓一卓下座題白雲端禪師語錄序遠祖白雲守端禪師於曹溪正脉自南嶽讓始源流至祖乃第十三世也示生於宋及其出世始末事績略載會元曩者通容行脚時閱方冊中有浮山遠推重其發明臨濟三頓棒大有過人處因是覔祖全錄竟不獲一覩為懷茲赴黃檗請有興化若雪禪人偶於店舖敗紙堆中拾得一冊被蟲蛀所食殘缺殊甚雖非全帙而亦嘗臠得鼎亦有頌古試比聯珠僅存什一遂命侍者將聯珠內凡屬祖所著者盡書出合編以備觀覽然於錄內有字句因蛀𡙇減再全錄時依其補正時默宓公同峻初嚴居士發意受梓筆為紀云題虎丘隆禪師語錄序曹溪源流第十六世祖虎丘紹隆師於佛果會下為知藏一日入室次果舉見見之時見非是見見猶離見見不能及乃舉拳問之曰還見麼祖曰見果曰頭上安頭祖聞脫然契證果叱曰見個什麼祖曰竹密不妨流水過果肯之自爾深藏履踐不露圭角有問果曰隆藏主柔易若此何能為哉果曰瞌睡虎耳過後出世有語錄當時人集以成篇不盛帙觀其威弘自若磊落精徤睡虎之言益顯不虛方外多刻行獨於閩中少有見者故舊年於此山鏤刻便與緇素請閱按源流祖之降生於宋和州含山人在高宗紹興六年丙辰五月八日乙亥示寂也旹崇禎乙亥仲春甲戌日第二十代嗣法孫通容拜書于黃檗丈室堂第三代隱元隆琦國師入院法語五則上堂九則機緣三則序二首書啟五篇規文一則入院至山門云從上已來閒門破戶一時八字打開了也且道關棙子在甚麼處喝一喝便入佛殿云巍巍堂堂坐斷十方正當與麼時好與三十拄杖何故不見道斫却月中桂清光應更多伽藍堂云城塹三寶即不無重振宗風如何著力舉香云一番提起一番新祖師堂云西天四七眼橫鼻直東土二三寐語喃喃惑亂天下人無了時今日不肖兒孫活捉將來一爐燒却方丈云掩室杜口狼藉不少古今天下老和尚潑天潑地蝦跳不出斗琦上座到者裏又作麼生驀拈拄杖畫一畫云破也破也擲下拄杖云放出一隊老古錐未證據者看看即日眾請上堂師至座前拈侍御心弘林公請啟云只者個爍破重關徹法源底逼得山僧無藏隱處今日不免對眾舉揚煩維那宣讀宣畢指法座云寶華王座流露真宗我今更踏向上一着千聖俱立下風遂陞告香云者一瓣香向爐中端為祝延今上皇帝聖壽萬安伏願龍圖鞏固鳳曆長春齊壽考於芥子之城扇真風於拂石之刧者一瓣香奉為滿朝文武功勳及郡縣尊官伏願祿位高遷德風遠播者一瓣香奉為本山大檀越並外護諸居士伏願同明般若之正因共證金剛之固體者一瓣香大眾會麼昔年在這裏落節今日向這裏拔本向爐中專為現住浙江溫州府永嘉縣法通禪寺傳曹溪正脉三十五世費隱容和尚用酬法乳之恩遂斂衣就座上首白椎云法筵龍象眾當觀第一義師云第一義諦三世諸佛無著眼處汝等諸人作麼生觀試出𨁝跳看僧禮拜師云勅點飛龍馬跛鱉出頭來問祇園繇來古法席至于今請問和尚還有亘古亘今底麼師云坐斷乾坤僧禮拜師便打問黃檗家風舊今朝令轉新如何是新令句師竪拂子云會麼僧喝師云再喝看僧又喝師便打問陽春初臨法席三開和尚即今將甚麼物示眾師拈拂子左一拂進云者個便是和尚為人處麼師右一拂僧禮拜云謝和尚指示師云指個甚麼僧一喝師云且喜沒交涉問言前薦得屈辱宗風句後承當埋沒家寶正當與麼時教學人向甚麼處模索師云鐵牛橫古路進云不是特來呈舊面隨流一句事若何師擲拂子進云好女不著嫁時衣便轉身師便打乃云棒頭未點遍界全彰鼻孔下垂通身露布脫體承當得去直下頓超佛祖脫若未能山僧第二杓惡水潑汝諸人去也𥪡拂子云向者裏撥一線道不妨輝天鑑地耀古騰今這邊那邊七通八達便能運大鉗鎚施大機用摟碎佛祖頂𩕳掀翻衲僧巴鼻有時孤峰頂上獨立有時百草頭邊𨁝跳在此非此在彼非彼一道平懷冺然無寄蕩蕩廓周沙界歷歷遍滿十虛正當與麼時共樂昇平如何話會野老不知堯舜力鼕鼕打鼓祭江神復舉二祖阿難問迦葉云世尊傳金襴外復傳何物迦葉召阿難阿難應諾迦葉云倒却門前剎竿著阿難有省師云迦葉盡力提携只倒個門前剎竿然放倒且易扶起猶難還有扶起者麼如無山僧自扶去也卓拄杖云扶起倒剎竿不用纖毫力依舊𥪡門前千古明歷歷卓拄杖下座開藏檀樾請上堂師竪拂云三藏十二部一切修多羅總在這裡流出且道這裡從甚麼處流出脫若會去翻藏已竟皇恩祖德一時酬畢若猶未然山僧向第二門頭展演去也大聖無名美流萬世大功不宰勳業湛然所以大人具大見大智得大用一言含萬有一句逗羣機廣羅法界以無遺細入微塵而靡間生民共沐恩光草野均沾利樂浩浩蕩蕩民莫名焉茲逢吉日良辰慶雲繚繞有大檀那運普利心命山僧登臨此座開大寶藏敷演真乘言言見諦句句朝宗杲日昭回山川顯煥中天祖丹心畢露葉相國洪護儼然了三十年前未了之公案翻五千餘卷爛熳之葛藤以酬祖德用報皇恩且道政當此際如何著力等閒舒出娘生手撥轉如來正法輪下座送化士上堂師云龍樓寶閣半傾欹搖拽雲中能幾時特地掀翻重鼎建大家出手要撑持急着力莫遲疑事難方表丈夫兒拈來莖草千金重不是苦心人不知呈拄杖云會麼葢覆乾坤只這箇頂天立地是由誰下座佛誕恬生林居士等為縣主凌公祝壽請上堂問曇花自天降偉人此日生為瑞為祥即不問如何是不即不離師良久云會麼進云恁麼則當陽普露遍界全彰去也師云如何是當陽意僧頓足師打云亂發作麼問九龍方吐水萬象盡聞香降誕右脇下求師大闡揚師云銀蟾初出海何處不分明乃云性海波澄光吞羣象桂輪孤朗影現娑婆經云應以宰官身得度者即現宰官身而為說法應以菩薩身得度者即現菩薩身而為說法茲乃文佛降生之日正是賢侯華誕之晨且道現甚麼身而為說法遂竪拂子云會麼一點水墨兩處成龍五日一雨十日一風德澤溢乎四海仁壽卓立千峰若論衲僧向上一着未離兜率猶較些子突出娘胎堪作甚麼那更一手指天一手指地口喃喃道個天上天下惟吾獨尊敗露不少怪道雲門一棒打殺餵狗子喫貴圖天下太平雲門雖握閫外威權未免渾身泥水到黃檗門下一點也用不着且黃檗尋常用個甚麼只有一雙窮相手未嘗低揖等閑人下座羅山亘和尚至上堂師云進以禮退以樂暖日和風響殿閣出則弟入則孝青山綠水慶雲罩兩相扣擊破砂盆千古長空浩浩閙若將耳聽終難會眼處聞聲無不到汝等諸人各各有眼必也堪聞且道羅山黃檗兩口無一舌撞頭磕額所談何事夜半太陽輝宇宙天明黑漆布乾坤下座元旦上堂云王言如絲其出如綸等閒拈一毫頭家隆國泰信口道一句子草偃風行人間天上共沐恩光此界他方鈞陶至化是以在天天中之聖在人人中之尊在物物中之貴在法法中之王且道在衲僧分上成得甚麼竪拂子云會麼為瑞為祥彌法界如雲如雨覆三千下座辭眾上堂師云八載住持受苦艱呵風罵雨不安閒今朝帶水拖泥去十二峰頭展笑顏大眾且道笑個甚麼波裡橫行波裡睡幸然不沒小江間下座再住黃檗林檀越請上堂西堂良也問黃檗開期慣用本分鉗鎚只如逢着超宗異目底人如何施設師云虎頭帶角出荒草進云恁麼則牙期本是舊知音流水高山不用絃師云隱隱峰頭露一班進云今日林府設齋不比尋常茶飯因齋慶讚一句作麼生道師打云是尋常不是尋常進云直下分明師云秪為分明極乃云陷獸機關妙乎毒手活人眼目所貴藏鋒鋒藏忽然入眼重重翳障淨盡消除手毒偶觸其機一切生靈俱在坎內然世間小小技術亦有神妙不測之功以利天下何况佛祖鉗鎚宗門牙爪一棒一喝一錐一拶一語一默一動一靜之下轉凡成聖者乎故我臨濟見僧入門便喝德山見僧入門便棒又云夫叅學者不避喪身失命我在黃檗處三度問佛法的的大意三蒙痛棒如蒿枝拂相似而今再思一頓無人下手僧云某甲下手濟度棒與僧僧擬接濟便打看這老漢機用如返風囘火奔流度刃毒中之毒鋒上加鋒殺活自由亘赫千古苟承其宗須明厥旨豈可呴呴之仁硜硜之德詹詹之言屑屑之行混雜其間以玷從上綱宗邪茲乃結夏之期眾等請陞此座欲山僧舉揚正法眼藏於清淨大圓覺中一一點出正知正見與諸人共知未審諸人還委悉麼掃却腥臊千萬里唯餘正脉永流通下座縣主凌公請小叅師舉臨濟大師云有時一喝如金剛王寶劍有時一喝如踞地獅子有時一喝如探竿影草有時一喝不作一喝用喝一喝云是金剛王寶劍是踞地獅子是探竿影草是一喝不作一喝用大眾試判斷看若判斷得山僧拄杖子當堂分付擬議尋思劍去久矣那更形于問荅涉于語言彼此鈍置無有了期所以山僧尋常向諸人眉睫上輪刀走馬汝等諸人須向山僧脚跟下斬釘截鐵兩不相傷各無妨礙得到與麼田地正好孤峰頂上罵月呵風十字街頭拖泥帶水或順或逆或抑或揚激發個事接引後昆堪報不報之恩共助無為之化且今日山僧與凌公覿面相呈各出手眼一句作麼生道玉融風雅千年紹黃檗山輝一點奇復喝云逗漏不少大殿上梁小叅云托出脊梁橫法界大開眼目耀乾坤都盧一座空王殿八萬四千解脫門正當與麼時撑持者撑持蓋覆者蓋覆且道阿那個作得其中主良久云兒孫卓立如麻粟沒量大人獨箇尊喝一喝轉身僧問如何是奪人不奪境師云眼底無人一色新如何是奪境不奪人師云家無四壁不知貧如何是人境兩俱奪師云踏翻世界無踪跡如何是人境俱不奪師云出門俱是看花人進云今朝值遇揮斤手遊刃忘牛世所希師云未知人境在縣主凌公問與萬法為侶政自難如何得不與萬法為侶師震聲一喝云會麼進云未了師云還要第二杓惡水麼公無語少頃問云畢竟如何是不與萬法為侶師云百花叢裡過一葉不沾身次夜茶次問昨日請教大師自見慚愧師云慚愧者誰進云親到黃檗來師云明日向甚麼處去公擬議師云來得去不得進云話頭明明為甚鈎不起師云放下來公應諾又問百丈野狐話不落是不昧是師云山僧不打這兩片皮進云不會師云江南江北問王老一狐疑了一狐疑進云為甚麼又墮野狐身師云汝即今是什麼身公無語師云山僧今夜亦墜異類中去也便作虎聲轉身歸方丈有護乩居士謝雨入山師云嘗聞仙人會作詩仙書云佛何用詩師云天上無空腹神仙山僧今日與仙聯一首遊戲異日載志亦是勝事仙云請和尚先師云仙翁冐雨入山家士囑仙云和尚機速請荅仙停乩罔措師震聲一喝云擬議停機白雲萬里本是木作成靈從何來聖從何起莫瞞山僧好乃自聯云仙翁冐雨入山家何事當機縮爪牙不獨渾身泥水濕片心攪擾亂如麻令侍者度與仙仙齋後和云仙翁冐雨入山家為喫趙州一碗茶莫怪無言為擬議春霖洗落滿山花師云好個春霖洗落滿山花祇是遲了些復次韵云浮囊擊碎了無家竟日貪杯酒當茶出賣風雲誇好手爭如舌上吐蓮花題禪林寶訓序寶訓盛行江北大著吳中而閩粵師僧十有八九莫之見聞欲禪林之振道法之隆詎可得乎余昔行脚金粟時目之如獲至寶懷之有年雖不能力行抑亦不敢須臾忽也是集始自明教老人終於懶菴大師於中三百篇皆從諸老真心中流出而其語言光明正大直截簡切真足為萬世師法會之甚易而行之誠難也貴乎剪華取實急救像季流弊摧邪輔正恢復上古真宗澆漓之風既息渾樸之道斯全而口耳流傳之弊悖逆無根之說曷由興哉余每欲刊行與眾共之所愧囊空弗克其事今玄生禪人鳩諸仝志剞劂流通大有補於閩粵倘遇血氣衲僧磕着一言半句將來蓋天蓋地奚愁乎禪林之不振道法之不隆也非惟予願足此亦不辜從上諸老口門放大寶光照耀天下也夫題臣農即事篇序讀臣農即事篇乃知百草頭邊泣露吟風淋漓感慨撼動天地鬼神擊起赤膽忠心雖林巒草野莫不號呼長太息者矣於戲有國有家有禪林者苟無這段骨氣者副心腸而能成立其事也夫臣農老翁荷儒佛有年今乃遯于桑梓日與村農野牧撫掌高歌拍拍是令而其語言磊落逸性顛狂有時喝馬驅牛有時棒風呵月言人之所未言行人之所未行知他凡耶聖耶儒耶佛耶耕耶釣耶試問高明緇素着一轉語請亘信法弟住黃檗啟建立師宗貴乎莫逆心腹掀翻祖道妙在徹骨弟兄爪牙早已完全肝膽繇來共赤家裡人成家裡事箇中信向箇中傳恭惟法弟德涵海岳道契塵寰一脉長懸隱隱清彈霜夜月雙巒並峙重重流露洞中春忝法愛以來迎仰慈仁而許可因緣出現正值斯時賓主圓融莫非此際僧眾瞻風已久士紳渴化良多更冀速展鳳巢允矣眉端增彩即登獅座儼然錦上鋪華某等停候白椎親聆哮吼慶快平生之願滿足曠刧之心庶浪子知歸山靈有幸復海澄文長曾居士書玄珠禪人賫居士手教并信物領謝領謝山野雖未面晤已知居士從正信中來乃能立志期悟直至古人田地不敢一念退屈比按牛頭喫草者實雲泥懸隔矣又求直截開示山野祇得口挂壁上然居士未開口前合喫三十棒山野與麼道早已鈍置不少那更委曲開示展轉牽絆曷有了期且道未開口前過在什麼處合喫三十棒所冀着實體究無間閒忙忽于不知不覺處磕着山野棒頭敢保生死心七花八裂本來面目獨露堂堂至於迎賓待客呼奴喚婢法法頭頭塵塵剎剎無非本地風光更于何物而可蒙昧者哉得到與麼時節速來通消息復鼓思王居士所尊者道所重者法法道之所在捨身衛之非過也法道之所不在忘名事之奚益焉然今正值禪林秋晚之時破法沙門謬解宗徒靡所不至若非正眼决之恐被邪師所惑衛之事之有何補于法道乎是以我宗貴在眼正眼若果正日常行操則無顛蹶之患入佛堂奧必也可期矣古僧問古德如何是正法眼德云破沙盆且道是什麼意旨所冀居士弗舍晝夜孜孜叅究畢竟是什麼道理脫若㘞地一聲便知山野棒頭落處而頂王之珠甚深微妙之法不待問人了了自明之矣囑囑與鏡汭凌居士書山堂夜話月初凉何處飄來一院香莫是東甌塵外客催人落草暗商量咦一念妄動百計無何造道緇素可不慎哉葢為居士昔日一問不帶枝葉屢屢觸人鼻孔不覺逗漏如此然山僧當時荅處直截根源未審居士留心否徹證否如徹證也便能掀翻窠臼摸捋虎鬚則不被天下野狐津沫所瞞也不妨二六時中心心獨尊念念獨尊頭頭獨尊法法獨尊塵塵獨尊剎剎獨尊更有何物可為伴侶哉然後獨踞公堂應機接物大用現前不存軌則一語一默一錐一拶決千古之猶豫斷未了之公案敲枷打鎖起死囘生為黎民福成差別智正是沒量大人境界非凡小可知也果到與麼田地不虛黃檗山中一面捨此別作生涯棄本逐末則直指之道莫辨何故吾宗貴在單刀直入切忌多途雜毒途多踏草不死毒雜必也難療唯冀高明裁决為快復不凋池居士書來教謂末刧眾生無明濃厚即入此門盡是識神搬弄求其絕後再甦千無一二誠如所論婆心雖切而義未妥何故一切眾生無明濃厚障蔽心目難入此門盡被識神搬弄無時休息故古德呵為門外漢也苟入此門如賊入空屋失却偷心所謂了了見無一物亦無人亦無佛大千沙界海中漚一切聖賢如電拂此便是入門樣子也又云今歲不上公車非是辭榮高尚實觀世味如嚼蠟據山野見處觀世味如嚼蠟正好上公車登大任儒佛並治家國晏然不惟人主坐致太平抑亦靈山付囑猶在矣更承妙象嘉刻併選禪髓見惠何以克當然山野住持事繁未暇覽閱第目髓之一字似未妙也葢髓字係初祖將示寂門人侍側祖曰時將至矣汝等盍各言其所得諸子各呈所得祖一一印訖唯慧可大師即禮三拜依位而立祖曰汝得吾髓今門下不錄機語以古人方便義路為禪髓而謂普被三根者實未能全被也上根聞之未免掉臂而去終不咬人言句中根自有生涯亦不隨語生解下根聞之若存若亡不無葛藤所絆如是則何普被之有哉殊不知宗門下貴在覿面提持抽釘拔楔解粘去縛直令個個獨露本來面目而後已曷有實法繫綴于人乎故我臨濟老人三度問佛法的的大意而黃檗三施痛棒至大愚處點破乃云元來佛法無多子此便是瞥悟禪髓之樣子不獨此老如是乃至有祖以來莫不由此為至要餘者盡是皮毛何足道哉偶因門下一片熱腸不覺噶呾如此諒直夫必受直言故不敢紆曲以汚直腸彼此尚直則直指之道可通不然總被識神搬弄至于驢年無有休歇矣謹復規文教外別傳肇自迦葉禪門規制始於百丈故我土自唐及宋以至於明凡有禪林者莫不遵而行之然行之至者禮義存名位正法道尊付囑弗妄而禪林振矣行之未至規繩不備師資混濫不肖者操其權賢者退其位私念一萌公事盡廢以致中外不睦禪林繇此削弱也苟忽而弗行則無耻之徒分房列戶靡所不為縱有百千共住如惡又聚成外道法奚益於祖庭乎葢黃檗係列祖之席先人不惜身命叩闕請藏為重此席故感得天童金粟二老人闡揚大法醒覺羣迷重光祖道余愧不肖住持八載同諸被子恢復鼎建艱辛萬狀不知有身不知有名屢受無根之謗亦為此法席故也若夫正見衲僧須擇正言行正事不為邪魅所惑則祖法存焉祖法存禪林興祖法亡禪林廢所謂寧可無人不可無法也茲者聖制在邇本山耆舊仝諸執事等須擇吉日起期定執事以存聖制一一依規而行倘有違者耆舊與執事公議擯罰則不愧同住一會亦不辜先人創制之本懷也乙酉年十月十一日寓龍泉丈室書第四代行彌亘信禪師入院法語三則上堂三則小叅一則書一則入寺至山門云欲透祖師關須從這裡入喝一喝便進佛殿云佛身充滿於法界大眾切忌踏着遂大展坐具三拜方丈云居祖室行祖令任是銅頭鐵額到來直教不存性命卓拄杖震威一喝便起當日替舊同大眾請陞座師云古路同行祖庭同入步步相隨心心相印了無異緣亦無二念如空合空如水投水直下薦去多少省力其或未然山僧不惜眉毛為諸人通箇消息良久云囘家盡是兒孫事祖父從來不出門卓拄杖下座開堂拈戶部乾菴陳公請啟示眾云正法眼藏槃妙心盡在箇裡若向文彩未彰時會去不待形言苟或未能不妨重新宣過維那宣疏畢指法座云要提無相毘盧印須向千峰頂上行遂陞座拈香云這一瓣香彌綸萬有統御人寰向爐中端為祝延今上皇帝萬歲萬萬歲伏願天下太平萬民樂業這一瓣香天地同根萬物一體奉為滿朝文武天下官僚本山請主護法檀越伏願福同滄海壽等喬松這一瓣香數載向外追尋一朝這裏翻身今日人天眾前次第二囘拈出專為現住浙江嘉興府海鹽縣金粟廣慧禪寺傳曹溪正脉三十五世費隱容和尚用酬法乳之恩遂斂衣就座上首白椎竟僧問大開爐鞴逼得無位真人沒處藏身請問和尚如何著脚師云待案山點頭即向汝道進云只如龍得水時添意氣虎逢山勢長威獰又作麼生師云一任𨁝跳乃云當陽揭露正體全彰祖令既行千差坐斷所謂法隨法行法幢隨處建立以虛空為爐鞴將須彌作鉗鎚情與無情一火煆出直得上無攀仰下絕己躬如天普葢似地普擎拈花要旨從斯揭露面壁宗風因爾昭明所以道神光不昧萬古徽猷入此門來莫存知解知解若絕不假修持然雖如是祇如今日開堂祝聖一句作麼生道萬邦有道歸王化四海無虞樂太平卓拄杖下座戶部陳檀越入山請上堂師云相逢便拈出未舉應知有撥轉大法輪同伸一隻手法輪一轉一切皆轉轉煩惱為菩提轉八識成四智轉穢土為淨邦轉萬物為自己所謂靈丹一粒點鐵成金至理一言轉凡成聖如斯舉唱尚落今時須知當人分上離名離相絕聖絕凡淨躶躶無依赤洒洒獨露這裡見得徹去不妨隨處作主遇緣即宗其或未然萬古碧潭空月再三撈摝始應知下座安執事小叅師云法席由來古今朝令轉新主賓雖互換元是昔時人所以建立門庭弘通祖道須是其中人方能徹底荷任豈不聞懶安佐靈祐黃檗輔南泉是以古人於法為重於身為輕在我衲子分上應須磊磊落落事事無碍始得作麼生說個事事無碍底意有水皆含月無山不帶雲請隱元禪師囘山書彌生平疎懶不堪為人師範素作支遁計以養病軀黃檗祖席非法兄道德光大莫能振其弘規此月初間有書辭檀那會請法駕囘山以安常住慰四眾之望自可期到山方知出遊連江適羅山執事接某囘泉不及親迓法駕候到山恭趨座下以聆清誨餘容嗣布不備第五代超沛慧門禪師派行如沛泉州同安康氏子幼奇頴雖習舉業恒有出塵之志年十七應郡試過南安圭峰報親寺覩寺額欣然曰世出世法無非報親何必世榮乎遂就圭峰示銘公披剃蒙雪峰亘和尚激發箇事頗有入處二十一歲詣黃檗受具戒隱元國師問曰來自何方師曰泉州報親國師曰欲為何事師曰欲求佛法國師曰我這裏一法也無師曰正好着力國師默器之遂入侍丈室往金粟省覲天童掃塔逮應請福嚴龍泉皆命師堂中領眾受囑出山居溫陵誌公洞二載徙玉融獅子巖值時艱益自韜晦或炊烟不繼恬如也太史葉霞丞迎師到府說法欲留就第過夏師不可國師應扶桑請舉師嗣席辭讓至再檀護耆舊敦請益堅始從眾命登堂演法機圓語峻如明珠走盤駿馬驀坡由其深入道奧故爛熳天真得大辨才也春日上堂堤邊楊柳垂青嶺外野花馥郁一氣轉來遍界新物物頭頭都漏泄既漏泄也一毫頭上現全提萬仞崖巔露真智雲林鳥語熾然說塵說剎說無間歇雖然恁麼若向此中明未具透春眼不向此中明且道眼在什麼處便下座叅藩陳乾翁請上堂舉操公大夫訪資福福見來畵一圓相大夫曰弟子恁麼來早是不着便那堪更畵一圓相福便掩却方丈門師曰資福與麼展拓雖則善應機宜也是韜光露影今日大夫到來黃檗八字打開覿面無遮相見了也且道當時是如今是於中緇素得出分明一貫兩個五百其或未然重為指注日暖溪聲泳風和山色彰不因春到戶怎見百花香時兵荒薦至師赤身荷法勉眾以為道忘軀提持向上一着深錐痛拶故學者咸思自奮忘其苦淡沾法乳者率多高明之士焉住十載凡國師公案未圓者悉以圓之洪規丕振康熙二年秋退居獅子巖明年甲辰春囘主圭峰九月末示疾門人延醫診視師却不受大眾詣榻前求開示師拍掌一下曰是開示不是開示一僧曰末後句聻師索筆疾書曰死奚憂生奚悅誰是知音清風明月十月初六日命侍者取湯沐浴剃髮跏趺而逝世壽五十僧臘三十奉全身塔于黃檗海會塔左畔第六代超願虛白禪師派行性願福清江陰林氏子十五歲從城山無生師薙染詣獅巖叅隱元國師一見器之携入檗山遂登具戒又叅福嚴于金粟嚴問曰蚯蚓斬坐兩段佛性在那一頭師作禮曰求和尚開示嚴驀頭一棒師無對嚴以杖擉退曰汝不去還在這裡作麼連棒趕出師直得迷悶盈懷寢食不安定要打徹此一着子因看百丈政禪師語錄老宿見日影透窓問話因緣有省仍囘黃檗執侍國師有年益臻伭奧後隱松溪白雲菴偶有江西之行路由汀州寧化緇素懇留重興東山古剎建東山橋甲辰秋落成玉融諸檀護請嗣席黃檗國師八十華誕上堂法王壽量等虛空擬比虛空又不同四相皆空何所祝扶桑湧出一輪紅山僧出師門墻已有年所仰頌恩德非一朝夕茲八旬華誕豈可付之默然未免拈炷香望東禱祝庶幾頭頭不昧法法圓融遂起身舉香云惟冀吾師壽量與五岳齊高吾師福履同二儀並厚普利羣機剎海三千沾法雨宏提正印王臣萬國仰真風長為宗門典型永作人天依怙山僧祝讚已竟汝等各表殷勤又且如何刧石有盡年無盡海屋添籌算莫窮師重法剔蠧揀魔辨異嘗有浙僧冐稱福嚴得子持數十金入山掃塔師騐其非是而却之復有楚僧頻以怪異惑眾領宰官善信至寺設齋師嫉其邪却之而退時或謂拗執及後二人皆敗露方服師之卓識慧門和尚進塔陞座善知識者是大慈父能與人解粘去縛能與人超生脫死將黃葉而止啼為憐赤子策眉毛而見佛笑煞傍觀檢點將來總是曲順機宜要人親造此道而後已是故我法兄慧門和尚住持十載其德也厚其心也普檀信欽崇諸方景慕茲者化緣已畢撒手歸真舍利晶瑩安藏窣堵只如者一座高而無上廣莫可測且道是天地生成耶良工鑄就耶要明者個端倪必須透頂透底主席十載造永祚橋於寺前康熙癸丑四月末示微疾命執事製龕自治書辭檀樾六月十三日謂諸弟子吾滅後喪事不得從俗明日午時可扶我進龕謦欬一聲即行矣至期沐浴更衣端坐神色不異語眾曰無常迅速各自努力徐又問曰過堂也未眾曰已竟遂索筆書偈曰四大雖已乖違個中自有主持看破去來如幻方知吾不汝欺咄擲筆微笑脫去世壽五十八坐四十三夏奉全身塔于黃檗梅菴右崙第七代超宣廣超禪師派行性宣莆田人從隱元國師祝髮執侍久之後掌記室遷為西堂受囑後隱于閩縣興林寺康熙十二年癸丑冬主席黃檗冬至上堂朕兆未分無許多事及至一氣已分便有生住異滅春夏秋冬若是本分衲僧把斷要津不通凡聖隨他陰陽消長四序變遷羣陰剝盡也未嘗减一些子一陽來復也未嘗增一些子既皆增减不得何妨運至化於無為形乾坤於掌握說什麼能為萬象主不逐四時凋且道無陰陽地上如何通信聽取一偈烏兎空中似箭飛百年影子笑相追山翁兀坐禪牀角使得人間十二時扶桑隱先老人大祥陞座住世八十二年建幢四十餘載七坐精藍開盡英才活眼單提寶劍截斷邪妄藤窠名上達於兩國澤下敷乎羣生化緣既畢示寂夏初人天暗垂淚落日减慧光屈指韶華奄及三載蘭孫桂子布滿華桑箇箇興雲致雨人人賜紫談伭不孝忝承法乳哀慕難忘今日謹陳薄供聊表微忱遂起身拈香曰念師德兮天地長仰師道兮日月光水有淵源兮木有本披肝瀝膽兮此瓣香瓣香已爇普請頭首大眾同詣東方丈影前作禮三拜歲旦上堂元亨利貞乾之德也始乎一氣常樂我淨佛之德也本乎一心專一氣以致柔修一心而成道心也者冲虛妙瘁炳煥靈明化日維新平治家國永息干戈民安物泰人人樂有道之天箇箇享無為之福而我格外衲僧檗峰錫寄三三水湧波瀾六六山添秀氣洋洋大哉萬物資始且道如何是資始之義一年三百六十天今朝萬福從頭起僧問德山入門便棒臨濟入門便喝除却棒喝請師別道師曰此是學來底汝生機處問將一句來僧便喝師曰此一喝未有主在僧又喝曰那個男子不丈夫師便打僧禮退師曰元來不丈夫問工夫既到無心處爭奈無心又隔關還有不隔關底麼師曰石女腰邊裁兎角僧曰堪作什麼師曰鐵牛背上刮龜毛僧曰一任風光滿眼師打曰未許你在師住持五載值耿藩之變閩中板蕩嘗有兇寇持刃入山覩師道貌皆羅拜而去由其慈悲化人故叢林禮樂賴以如故焉戊午春退隱榕城道山即以是冬十一月十九日入滅於三皇殿世壽八十塔於黃檗佛座峰之麓右隴語錄上中下三卷隨大藏流通第八代明淨清斯禪師派行真淨號別菴漳州海澄縣林氏幼習儒年十七禮仙遊縣寶幢山龍華寺德瑞公為師二十二受具戒於泉州招慶亘信和尚處因閱五燈至舜老夫問古鏡未磨因緣有省值隱元國師至龍華師問南泉斬貓意旨如何拜未起國師一踏踏到師擬開口國師連踏兩踏曰我今日為汝困徹師直得通身汗下遂侍國師於黃檗服勤二載甲午國師應扶桑請師以親老不敢遠行歸幢山書華嚴以壽雙親仍登檗山時慧門和尚主席一見即問清兄何不倒却門前舊剎竿師曰推倒易扶起難門曰你試出手看師打筋斗而出遂嗣之順治庚子秋司理李公其蔚請住同安真寂寺寺為希運祖師與唐宣宗所居處浴龍池遺蹟尚存李公請建立宗旨康熙十六年丁巳福清邑侯鄧公獻英請主席黃檗上堂大丈夫須决烈掀翻從前窠臼直下斬釘截鐵拋下栗棘蓬拈却乾矢橛君不見黃檗老婆心太切六十棒打得臨濟腰折後代兒孫不丈夫便向大愚處甄別與麼當作叅禪敢保老兄驢年未瞥山僧不惜眉毛為你抽釘拔楔擲下拄杖曰拈華微笑乃清時之奸雄斷臂安心為肇亂之讒賊喝一喝下座特造國師齒髮墖於松隱堂並甃肓龍橋庚申秋退席復為眾請載住二年壬申應南林請癸酉重興南林乙酉九月望日示微疾二十日早命侍者具觚翰自述出家至叅訪出世本末因緣凡數百言復自撰塔銘未刻令取水淨身跏趺告眾而化壽七十七臘六十五塔全龕于黃檗塔菴公媽塔右崙語錄四卷刊行第九代明晟天池禪師派行寂晟字雲崖莆田縣闊口陳氏子生不啜乳母以米漿養之及長肌體鮮瑩十七求無波師剃度母告之曰出家非細事當如孀婦守節師即佛前發誓律身不精嚴心地不悟明應墜泥犂崇禎辛巳入檗山領戒問隱元國師曰比丘二百五十戒如何是正戒國師提起數珠曰是正是邪師曰與麼奉持去也國師便打次謁九座獅林暢問兜率悅三轉語三問三被打至第三棒倒地半晌方甦林曰任你百問吒吒我只一棒打到底師此時便會棒頭落處復謁亘信彌後再見國師於龍泉國師垂語曰只如無面目真人三頭六臂漢一齊去到作麼生煆他向者裏道一句看或答一槌百雜碎師曰團團原不費鉗鎚國師為首肯時慧門和尚分座師每從咨請一日門出拈古示師中有拈大隨覆龜語云直饒覆却皮骨已露師從前疑滯渙然氷釋侍門隱於泉之誌公洞厯遷檗山丁酉歲受門囑掛瓢斂石丙辰移錫福州仙宗寺壬戌春清斯淨禪師退席黃檗薦師於當道請繼席開堂僧問賓主相逢即且置大振宗風事如何師卓拄杖曰撑天拄地曰八字打開無向背明明露出法王身如何是和尚出身處師一喝乃曰白棒橫拈誰敢當鋒吹毛倒握乾坤失色掀翻是非窠臼截斷生死命根命根既斷則上無攀仰下絕己躬赤灑灑明歷歷所以諸佛出世為大事因緣祖師西來直指見性成佛敢問諸大德性作麼生見佛作麼生成於此洞明新黃檗出世已竟其或未然不妨更下註脚遂卓拄杖下座丁卯春退隱仙宗甲戌六月初示微疾二十一日午刻沐浴二十二日書偈拋筆而逝壽七十二臘五十七塔於仙宗東岡語錄十卷行世第十代明謙惟吉禪師派行道謙號易菴本邑逕江林氏年十三禮良冶導師披剃一日冶問昔僧問古德如何是清淨法身德曰山花開似錦澗水湛如藍汝且道那一句那一字是明法身邊事師曰總沒交涉冶曰畢竟作麼生師曰只在舌頭邊冶頷之甲辰夏受囑隱于獅子巖癸丑充黃檗第一座明年出使日本奔奠祖喪至溫陵候舟五閱月不果旋居福省臺江之白龍菴康熙二十七年受請繼席黃檗上堂以拂子向空中點曰者一字流通古今該括天地三世諸佛東說西說未曾多着一畫歷代祖師橫說竪說未曾少着一畫既不多不少畢竟完完全全磨而不磷而不緇圓陀陀淨躶躶拋向空前打鼓普請看還有人識得者麼若也識得毘盧印由汝東搭西搭如或未知要見西天碧眼胡何只迢迢十萬程己巳秋退席囘居白龍菴師生崇禎甲戌正月二十七日辰時寂康熙丙戌年九月初一日壽七十三夏六十奉遺蛻藏於黃檗尊宿墖第十一代明洽渾古禪師派行普洽莆人心貫律師胞弟也十歲隨兄往鷺峰從心密師薙落二十一同登黃檗叅慧門和尚門問汝在家作何工夫師曰看萬法歸一話門曰汝即今歸一也未師曰金烏東上玉兎西沉門曰這後生且禪堂裏安頓明年受具戒入居侍寮一日門問趙州道狗子無佛性汝作麼生會師曰知音不用頻頻舉達者須知暗裏驚門曰趙州又道有汝作麼生會師曰踏着秤鎚硬似鐵門曰汝他日為人若有人問汝不作有會不作無會汝如何答他師曰老老大夫舌頭拖地也不知親依八載癸卯門退席始承付囑囘莆卜居儀菴康熙庚午春郡守王公原直請繼席黃檗上堂黃檗門下真不藏假雖然生成孤硬從無之乎也者任他瑞鳳祥麟難免亂罵亂打倘非嫡骨兒孫徒云一期過夏以拂子畵一圓相曰只個圓陀陀赤灑灑闖頭多入頭寡分付叅玄上士到此慎勿苟且壬申退席戊子應莆鳳山請開法晚年縉紳姚黃甲延居七星龍光寺康熙五十八年八月十七日說偈坐化壽八十餘塔于仰天巖側語錄二十卷行世第十二代明逕壁立禪師派行如逕本邑逕江林氏父士秉母鄭祖肇修乳名信生崇禎壬午年五月念七日寅時年十六從逸然禪德披剃二十二往漳南山怡石和尚處受具康熙丁未冬蓮峰大師開法仙遊龍華命司記室解制抵南安雪峰叅如幻瘦松老人機緣不契遂出嶺遍謁資福靈機觀靈隱晦山顯檀度南菴依諸大老後囘閩見虛白和尚於黃檗尚問千里歸來如何通信師竪起拳曰只有這個尚曰還別有麼師曰猶嫌少在尚笑而頷之癸丑夏尚將示寂取衣拂授之乃入仙溪東山靜住菴居萬峰之巔惟事耕種以資饘粥又居太平古院癸酉秋繼席檗山據室云這裏是運祖法席當日臨濟大師喫痛棒之處山僧今日忝紹家法合有六十痛棒要人喫在直下若解承當堪稱出羣須是英靈漢敵勝還他獅子兒以拄杖卓一卓便起扶桑國太和山千呆和尚請上堂達磨西來吾祖東邁後先渡海振宗風芬芳挺出孫枝秀根本猶忻與我同呈起書示眾云諸人還見麼此乃我千翁法兄和尚遙向水天萬里之外扶桑國內太和山中高持祖印獨振伭猷傳持黃檗宗旨挽囘濟水頹波道重國主榮賜紫衣茲承信物遠至祖山實愧無似獲分寵光只知欣慶未能舉揚甲申夏退隱惠安縣雲門寺重建院宇相國李文貞公為之書額戊子春寧化縣東山寺結制閱二期歸玉融黃檗戊戌冬再住本山道風益播雍正甲辰四月十二日說偈訣眾而化塔本寺頭亭壽八十三臘六十七語錄千仞山集十卷行世第十三代實任仲祺禪師派行道任莆田任氏法嗣清斯和尚廣嚴菴主宏用領信女葉太奶請上堂云信女傾心結預修不辭寒暑入山遊也知為瑞為祥處惹得天花落未休諸人會麼諸佛放光明共說實相義希有諸比丘是中難比議驀拈拄杖云還見山僧拄杖子麼朝往西天暮歸東土向諸人道有世界以音聲為佛事有世界以香飯為佛事有世界以出入息為佛事復呈云且道者箇世界將什麼為佛事復卓云等閒識得東君面萬紫千紅總是春送諸祖牌位入祖堂捧起牌云撑天拄地播宗風千古何人識祖翁不是兒孫翻一轉爭教大地現慈容故我諸祖老和尚出則千