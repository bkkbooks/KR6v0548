body:
  text: 重興隆琦隱元祖師原本門弟子性幽獨往等編訂續修監寺道昱道升道本宗儀開滋永悅副寺惠秀舜普永施同靜寺宗堂宗愷德科傳圖華懺常澄紹仁本岐紹修校刊外護序啓蓋聞知賢者難擇賢者不易而其護賢者又難於知擇也而况永護教外別傳之正法乎然則能知而不能擇則所知奚益焉能擇而不能護則所擇又奚益焉若惟能護而不能知擇縱然幻起琳宮紺殿遍滿娑婆羣居勞侶百千萬指成魔外法徒益其勞曷有補于正法護乎所謂知擇護三者缺一不可也三者全備則茲山也靈鷲也千古儼然一會與金湯正眼並傳永久而無窮者矣序十九則重興黃檗募緣序本邑葉向高大學士諡文忠黃檗為宇內名山梁江淹嘗有題咏如陽岫飛鸞彩陰溪噴龍泉鳥鳴丹壁上猿嘯清虛間人傳誦之寺宇宏麗高僧輩出自唐以來稱大道場嘉靖間燬于野火僧正圓募緣小院于舊址之後復重繭走京師請藏竟無由達淹留八年卒死長安中人莫不哀憐之其孫興慈興壽等欲成其志時余在政地日來祈懇余亦不能為力也甲寅秋皇上以聖母升遐思慕不置廣為祈福擇名山古剎分置藏經海內共六處而黃檗在其中命中官王舉齎送給內府金錢三百兩為路費賜敕俾住僧守護余告中貴之掌司禮者此荒山梵宇久廢不足以煩中使者不如使僧自齎之為便司禮云此聖上孝誠至念且欲使人觀彼中山川形勝誰敢阻之余時已得請歸田遂先行中貴行至淮為盜所劫盡亡其金困苦不支賴浙中丞劉公給以郵符乃克致命卒事而歸夫茲山自開闢至今不知更幾千萬年始得聖天子被之寵靈不難遣中使發帑金跋涉萬里而來煌煌帝命熀耀于重巖深谷之中父老兒童莫不奔走聚觀以為曠古盛事微獨山靈之幸亦吾鄉里之光也而祇林鹿苑鞠為蒿萊貝葉琅函珍藏無所委君命于草莽寧非吾邦人之過歟或者謂佛教荒唐儒者所闢不宜崇奉不知宇宙間既有此一種道理自不可廢以高皇帝之神聖猶存其説余在留都見其剎名田遍滿畿甸皆高皇帝所給賜也黃檗之為道場已數千年重以今天子之命可不恭乎而正圓以區區一老衲欲行其志雖死不悔其孫卒能成之亦足見彼教之有人而天下事苟有必為之志天亦為動無終格者顧寺宇之興非獨力所能就余謹書此以告于四方之善信知發心樂助者必多揚寵命而答山靈將此舉聊盡臣子之道其福田因果彼三藏中彰明較著不待余為贅矣禪燈世譜序黃端伯昔世尊以正法眼藏囑付迦葉阿難副二傳化母令斷絶逮至五家分唱而宗風遍滿十方矣然黃檗猶有不道無禪祇是無師之嘆何哉當時臨濟小廝獨得大機之用慣捋虎鬚盡令而行大地人亡鋒結舌去黃檗記以吾宗到汝大興于世雖因緣之相會亦作用之迥殊也厥後英靈迭起個個如獅子兒山鬼野狐望風奔遁遂使正法眼藏綿歷至今識者所以服師傳之妙也曹洞綱宗揀魔辨異其大旨略與臨濟同故法道之行與臨濟相終始然自大陽之後投子繼之則曹洞亦分源于臨濟矣昔人謂合五百年而別別五百年而合倘亦有然者乎乃自宋季以歷我明代有英傑而殘編斷簡湮沒于荒榛敗草之中後世兒孫欲識名姓而不可得悲夫廬嶽忞公乃天童大師高弟也廣搜碑傳敘次成編其自靈山以至曹溪則已厯三十三世矣復自曹溪之下以至禹門則又歷三十三世矣前後相承若合符節而天童繼起于其間則代興者政未艾也天童操一條白棒勘驗諸方佛來祖來劈脊便棒縱有神通妙用無處藏身臨濟一宗大興于世奇哉始余承事壽昌咨決最久然猶恨離師太早未盡其長及再侍大師于天童觀其機用而後嘆臨濟之尚存也乃壽昌嘗為余言老僧五十歲行腳印法瑞峰第未詳瑞峰之為誰子耳余閲禪燈世譜瑞峰原與禹門同師則壽昌固臨濟之嫡血骨也其嗣廩山而嗣曹洞實與投子之事相符日月光明並行不悖故世尊所囑副二傳化毋令斷絶于方來哉密雲禪師語録序黃端伯達磨受西天般若多羅密印六傳而至曹溪曹溪之後分為二枝而臨濟之兒孫獨盛臨濟之後又分為二枝而楊岐之兒孫獨盛蓋監寺受慈明之遙記與黃檗之記臨濟正同故禪道獨為天下冠今之所傳臨濟派者則皆系于圓悟勤之子虎丘隆者也虎丘之子天童華知見高邁大慧嘗作偈特稱之天童華傳天童傑傑傳破菴先先傳無準範範傳雪巖欽欽傳高峰妙妙傳中峰本本傳千巖長長傳萬峰蔚蔚傳寶藏持持傳東明旵旵傳海舟慈慈傳寶峰瑄瑄傳天奇瑞瑞傳絶學聰聰傳月心寶寶傳禹門傳禹門嫡子是為今天童圓悟大師大師之望前圓悟勤公凡二十世其望臨濟則三十世而望達磨則四十世也天童居大海之東山川環擁當年之坐道場説法者八十餘員大率皆臨濟之裔也庚午之春余在武林僧舍獨見大師語録一編始知臨濟宗風至今未墜修書致敬請師説法太白山中即天童華禪師故址也棒喝交馳學者無開口處莫不望風而靡以為臨濟再來也大師操履嚴峻有古尊宿之風行解相應與末世之狂禪迥別余嘗覩其用處縱奪自由每吐一言蓋天蓋地其所從來者異矣應般若多羅之讖而中興臨濟之道于今時正令全提坐斷十方世界至矣哉又蔡聯璧達磨西來直指人心見性謂之教外別傳翻盡四十九年葛藤獨拈花一則鋸解不破斧劈不開曷為密雲老人語録緇素尺一奉之夷夏圭璋拱之蓋古尊宿當陽提令各擅勝場有如龍吟虎嘯有如電閃雷轟有如千仞鳳翔有如百川鯨吸有時孤松嶽立有時萬派聲銷非不旗鼓一代爼豆千秋總不如老人嚗嚗論實單單據本不鋪文彩不通意解直下勦絶窠臼斷人命根或與當頭摑攔胸搊或與驀面唾劈脊摟覿體提持未嘗有一法與人每居恆示璧伊問訊時我低頭伊禮拜時我合掌半斤還八兩二五得一十彼自無瘡勿傷之耳老人出世晚年多利人廣自禹門至天童返通玄踞座六大剎金粟稱最盛金粟為余捨身命處余侍金粟凡七閲春秋逮冬制有放出一羣猛虎句喜可知已雲礽法裔如林如藪振濟宗者皆出自金粟即今費隱和尚繼席弘揚不改父道宗門仰之金粟其薪傳地也蓋老人極慈悲是極惡辣極惡辣是極慈悲杖頭所指十方猊象航海梯山才動齒牙遐邇兢怖則謂是老人語録老人何有哉費和尚重加考定法今垂後命璧堇較讐因敘述如此絶不敢作綺語攢簇雖然塗汚不少歲在乙酉清和既望弟子明暹蔡聯璧九頓撰費隱禪師語録序王谷昔世尊以正法眼藏付囑迦葉祖祖相承以至五家分唱大闡宗風乃後之繼起者既定其宗派又審其師承源流本末毫不紊淆不啻如世之譜牒也者非過慮也蓋以心傳心之事非宗派分明師承親的則山鬼伎倆野狐機鋒于以奪朱亂雅其害有不可勝言者然在今日且不免焉他不具論即如號稱出世者有一輩徒衒宗門不明支派厚顏冒托謬曰為人詰其根源曾無憑據舉世被其誑惑流禍無窮是宗派不明之弊也宗派明矣而離師太早陶鍊未純猶有不循本分節外生枝簧鼓後學以致本師從新救正嗟乎師承之印證未至于親切之地詎可鹵莽以出世也哉五家宗旨惟臨濟獨得大機之用而後嗣如獅如象迥出常途故臨濟一宗流傳今日不與他宗同其斷絶宗派之獨高天下也如此至天童老人純以棒喝接人臨濟宗旨又大顯于世豈非佛祖付囑為人天之模範乎費隱大師舍離狂偽獨覔真宗自天童老人付法之後服勤有年龍天推出惟以實證的切一著子接人故其語録開大知見具大作略全提正令煆煉人天臨濟宗旨重光再振其于天童老人蓋副二傳化者歟然則今來真實趨向宗門者舍臨濟其又奚適哉抑今來真實趨向臨濟者舍天童老人法嗣如費隱大師其又奚適哉丁丑仲冬參學弟子山陰王谷稽首撰隱元禪師語録序唐世濟人有傑地有靈交重也亦交待也重然後因緣著待然後時節顯時哉時哉跂足引領日幾幾于寂滅灰冷之場幾何歲月而其人乃一旦起乘之豈偶哉吾讀黃檗隱大師語録而知人地與時之合之非易也斷際已前固有黃檗而名未著斷際著黃檗名又以其名名所居于是一黃檗現多黃檗而開堂説法者非絳節之麓也嗣居聲實並茂者不乏厯千餘年又非斷際之傳也今天童老人暨費大師父子接踵迭興斷際之道乃始大闡而隱大師繼之堂構再新黑白奔湊纘祖父之緒于斷際有光蓋絳節之麓山君樹神以及萬靈八部縣望已久始有今日殊勝耳地耶人耶時耶三者缺一則勝亦不殊因緣會合在今日其致之豈自今日始茲語録具在大都掃除知解直示根源如吹毛之劍點雪之爐而又句意俱到如摩尼珠隨現五色自非牢關穩密路途坦平踞佛祖頂𩕳翻衲僧巴鼻安有如是輝天鑑地活捉縱橫也哉嗚呼斷際以雄峰為父以滹沱為子故能掀揭宇宙久而益昌今大師父子祖孫媲美前哲而又當時闡化消息互通更不待重加尋繹始知胡亂後不曾少鹽醬也此豈獨一時一地為希有哉屈指古今丁斯盛者蓋不數數源遠流長吾于斯録見之矣崇禎壬午夏仲弟子唐世濟稽首撰又王谷金粟費隱老人為臨濟三十一傳起未墜之緒續方焰之輝十餘年來説法為人純用本分鉗鎚不落玄妙窠臼單傳直指之道乃大著于天下後之接武者雖未可限量然而承紹其宗敷揚開廓使單傳直指之道益顯于天下蓋亦難其人矣隱元禪師首入老人之室即覿體承當全身擔荷掃去支離絶無依倚室中得人師為翹楚矣玄生上人一日持師開堂語録示余余受而讀之見其機用宏達語句淵玄騰踏當機掀翻義路總從正脈中發揚展拓所謂單傳直指之道益顯者當于師是賴豈復有殊絶難繼之嘆哉玄生上人以余推重于師也遂囑余序余聞稱人之善者必本其父師德厚之至也矧余亦出老人之門忝師之昆季者乎故取茲義而述之使世之向斯道者知師為老人之嫡子且識豫言之非佞也是為序隱元禪師語録序長樂劉沂春閣部余嘗讀費隱老人語録宗風遠振上以接臨濟之緒下以開末法之光真傳燈正派而慧日亘天者余服膺久之始知為天童高足宜其聲實之並茂也今隱元禪師又為費老人高足法眼洞明機鋒猛烈一門而三闡宗旨樹幟禪關誠古今法寶中希覯者飛錫回閩首登黃檗開堂説法普照人天而善信之皈依諦聽者不啻龍象紛馳鳳麟畢集余按黃檗閩山也祖師閩産也昔以黃檗著名至今猶令人溯源嚮往其為閩地增重可知憶無異大師以父子而卓錫湧泉今隱元禪師復以父子而賁止黃檗其思所以闡發宗風抑揚三昧者匪一朝夕其為閩增重益可知也今讀隱元禪師機語迥脫常情頓超物表若以心傳心以水印水所謂佛光朗鑑智炬同輝于茲益信不特斷際之統緒昭明其單提直指之義火傳薪積隱師之功又曷可少乎余鄉龍泉禪林自百丈著名後寥寥其人今隱師棲真于斯宗門丕暢余亦將隱矣行親炙玄光飽聆宏論以遊于方之外偕石點頭未既也謹題數語以皈之又長樂林正升龍泉寺距余家二里許古大唐中百丈祖師所建祖余鄉産也參江西馬大師得法後隱于洪州百丈山闡單傳直指之宗製禪席清規之訓師于天下而法于萬世黃檗運大師實嗣承焉至我朝有四明太白山天童密老人復闡是宗傳之金粟費和尚而隱元禪師則金粟入室首座也接派開堂于閩越吳浙之邦居恆喜慕百丈家風欲惠賁龍泉春初寺主印虛上人出禪師語録示余余心異之遂僉柬往浙迎至挹其丰儀道範固有覿面全彰者及再聆棒喝則又摽指見月言下了義環座觀聽者無不豁然領略斯旨也厯夏秋説法之暇穿洞垣闢小築超超玄勝遊其上者咸刮目道風真趣既復出龍泉語録余得而讀之覺當機直達一指萬彰如日麗空幽暗畢耀如霆破睡聾瞶盡惺俾單傳直指之宗愈益著明于世斯真百丈重興黃檗復出豈獨為天童賢孫金粟肖子而已哉余友陳君諱永武者亦讀是録而讚之曰雪裏陽春點石泉龍歸鉢隱混元天相逢謾説封侯夢且向山中聽法禪余有感因併録之為序時乙酉仲冬長至日玄石居士林正升薰沐拜題又陳遂捷臨濟一宗古今烜赫不惟嗣者難其人而授者尤不易其人也非吹毛快刃不能斬固執之命根非鎔礦純金不能範聖凡之面孔苟握柄弗圓徒擊塗毒之鼓以求佛種不斷詎可得乎萬一有似是而非者起而承之是不斷之斷也烏乎可黃檗自斷際以後幾若線矣厯千餘年始有密雲費隱二老人登其堂發其藏提出無孔鎚轟轟烈烈殺活縱橫起風雷之令掣電卷之機庶滹沱正脈流通萬古使無根亂統野狐精魅無地逃竄矣幸有隱元禪師繼起斯宗中興黃檗拈花微笑一會儼然筵無退席之侶閣有彈指之童鳥道非玄空山奚寂余私心嚮慕固已久矣中秋涉勝仙溪因為頂禮香潭探其胸懷尼犍波旬而不拒閲其語録鏡花水月以同圓蓋惟自悟無言故能掃人有言亦惟不襲陳語故能破人囈語墨痕皆棒印水無泥昔日之風雷欲借今朝之鱗甲自威頂髺一珠三世環弄無老少之嫌無似是之間斷臂以來未有盛于斯也竊怪後代兒孫不丈夫承虛接響太狼藉或狂或狷或糢糊愈掃愈多愈不息余讀斯語知老和尚日在場眉中久已息于踵矣請問狂者狷者試味斯録以為何如隱元禪師雲濤集序仙遊唐顯悅侍郎詩有近于禪而不可以禪名禪有寓于詩而不可以詩名也余讀晉惠遠諸公詩愛其詩而不著于禪也閲古諸名宿偈愛其禪而不屑于詩也雖然此猶分言之也獨不有亦禪亦詩非禪非詩者乎黃檗隱元和尚今之斷際也中秋遊我仙邑從遊如雲瞻禮如嶽余慚非裴居士曷敢謬附唱和緣閲其語録觀之觸機縱橫批窽揮灑已知老和尚胸中磊落品調不凡也嗣是門下高足果以雲濤集示余展卷微吟雲濤滿眼夫雲觸于石大則為雨為霖濤怒于海小則為松為茶雲有影而無聲濤有聲而無影大小有無各相變幻取以名集又知和尚不自謂詩也蓋雲見為雲則無聲雲不見為雲則有聲矣濤聞為濤則無影濤不聞為濤則有影矣謂濤非雲也可謂濤亦雲也可謂雲非濤也可謂雲亦濤也可聲影皆塵見聞胥幻雲濤自有詩詩自有雲濤諸人無以眼耳求之則雲濤之詩甫變幻於方寸即遍覆于三千大千矣余且不得以禪名又安得以詩名惟頂禮唱嘆而為之序又林嵋夫山之峭壁奇崖未必高也水之狂湍奔急未必深也非不高深而高深可測也大抵至平至淺之中一涉至人舉止隨其可喜可怒可驚可愕可殺可活可經可權放之神鬼莫測收之古今無迹聖勿辨也凡勿殊也內勿移也外勿混也詩之一道至今日失統極矣辭客騁其賦情緇流耽于虛寂淵源一錯徑路盡差亦猶宗門喪其指歸入于魔祟雖終日登壇論説直是盲引羣盲蹈于火坑所必不免耳隱大師為天人標榜接曹溪之嫡派振臨濟之正宗沙界三千莫不知有黃檗老人也夫奚藉于詩奚藉于詩傳不傳黃檗老人何待其取材于晉魏乎其襲貌于宋唐乎沖口所發滿紙皆珍應手所指點頭是石則凡日也月也山也川也草也木也禽也魚也花也鳥也述不盡述觸不勝觸總是緑衣蒼狗寒泉怒瀑變幻離奇舒卷無際和尚自謂是詩也非詩耶嵋非詩人也非禪人也非知詩知禪也拜讀宗語示列法座炎想悉捐清虛徐來真覺十二峰蔥蔥隆隆包羅萬有而詩特其一班耳自今願披髮入山請從沙彌後捧硯濡墨供黃檗老人詩囊一抹本山册籍序劉以修黃檗淨業名區宗風丕振法雨洪沾代有跏趺掩關時或宣朗提揭霧卷崖青雲移松秀結半日僧緣坐臥惟聞天籟耳可怪鄙人好爭不第爭于人也直與神爭山水竹木𢵧然踞之不大可異哉夫一聲清磬半夜蒲團全賴此聳霄插漢者壯麗觀瞻護培形勝而維摩不能保其屏嶂山靈不能守其鬱蔥為問本山護法亦惴惴暴客耶佛法廣大一任天高鳥飛密諦因緣且看水落石出試正告之曰鴈過長空影落寒水大地原無實相普天下黑漆漢盡登光明覺路可也時崇禎甲申春日閬苑九一劉以修識又凌世韶鏡汭邑侯都會名勝之區凡古道場及淨業好修者例得標表蠲免其租役良以攘攘世界中稍存淨業片地風美為多也况正法眼藏祖印燈傳如黃檗禪林者乎而閩中寺租不惟蠲恩特少且往往受科派強蝕之苦倍甚此誰之責余不免逡巡愧懷矣維山有靈不思培成善業而徒挾私任詐以越牟為利豈遂懵于天道並蔑王章乎其著籍法守焉可也又莆田周吉心鑑公九世孫黃檗名山也寺亦天下名寺創于唐盛于宋浸衰于元其重創則明初大休禪師也時吉祖心鑑公與師道企志合捐資數萬運海而至復成巨觀基址棟宇視前較為宏拓前後百餘畝香燈田皆吾祖恢圖三歲兒童咸克道之迄壬戌倭變則劫為之也逮後近鄰吞産空僧遁是則人鬼為帝也夫劫值則廢既過仍興此天道往復恆數無足深怪獨至人鬼為帝認一時之漚花為萬世之基業既久假而不歸以禪門苦空欲與豺狼角鬬反所侵地能乎不能乎甲寅歲中天禪師不憚跋涉叩請藏經制曰可時主持則有相國葉公執法呵護則有邑侯汪公協力董成則有附鄰林氏并善信諸君子適隱元禪師又自金粟歸主席斯山上宇下殿漸次恢闢所云往復恆數于斯可見矣吉上京謁選過拜固竊喜祖緒藉以不朽因閲册細咨山前後舊址所復僅三之一十二峰尚失其二香燈田被奪尚十有八九心又甚痛之嗟乎豫寺以有而克有嘗聞之矣未聞奪寺之有而永克有者也夫聖天子賜藏之所可終乾沒乎諸禪師暨吾祖之英靈竟遂冥冥乎竊恐人鬼為帝亦將與劫同盡為往復之恆而已謹志之俟後黃檗寺緣簿序北直玉波張縉雲邑侯福清有名勝二一為靈石一為黃檗兩寺相距循山麓而行約有數十里而其中實隔一峰石磴巉巖草樹蒙密非樵蹤弗至焉余以癸未夏五視事茲土便道下鄉先詣靈石次即至黃檗寺各有田而皆質於人遣吏詗之民皆歸其田於寺不取償一錢寺俱傾圮黃檗尤甚靈石僧以募緣疏請余諾而許之未歲黃檗僧亦以募緣疏請蓋寺宇視靈石為多工用且巨僧非得已者夫二氏之教儒者弗尚然地有名勝相傳數百年一旦視其頽敗不一整理亦守土者之責四方君子諒有同志相與輸金購材成之俾兩山巍煥相望鐘鼓相聞衲衣梵唄之修與曩時相接起邑之人登中峰而望之相與話長吏興廢之心質家還田之舉與大衆布施之盛其為勝事亦可附名山於不朽矣是為疏慧國禪師五秩序閩縣葉觀國毅菴學士玉融余梓里也其間名勝道場而郭廬為最余往歲回籍嘗至其地見夫幽崖奇谷別有洞天古之達官遊客勒詩紀勝者山無虛石何先正之作曰入門奇石各谽谺公與嘉名種種誇我看總來無一似福廬大地出蓮花曲盡形容可以見其大概矣主持山門代有高僧近若上人國翁禪師者了徹玄機其火候之到如梅子熟而且酷嗜儒學與鄉之縉紳先生締蓮社交遊余族姪明經時隆君與焉豫聞其事神為之往每期宦遊之暇得以再至其地也茲值孟秋之穀乃上人五秩誕辰文人學士與釋之善詩者各拈韻賡歌族姪問序於豫余雖未與謀面然回憶郭廬名勝先正何公大地蓮花之句以及上人業釋崇儒追遠公高躅人以地重地以人益重亦奚能無言哉至支繁派遠則里閈所詳悉矣余不贅道暹禪師語録序漳浦蔡新葛山大學士恭維暹翁大師見過桃花渾身是眼躍翻本棎覿面逢源峭履肩笻任情獨往打包頂笠發足遐參尋常氣宇如玉屏絶胎垣諸怪斫腳脛恢張大用賣心肝直揭元猷曲彔敻登星馳電捲芬陀偶捻石破天驚奪鼓攙旗攔腮一掌張弓架箭劈面三拳匹馬單槍縱橫真入詞宗武庫錯落交輝分獅象於機前驗龍蛇於棒下雖飽參上士不敢以正眼規矧劣解宗徒何能以凡情測乃至膛題卍字法界全提目瞬𠁼文精筌密闡金針暗度玉線潛穿離相離名徹骨徹髓串過世間佛巴鼻坐斷天下人舌頭超劫外真詮越聲前妙解頓令須彌倒卓渤𣿨全枯畐塞虛空罩籠今古萬靈莫識千聖難名照用齊施實權互顯赤麟掣斷黃金索宇宙掀翻白澤牷歸碧玉欄乾坤震動萬絲梵網結就珠琲百億山河一粒靈丹點開鐵圍百千世界倘非歷劫薰功剗斷覺知理照定屬多生鍊行摟穿語默情緣詎若魔著尿床鬼爭漆桶戇籠懵袋罩鳳裝龍瞶棒聾枷懸羊賣狗菽麥不分葛藤混扯未明生死窟空坐去來關羣盲摸象言殊正法瞎驢滅却猗歟勦除朕兆究竟如何一句截流萬機寢削寅疏短引用泐洪篇謹序一菴暹大師遊戲三昧集序閩縣陳若霖望波尚書西方有聖人焉其號曰佛轉正法輪演不二門自白馬馱經漢明感夢始宣法於震旦逮初祖達磨西來以不立文字明心見性中土始有正傳其後曹溪演乘益闡玄風我佛不二之旨乃大著於閻浮夫我佛所謂惟有慧根者為能得正法眼藏若一著定相便不是當年靈鷲正諦道一字不立何以三藏千萬億言不盡道必立文字則面壁九年本無文字一著相便非也然則其意何歸歟曰佛以慈悲為本見贍部衆生日沉苦海故發雷音為般若慈航也初祖西來欲學者即心即佛善尚不為何况為惡此旨與我佛説法之意原無異但可與智慧者説法不可與聾瞶者道耳惟我一公法師早究無為之奧遊參天下者數十年性清慧定深以小乘神通為不足言含含默默有問者只付之一笑偶寄興於詩無非證菩提之非樹明鏡之非臺文紛披而意實淡宕禪心不二此所以難也然而一公之詩不足以盡一公也一公弱冠浮洞庭泛大海訪名山尋奇書遇異人得其太乙壬遁金匱玉函以及天官家言不一而足蓋盡天下之方伎盡天下之書一公皆無不知之無不能之而一公盡付之空絶口不言有叩者但見虛空上乘拈花微笑名詩為遊戲三昧即此意乎曰一公集中何處是佛祖西來意曰以相規如來即不能見如來一公集中何嘗有佛祖西來意即説無一字非佛祖西來意盤足合手而説偈言金輪王演法輪本虛空空所空若問佛祖西來意睡正濃時夢未醒啓十則請密雲禪師住黃檗葉益蕃蓋聞古佛願弘駕慧輪於覺海老婆心切擲化土於凡區是以去住無常四大皆成梵界因緣有地一燈足照昏衢出世度生為山作主恭惟座下雉雲表氣金日垂祥道行孤高紹禹門之法眼機鋒暇整暢臨濟之宗風天台山頂行翻却無明公案金粟峰頭坐拈來不二法門擅震旦之名流信叢林之尊宿聲特垂于閩嶺化已普于吳天顧茲黃檗遺基實乃興賢勝迹自斷際飛錫以來宗規未泯洎神皇賜經而後法席高懸雖龍蟒雜居猶勞神足矧聖凡共證倍想明珠千峰明月半溪霞也道為家何處三個木毬一枝箭不妨作戲逢場蕃等素仰玄風遙沾法雨欽三緣而作禮偕四衆而陳情所冀猊座遙臨湧慧泉而轉法龍天高擁現滿月以揚音庶衆生各各離塵身似菩提心似鏡得松下時時問道雲在青天水在瓶咸啓金繩同登寶筏謹啓又諸士紳伏以西竺開場愍人天之長寐東蘆特渡喜震旦之將明慧月從昔而普臨慈風于今而仰被恭遇密雲大師和尚初心正覺特地玄風磨甎手眼靈光立現于當前看箭風聲轉機旋撥于指下誠空門之正印禪籍之宗工者也顧茲苦海無槎念彼愛河曷濟非有祕魔之叉孰指曹溪之鉢是用啓檗山之道場特走延金粟之法駕雖幻漚亂起水體幾蕩乎中流而猛焰欲灰火性長存于陽燧矧象踏之處寧有野狐想駿鞭之施皆成良馬自可登筏不戀筏無復騎牛而覔牛千點祖燈重聯斯室一花聖葉再拂當天某等慚窮經之蠧同鑽紙之蜂有懷折弓未能置劍喜覯座中法主敢云客是陀仙敬三薰以致緘偕四衆而延佇伏願拈花笑指示再出之白椎飛錫遙臨現後身之黃檗庶人人自獲乎大寶念念各覔其神珠鹿渴可消兒啼聊止臨啓可勝翹企請費隱禪師住黃檗寺緇素僉具伏以獅王弗吼祖佛困于稿灰野干亂鳴生靈陷于鬼窟客路猶然悲愴婆心寧不怔營恭聞和尚法戰諸方翻却千年骨董機投密室贏得一味平常𣰦毿破袈裟搭著通身是眼現成鐵楖栗拈來活潑如龍何妨帶水拖泥隨處撑天拄地某等翹勤永日佇想終朝所冀神足雲騰即擁娘生處所慈容滿月常放本地風光爍破迷途咸成正覺玉融城裏奇峰怪石也生輝黃檗山中翠竹名花增錦繡一會儼然不勝慶幸之至又本邑林朝龍生朝龍幼不聞道老未歸禪自分句下之鈍根總屬門外之漢子側聞老師明心見性無不舍筏渡津竪義標宗輒爾登峰造極此固望衣鉢而自失且欲聆祕密而末繇者也惟茲黃檗即古道場自權教不遇夫真人致宗風幾墜于今日何幸同發宏願而哀懇賁臨喜福唐之慈雲復布惟祈垂憐衆志而特加接引知黃檗之慧照重光不盡歡欣可勝翹企又薛秉鉉宇內名山必得名人飛錫而地因人重矧祖師道場為人天瞻仰其關係不小非有遠公衣鉢豈易任耶恭惟老師心包太虛量廓沙界大乘妙解胸中法華獨參意表誠吾邑之真人佛門之嫡嗣也不佞昔遊黃檗曾挹清光茲因本寺大衆欲振昔日宗風非藉有道行兼全圓覺獨露如老師者六龍必不繞座百鳥必不銜花而山靈亦無色矣故此段機緣委難孟浪合縣善信僉具虔衷特請老師住持黃檗總領道場故議不佞敬裁八行用伸九頓萬祈象駕惠然至止庶法雨時灑萬彙之焦枯受榮慧日長光衆生之永夜蒙曉其為桑梓之地造福功德豈能名言哉臨啓神馳可任翹企踴躍之至請隱元禪師住黃檗寺本邑林汝翥御史諡忠烈伏以黃葉紛飛假東蘆而正覺白椎不示迷西竺以昏衢誰為出世之人以作度生之主婆心咸切兒啼共懸恭惟和尚竪光明幢秉金剛劍禪律並至播曹溪之宗風行解互高紹斷際之嫡派開猛焰之路設狂瀾之桴顧此檗山宿稱聖窟前乎此者天童密雲和尚法駕遙臨野狐因而絶迹誰其嗣之座元費隱和尚法棒繼振異獸益以遁形祖鉢相傳佛燈長照曠千百世之勝會誠億萬劫之良緣雖祖祖無一法以示人而師師實此心以相付念茲玄風既遠鑽窗之癡固多虞彼正印不繩戀筏之習不淺生有懷手眼素注宗規是用特使布誠實以四衆共懇所祈遙施駿鞭之影枉現聖箭之聲果結于神州緣開于此土以一炬燃百千燈明明無盡以千燈照一大室灼灼無邊緇流幸甚士紳幸甚謹啓請隱元禪師回黃檗諸士紳恭惟和尚慧覺宗工真如正印緣結大千法界具圓明寂照之根道開不二法門超語言文字之障磨甎手眼靈光遍現塵寰看箭機緣風聲特垂閩海真禪林之尊宿震旦之名流者也某等向挹清光夙欽道範茲為和尚慈筏遊東遂使斷際法筵虛左在七年棒喝固知教澤長存而一脈家傳尚望宗風繼振謹合羣心而延佇先投五體以抒誠伏願錫杖遙臨現後身之黃檗金繩密啓示再出之白椎嫡派總衍之天童祖作模而孫作範法乳均受于金粟伯吹塤而仲吹箎千峰明月半溪霞燈燈相禪三個木毬一枝箭筏筏同登盥手具箋凝眸候駕謹啓又本邑陳從教參議別久渴欲一晤瞻拜擬在秋冬不謂亘和尚之意只在芙蓉羅山其來黃檗也亦勉強應一時之請而已今見法乘回閩遂堅意推讓似亦不能強留之者念龍泉蕞爾舊雖祖師出身之所非開堂説法之地今老禪師道德日高信從日衆恐此不足以容之幸即命駕還山以慰輿望以廣朋從萬勿久淹令祖山寂寂無色也面晤在即未悉願言又本邑夏春暉師一載閲變兩都亘古以來禍亂未有若斯之速者也揆厥所由皆因人事豈緣天數然及今尚未有定算來有國有家既已長慮即禪林恐亦不得安也奈何奈何黃檗山仗大師福德振起擴清數年以來神皇之典册倍光佛祖之法道重朗不肖以皈依獲免世劫想亦宿根宿緣不至墮落還望和尚提點至于山鄰鼠輩大貪大癡不久銷耗磨滅無容介介也亘和尚有書催不肖請師歸主黃檗詞意殷勤迫切共事鄉紳緇素咸祈賁來况大師念念不忘神宗佛祖夢寐嘗在十二峰間應徇衆願乞示歸期以便趨
