body:
  text: 續脩黃檗山誌序黃檗之名赫於震旦幾與鹿苑鷲峰爭勝蓋其山水實佳峰巒連沓一溪橫焉循麓窮溪峙然殿閣曠如奧如二者殆兼地靈人傑語不誣矣舊常有記數卷畧記山川林麓之勝與夫寺之廢興而偈語遊篇亦載焉歲久不修板字漫漶數十年來棒喝之遺興詠所及又與落葉飄風逝焉俱冺和尚一菴三住是山甲申歲寺久頹廢余既為新之一菴亦遂裒集散佚授之梓人綴於舊志之後美哉一菴蓋不能忘情者矣余聞佛法不立語言文字其視天下廢興成敗之迹汩然無動於中今一菴拳拳若此是有意後世之名於其宗法不免多事焉雖然日月運行寒暑代嬗飲食男女負販種藝人生旦晝間一日不死不能一日無事其廢興成敗之數雖宣聖挺生不能不聽之於天而其有生而必有事有事而必待為之之人即佛之乞食說法接引眾生亦所謂不能無事也然則一菴之續為記而並以乞序於余者佞佛闢佛之說悉可拈花一笑也乙酉歲正月以公事便道又至黃檗值一菴在會城未來余見寺之田畝悉歸寮舍廊廡悉整朝夕梵呪之音師徒威儀之節亦悉如曩時之盛而山木宿經斬伐者多闕焉未補乃市松秧三十束種於寺山前後計十年之後嶄然可觀又更數十百年其蔚然蒼然又不知若何為茲山增勝是役也一菴聞之又必謂余亦未免多事而其不能忘情則一也賜進士出身福清縣知縣保定張縉雲題黃檗重脩寺誌序夫赤縣神州精藍碁布屢廢屢興在處有之玉融黃檗者唐宣宗觀瀑聯吟之地梁江淹至閩游詠之區裴丞相皈依於遠祖斷際朱夫子供養其故人悟公高僧正幹來自曹溪法祖希運嫡傳臨濟懶庵老禪剏建大溈闡化於省垣長慶月輪尊宿受記善會唱道於豫章撫州斯皆名噪霄壤特書國乘者矣迨乎前明神皇錫藏賢相布金吳尚書忠烈詩記流芳錢相國希聲忠貞瘞玉賜紫鏡源大士御座試經勅封隱元國師扶桑宏法象崖古德創黃檗於蠶叢南菴闍黎開白社於建業是亦西來川嶽咸鍾奈苑之奇外護王臣不忘靈山之囑俾著績千秋垂聲萬福者也嗟乎蕭梁迄今幾二千載寺誌隱老人修後百七十餘年未有嗣續暹三主本山重輯五燈全書黃檗宗譜寺誌雖經纂脩退院抱疴未能授梓邇奈禪宗叢脞知識凋零保社傾頹清規廢弛淨土草深一丈緇流星散十方幸承玉波張老明府大護法乘菩薩願現宰官身棨戟遙臨祖庭復振憫香燈之閴寂歎鐘皷之沉埋遂即清逋釐產捐俸募緣百廢俱興羣生有賴峰巒十二俄頃改觀沙界三千斬新絢彩琳宮紺殿金碧重輝寶藏琅函玉毫再現迺延蘭翁大和尚主持啟戒剞劂誌書布之寰宇冀亦少垂不朽云爾道光甲申秋仲臨濟正傳三十八世一菴達光道暹盥題黃檗山續誌序檗山者玉融之勝概萬福者臨濟之禪宗前有唐宣宗觀瀑作之於先繼有葉相國護藏續之於後其間興廢創因不可勝數且舊誌已詳言之矣馥亦毋庸再嚽越至乾隆年間棟梁漸被鼪鼯剝落殿宇旋驚風雨飄搖幸有檀越葉相國之後旭溟老先生仝逕江林鎮先生暨莆陽心鑑周公後裔諸檀那等承先人志發老婆心作為倡首今馥仝僚執事界陽心存繼宗繼芳等遍處勸捐而寺宇煥然一新矣時欲延馥主席本山奈才學褊淺未敢擅專就于寺中主持數載後旭以公車北上馥以耄耋南旋不料滄桑易變閱數十年而寺宇漸復傾頹緇流盡皆散處矣適逢玉波張明府大護法福曜垂臨覩常住之凋零作中興之首倡命衙權丁官皪徐士魁李廷芳鄭士忠等培松植柏序誌歸田香靄重其氤氳瑞照增其朗耀故事必有倡之者其成速有續之者其成尤速因與在寺住持監副執事及侄宏心等殫心竭力董造募金而寺宇於焉復整緇流由是悉歸此張明府之功居多而諸住持之力不少也癸未歲復蒙張公延為主席馥以老辭而合邑諸紳衿及本山諸禪師薦牘叠臨惟有點頭而已啟戒後與合山法眷議及所以續修黃檗誌者而法眷亦有是意於是共襄其事重輯纂修不數日而成功矣嗟乎寺誌自隱元國師脩後迄今百七十餘年版圖殘缺簡牘消亡倘不從而重訂之將何以繼往而開來乎寫林泉之幽勝集羣彥之詩詞作為冠篇鼎峙蘭若俾萬古以長存厯千秋而不朽矣是為序道光歲在甲申季冬上澣主席檗山第四十四世蘭圃清馥題黃檗山寺志序宋人詩云天下兩黃檗今天下山名黃檗者不止兩處皆以斷際師得名吾鄉黃檗則師家山初出世處後履歷諸方不忘其初葢諸方以人名山斯乃山名人者也自師門下出一臨濟宗風大振推其所自故江表嶺南所在有黃檗道塲矣則謂山以人名亦可自五花開後迦文面目全在震旦皆由景德傳燈諸錄大行于世夫能不立文字者乃能不假文字以傳乎近世傳燈不修五家遂隱臨濟一宗獨不廢也頃密雲悟師南來斷際師真堂堂皇皇再見於此亡何復還吳越將猶當年帶黃檗名遍名諸方者歟傳師燈者費隱大師推師而上以及臨濟宗門所自起列而為圖其以文字顯者自景德而上起金峰銅石之句寺額起自貞元塔院起自太平興國古物起自唐九松重閣大藏永鎮山門起自神廟四十二年相國葉文忠公請于朝也今並搜而志之以為茲山不朽夫網羅舊聞關情山水非宗門下事也儻亦有景德續燈之思乎法寶將興必有輪王自大藏入山以後龍宮漸出以至大師南來斷際之燈再傳矣余於黃檗山水舊聞固不能忘情者悟師到寺之歲僅書郵往來不能親到九龍潭其明年乃相見于吳門是後師在天童廢放之餘不獲三上九到茲山近在吾鄉余同年林侍御之里御藏檀樾相國者吾師也侍御又為予千里命駕之友他日携文通佳句往坐塔松下固予屐齒間物耳因人重山因山重人初心不忘豈獨先志有之哉于是黃檗僧來請遂敍之後代兒孫當如悟師無忘家山邈得斷際師真舉揚臨濟宗風于此則山重而誌亦重矣崇禎戊寅歲下元日岸先居士王志道書黃檗寺志序黃檗去融邑一舍而遙深山幽谷曠非人境自唐貞元以來世為叢林地既清淨隱僻不雜塵俗緇流非精嚴戒律者毋敢入而又代有禪宗高士以為之主慈雲所罩遠邇嚮被邑之評叢林之盛者莫能外焉萬曆中葉文忠公在政府為請於神宗皇帝得錫藏經煥然再新殿閣金碧輝煌相好光明隆隆之象一時未有凡聞風而至者莫不咨嗟嘆息生皈依心三十年來徒眾日繁宗風大暢於是居士林藎夫比丘行璣等裒集過去見在一切見聞而為之誌以待夫未來者問序於余余嘗同友人入山扣費隱禪師見師皤然清癯一語不發而問者自遠其寺僧率循循縮縮有精進相因歎曰此黃檗之所以為黃檗也向所稱豈虛哉然竊有欲言於費隱者夫佛之為教其要在慈悲廣濟而禪之為宗其指又在使人自得不落聲聞是二者意本相成而事則若相戾彼貿貿而來如饑人之入太倉如病夫之入藥市明知可以飽我療我而急不得其一賑救則慈悲廣濟之道何居固曰自得自得耳又奚賴此破暗之慧燈度迷之慈筏也曰不然人之於法始固無不愛戀而欲一得至其得也則實無所得而并愛戀者且一無所有譬父母之於子初固懷抱中物也及其成立父母之心得矣然豈能常在懷抱中哉故方其愛戀也在愛戀者以為是而自了然者視之則非也比其得也即得者亦不自定而自傳心者值之則有大歡喜者矣然則人謂禪家之不輕付與也而豈知其婆心之獨切哉餅家子日以餅遺僧僧即以一遺之曰吾惠汝子曰餅為我遺何反遺我僧曰是汝持來復汝何咎餅家子因有省又有狂號於道而覔其首者指之曰首固在也其人遂定彼貿貿而來者皆有所持來也然自有而自不知是求首之類也禪師又以持來者還人而覓其首者猶未知所定也是豈師之不多方指授哉不自得之故耳黃檗代以宗風重望黃檗而來歸者亦代以宗風重故志載源流語錄為甚詳而余亦舉以相問然是皆筌蹄也過去現在一切見聞恐終歸於法無涉倘未來有明眼人亦惟從自得作採尋耳雖然余此言又理障也并抹殺可也崇禎丁丑歲仲春筆山居士費道用題于三山之碧桃軒黃檗山寺志序誌舊修為一冊今訂為二冊皆本山和尚手裁幽以皈依座下得從編閱所謂不能贊一詞者也始山者誌所本也有山而後有寺有寺而後有僧相承而誌之者山以寺名寺以僧重也法居山寺未有之前誌次乎僧者道非人不行也釋氏四大非有五蘊皆空何有祖塔誌及之者昭水木之本源亦像教也誌外護者法雖自作主宰行必輔車相依也次於祖塔者明非媚生而薄死也亦以見祖塔之地未盡復瓶罄為罍之耻也至文以掞法縱主法護法各有其極而誌居後者為落筌蹄不欲以文章炫人也逸事可以不誌必附及之者錄實也亦紀異也夫八閩勝地留幽著述不少獨於黃檗無可下筆葢和尚無字之文𤍎𤍎玄定懸之國門隻字匪易矣幽所謂終不能贊一詞者也雖欲不杜筆權可得哉如其筆削以俟君子辛卯孟夏浴佛前三日門弟子性幽薰沐百拜手書以上遺漏均係原缺補錄叙重脩黃檗山寺志叔世多癡名山有骨每與高人韻士共之是在會心深淺耳老僧主法席有年黃檗枝頭搖醒三更之月紫雲壑裏斬開萬樹之藤時聽溪聲鳥語浮巒光而出未嘗作山水觀要何必不作山水觀也感谷陵之遷變念人物之凋榮試進遊客騷人而問之銅鞮金谷之瓦辟疆蘭亭之石迄今猶有存者乎而海內名山獨與靈鷲並傳不朽固知地㠯人重其權不在山川也是故天變而道不變古德詳哉言之倘山靈無主縱逞風雲以絢其奇馳月露以章其秘所謂能令臧三耳等耳曷足貴乎如司馬有捃摭之史子厚多紀遊之篇當時川巗藉之生色者蓋亦炳人耳目矣然而大道不聞君子咲之可知文以道重點綴山川其權又不在筆墨也舊志雖出巨公之手體略已具而精微未盡譬如畫者面目骨格粗成尚須點睛會神方有可觀老僧不揣檮昧繼之正古道之源流臚新規之本末未知其有權於山川與否也第不欲㠯世諦之筆墨累人耳讀茲編者望林巒而有淂佀不勞騁周穆之鞍顧草木而自非更何事勤謝公之屐明心不遠紙上非浮如徒作山水觀是使山川筆墨有權麋鹿亦且咲人酈郭盡稱入室矣非老僧重脩茲志意也但道以觸目長存質以脩文彌著先輩證悟或多於山水間淂之茲編之成離言超謂未嘗作山水觀要何必不作山水觀也老僧以為在會心深淺者蓋此耳壬辰一陽後黃檗主持隱元隆琦序黃檗山凡例八則山河大地是眼中塵無邊剎境是夢裏事五嶽四瀆泡影空花何足道哉然則一峙一流一動一靜從甚麼處湧出苟知出處可以卓立宇宙間古今名勝無有並之者而後以溪聲為長舌亦得以山色作淨身亦得否則須彌之勝十寶之嚴不亦陋且頑乎我檗山巍巍逈出萬峰之表佛僊神蟒戲奕之塲巖崖洞壑靈氣鍾焉潭澗泉石神物護焉隱顯幽異難以形言遊之咏之闢之志之無可不可志山第一昔人拈莖草建剎已竟崇樓傑閣云乎哉或因緣出現一時湧出或因緣離散倏爾灰燼可思議邪不可思議邪茲寺自唐宋至明幾廢幾興莫非俟乎其人若夫看破水月道塲空花佛事正好扶起莖草撑天拄地葢覆將來曷有已極志寺第二古云人能弘道非道弘人誠哉是言也凡主持家國決擇朝野惟人為貴而况擔荷佛祖丕振宗風者乎茲山劈自正幹炳於希運聲徹九重道揚四海山以人重人以山靈並傳而不磨其餘弄泥團漢䖃䖃苴苴磊磊落落總被老人筆尖頭上放大光明爍破面門了也志僧第三一法若有毗盧墜在凡夫萬法若無普賢失其境界若也救毗盧而不墜全普賢而無失可謂善說法者矣然則剔脫有無關棙掀開凡聖名言塵說剎說熾然說何待西方東土諸老古錐拈椎竪拂指東話西搖唇鼓舌說青道黃為祥為瑞為殃為災以為法式者邪這裡還著得毗盧麼請下個註脚志法第四湘南潭北綿密不通風巖下峰前突出太崚嶒此便是代老凍儂末後躲跟之處只如驟雨怒號寒烟長鎖猿啼鳥喚奉獻無門孝子賢孫追思無地且道向甚麼處覔得祖翁靈骨聲色堆頭急須着眼不萌枝上漫掃春秋志祖塔第五真正衲僧一法也無護個什麼苟能無可護處興一言如銀山鐵壁為千古屏翰令人望之儼然靈山付囑猶在是則名為真格外之金湯也志外護第六修世諦文字胡謂有待千百世之後而放志山林棲心法窟者知代不乏人况名勝景物真偽確有可據者哉然則長篇短句搜羅見聞可與臥遊山水者道爾若夫達觀之士親到黃檗峰頭豁開隻眼洞壑林巒真文炳著潭澗木石覿體成章這叚靈妙幽真非楮墨之可傳設若添個元字脚於其間不亦貽雕文喪德之誚歟志文第七書以傳信不傳疑若夫事之逸者多近乎疑傳之曷故殊不知有逸人方有逸事傳逸事愈足以証逸人夫逸事非奇也誠善應之兆也易曰居其室出其言善則千里之外應之而况逸事之符乎所謂善及乎前必應之於後善及乎古必應之於今善及乎身家身家必有異常之泰善及于天下天下悉皆禎祥之徵夫復何疑附志逸事第八舊志六章今列為八涉獵見聞之殊擴充人景之藻世出世間攝盡無餘以便遨遊者之大觀若夫未點畫以前著得隻眼全彰格外風光笑看斯集逗漏奚辭黃檗斷際希運禪師一派源流斷際運臨濟玄興化獎南院顒風穴沼首山念汾陽昭石霜圓楊岐會白雲端五祖演昭覺勤虎丘隆應菴華密菴傑破菴先無準範雪巖欽高峰妙中峰本千巖長萬峰蔚寶藏持東明旵海舟慈寶峰瑄天奇瑞無聞聰月心寶幻有傳密雲悟費隱容隱元琦黃檗傳法法派明第一代黃檗開法圓悟密雲祖師源流法派祖道戒定宗方廣正圓通行超明實際了達悟真空清第四十代住持開法達光道暹禪師續立法派三昧原無相一秉妙厥中現前機用大豁露本來衷黃檗剃度宗派明第一代黃檗開山賜紫正圓中天祖師剃度宗派祖法志懷德行圓融福慧善果正覺興隆性道元淨衍如真通宏仁廣智明本紹宗明第三代重興主持開法隆琦隱元祖師續派一心自達超悟玄中永徹上乘大顯主翁清四十代住持宏光道暹禪師又續聞思直證理事該充聖凡俱冺照用弗同支那演範兜率垂功綿延奕濟度羣蒙黃檗山寺誌總目卷第一山峰巖洞石嶺壠池潭溪井泉卷第二寺殿堂方丈厨閣樓廊寮房亭橋壩碾碓磨臺菴院塘庄塢田園山塲卷第三僧唐後唐明清卷第四法上堂小叅機緣偈啟書規文卷第五塔鴻休大休雪堂義菴妙湛坦翁藤菴必翁員湛上善原名適軒即公媽塔中天祖師費隱法祖隱元祖師慧門和尚虛白和尚廣超和尚清斯和尚璧立和尚良準和尚濬微和尚晦谷和尚朗純和尚智泉和尚若育和尚雪椿和尚慧隆和尚慧國和尚了情和尚珩玉和尚承垠和尚道暹和尚繼宗和尚界陽和尚三塔海會報恩卷第六外護書啟序卷第七文梁宋明清志記詞賦贊居士詩卷第八釋詩偈仙詩附附逸事古佛示瑞靈湫顯異巨蟒神踪五音鱷石九龍古樹鄭渚金聲嵩巖香乳祥雲現瑞春畦法雨彩泥示現白光貫頂隱祖靈蹟錢相忠瑩
