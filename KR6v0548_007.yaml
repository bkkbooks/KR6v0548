body:
  text: 重興隆琦隱元祖師原本門弟子性幽獨往等編訂續修監寺道昱道升道本宗儀開滋永悅副寺惠秀舜普永施同靜寺宗堂宗愷德科傳圖華懺常澄紹仁本岐紹修校刊志一則福清縣志黃檗山在清遠里以山多産黃檗故名林巒重復為邑之勝梁江淹嘗遊此有詩陽岫飛鸞彩陰溪噴龍泉禽鳴丹壁上猿嘯青崖間上有珠簾泉下有瀑布泉垂數十丈其勢甚健淙崖石為穴下濬無底潭口徑八九尺舊傳有龍禱雨輒應上絶嶮處復有一潭人迹罕到龍嘗自下潭移上潭所厯有爪迹又有佛峰香爐峰寶峰紫薇峰屏幛峰天柱峰獅子峰羅漢峰鉢盂峰五雲峰吉祥峰報雨峰宋陳確詩峭拔藏蒼龍煙雲晝長鎖天際雨將來山靈已先報山有黃檗寺寺之西有嵩頭陀巖至今猶有乳香出石罅間記一則遊黃檗山記明吳鍾巒黃檗山寺福唐叢林之最著者也歲丙戌余避地來黃檗在耳以道枳弗克至也丁亥移寓徑江黃檗在目以溽暑弗即至也七月之望至焉同林踰陵涉溪境漸以深可十餘里數折至山數折寺寺在翠微松竹森蔚望之已居然勝境矣入寺羣峰回合梵宇莊嚴為寶殿為轉輪藏為香積厨為僧衆寮結搆都備殿後厯數十級而上上為法堂為方丈為客堂堂中有葉文忠公像臨高望遠心目敞豁遂棲宿堂左二友談山有九潭一潭最勝余興勃勃明日陰雨雨不止又弗即至也雨窗無事俯仰榱桷見文忠公遊絶頂詩嘆曰公太平宰相也公罷相後璫禍矣公捐館後今日矣昔之遊者非今日之遊者也因步韻為詩以寄感慨越日雨稍霽余曰盍行乎迄于今甲子周而事始稍稍竣也斯不亦毀者易而成者難乎豈不在人哉嗚呼匪直寺也國之所以廢興存亡者亦然文忠有知尚三嘆于九原矣於是為之記二友為林雷先名起震林惠風名介王子字秉肇名家基余季子名裔之字公及復黃檗寺田記北直保定張縉雲玉波邑侯自靈石歸不數日又適以事遂詣黃檗蓋福清饒佳山水首推靈石次即黃檗而舊剎之存亦惟兩山之寺為最古靈石之田二百八十畝質於人黃檗之田七百八十畝亦質於人遣吏諭之一如靈石旋黃檗之田亦復福清劇邑也賦稅訟獄盜賊郵傳甲於他邑蒞事以來無一治績而兩寺之田乃得之於不旬日之間豈佛法所謂有緣者耶抑越人好鬼其俗使然耶是亦可喜矣靈石寺宇不及百間黃檗則百間不止靈石惟前殿不支其餘固皆完好黃檗佛殿完好而其餘則幾無一椽可覆遠近聞之欣然應募醵錢興工土木翕集蓋自僧舍荒涼法侶散去及是而復歸已厯一紀而後黃檗之梵唱始得與靈石之鐘鼓相聞於兩山之間夫物之成毀有數古之言天者每以一星為期豈一梵舍之興廢亦關天道耶而人事實因之固未必然矣是説也姑無深論寺中有舊碑亦載雍正年間寺僧已有質田一事遂踵其事而勒石以記之黃檗為融邑名寺山志乃千古流傳自梁江淹宋晦翁唐宣宗明曹學佺葉向高迄大清名人間出咸于黃檗寺留題志序詩記其墨迹至今存焉雖云山以僧名亦志以人重戊子暮春豫遊福唐是夜僧清懷師出續修黃檗志與豫觀之豫百復不厭競競然鄭重焉及閲此篇末行不覺忽為色沮試思長班地保何物鄭喜林樹齊何人廝卒之流竟以廁名公巨卿側也此志不幾卑汚耶作者昧梓者亦不通時即質之清懷師師亦甚惡輒筆刪之憤鄙之下付之一笑龍田張成梁爰筆黃檗種松記山之有樹如人之有髮然炫服盛粧而頭乃童然豈足為美哉否則數莖鬅鬆亦難為貌矣靈石之趣以幽深勝然非老松數千株虬蟠谷口亦未為至也黃檗既修之兩月余以乙酉春始往視其工殿宇已整寮舍已完而環顧回山層石巉巉挺然顯露譬猶人之新經病起氣象雖殊而顧盻間未能生態對之者仍不免少興福清故産松秧每一斤為一束每束計可四百有餘乃市三十束種於寺之前後寺之住持曰通馨者亦已植三萬餘株計十年之後青青在望矣計再十年之後清陰照地可以覆人矣吾年今已五十有二更二十年後久已解組歸田矣如其時此身尚在杖策南來重尋舊迹則四萬餘株之堪為梁棟者不啻老夫前此在邑之日之稚焉童子其為樂何如也想靈石大夫聞之亦當掀髯而笑黃檗寺龍泉記異黃檗寺後舊有小潭一冬夏泓然相傳不盈不溢而亦不涸號為龍泉不知始於何歲月也壬申歲寺之田畝入富人僧以貧散去泉遂亦以涸聞逮癸未余蒞茲邑夏六月以事詣山遂宿於其寺頽簷敗瓦星光的皪逗漏梁間從枕席上可一一而數幾於不能成寐而訪所謂龍泉者第見數尺枯池而已未幾為歸其寺産又為之募工修之費於四方殿宇既整緇侶悉還向之蔓草緣階長苔挂壁又皆為莊嚴淨土威儀道場矣而所謂龍泉者乃亦浸浸日出及工甫畢盈潭泓然與曩時相傳不盈不溢而亦不涸者無異噫是可以自勉矣泉豈有知者哉而其通塞之故乃與寺之廢興相因天下固有不相感而適相值者若此之類不一其事而寺僧以為神里人以為異在愚夫愚婦可慰其好善之誠而有志之人亦可以自勵於有成也如必與佩刀之出孝婦之涌而自以為功焉竊恐為山靈所笑爾詞一則龍潭祈雨詞浦城宋真德秀伏以萬民之天所仰莫如穡事之難六月之雨不時深懼田功之失控誠以禱從欲是求眷茲百里之區實在七閩之首山崇川駛粟可去而不可來民悍俗頑歲宜豐而不宜儉昨緣霜隕有害秋成一朝而攘奪並興殆幾挺變纍載之蓋藏悉罄僅足救飢幸禾麥之繼登與里閭而胥慶然穀直之騰未減而民力之困自如非大有之屢書豈小康之可冀乃由季夏驟苦常暘多稼垂成猶日望嬰童之長甘霖弗續是頓虧乳哺之功倘拯救之少稽將危亡之立至不勝震懼有甚灼焚爰率籲于上穹冀興憐于下土敕羣龍而並起掃妖魃于方張大雨時行願弗愆于月令蒸民乃粒實共戴于天恩黃檗賦明林伯春美百尺之喬木結深根于高岑枝拳曲而偃蹇葉茂密而繁陰豈榆柳之比性將貞壽而並林時餐霞以吸露乃黃質而苦心類寒松之節操同婺女之堅貞其朽散以自棄任霜雪之相侵彼桂何事而消亡桐胡為而半死槿向秀于春朝蘭徒芳于江沚嗟萬有之必衰獨一貞之無已臨皓魄以輝生動微颷而響起登黃檗山賦獨往子性幽七閩勝地十縣名巒枕榕城蔚蔚啓莆水潺潺源發金支之頂秀來白鶴之間肘郭廬而腋大吉纓石竹而帶海山客從余遊者問曰此何區也董壺孫麗旗鼓讓幽竹蔥蔥兮露滴松鬱鬱兮風流無絃千溪兮彈伯牙之響有情萬壑兮載宋玉之愁擁龍田兮雲從萬里跨江陰兮水衍千溝遙望虎嶺之巔兮曾藏將軍俠骨近眺鰲江之下兮多繫漁子扁舟豈飛來之蓬島抑突出之天丘余曰此黃檗也考之紀載古已詳矣出紫雲焉問諸耆老今其知乎吾聞巨靈斧劈章亥步推彼焉界三千兮固尊五嶽此也峰十二兮亦貴一壞子不見夫報雨初霖兮五雲繞天公之塔鉢盂孤挺兮天柱空九郎之罍突寶峰兮斜插考吉祥兮旋來羅漢騎獅子兮咆哮驚醒玉融之夢香爐供佛座兮慈悲燻騰福土之灰且有紫薇兮綴一方春色屏幛兮蔽四際塵埃此則茲山之大較然也自地占袈裟兮開衲衣之永紫流增濟水兮洗法眼以長青今者竹院風清兮高聳凌霄之節草菴月罩兮漸成插漢之形看絳節峰頭兮也有黃金篩地角踏獅巖險嘴兮不無白棒摘天星且讀梅菴一碑兮知麋鹿上聞天語過普同諸塔兮識枯朽下擁地靈登斯山也真令人有蟬脫物表鴻飛霞端者矣况有時而龍潭珠垂兮鷺羽逞攖鱗之勢有時而蟒洞燈遍兮神光生媚鬼之才有時而鐘樓響高兮遙應姑蘇半夜有時而經閣香落兮恰同靈隱成堆有時而蟬噪小溪兮和老人之十咏有時而鶴依方丈兮獻仙子之千枚有時而水月現觀音之容兮露出通身手眼有時而臥雲飄佛母之駕兮育成大地胚胎斯豈非盡福唐勝概極佛國奇觀哉然猶未也子不見夫風吹大小帽兮日月出沒其上雲迷木石橋兮魚龍變幻其間多年翁仲半埋荒草之中兮可歌可泣幾箇村家狂跳光天之下兮如黠如頑古樹陸離兮感春秋之易度新蓬荏苒兮念歲月之維艱靜言思之妙藥難駐紅顏兮徐福之舟不復金風已催白髮兮魯陽之日難攀果登山而有得應案屐而自潸客笑曰夫鳳凰之異于山雞者羽毛之美也麒麟之殊于走獸者首足之文也融邑固多君子塘水豈辜名家子乃墨胎之餓骨豈知聖道之龍蛇余曰其然乎豈其然乎子不見夫真氏來禱兮而九潭增色江郎有賦兮而滿筆生花常觀察之遺教兮不朽林太丘之理學兮堪誇稽流民一圖兮鄭介公之風流如覩考歷相四主兮葉丞相之天業未遐事即此而達彼道有然而豈徒子不見夫正幹通玄兮檗味迄今猶苦鴻庥罵賊兮樹頭萬古不汚斷際三弄爪牙兮宣宗之掌痕長在中天八經寒暑兮神廟之御典不誣况雲布且密兮擁單傳之寶道費而隱兮得直指之珠今何必遠遡文文山之為奇男子定指李若水之為大丈夫只此月照山間兮露清霜冽何處更埋黃巢之劍霧填谷口兮燕去雁來相逢盡道白乳之顱念之哉龍藏猶存碩果豹隱方是故吾數點磬聲兮并不聽雲中之雞犬半生豪氣兮却俱冷山前之鷓鴣固知文之未喪或守道以有須客于是栗然而恐悄然而悲余因進曰子休矣圓頂支天兮裴休猶為著相遠公既遇兮菊花亦覺纍人舉足皆幻美景匪真滄海桑田兮莫恨山河非舊花容鳥語兮別有天地維新子休矣吾其自此獨往矣遂揖去客摳衣尾之溯洄于九淵而不能從也余遙語之曰吾道存歟非山亦非水吾道亡歟可水亦可山子豈復求我于人世間也邪客目送之莫知所之閩中士大夫有聞者相與載筆覓焉閴其無人但留墨迹數痕石上而已過而讀之渺不可得贊十六則開山正幹禪師贊隱元琦含曹溪毒入黃檗林渾身是苦遺纍至今煙幕幕雨沉沉千古何人解此心希運禪師贊脫白斯地緣生福唐機投百丈舌露鋒芒在在標名黃檗也是熟處難忘杜撰接人六十棒流傳惡辣遍諸方懶安禪師贊識得牛兒驀劄歸欄不犯苗稼真個懶安突出閩城二十載占人田地太無端月輪禪師贊踏破草鞋不識和尚獅子嚬呻猿猴伎倆撈摝再三歸去來月輪不在秋月上中天師祖贊把茆廢址屢受訶煎六十有五匍匐帝前請經鎮剎行業湛然龍樓顯煥卓立中天全彰祖道耀後光前天童密師翁贊岍眉卓朔雪𩬆鬔鬆單提楖栗如虎若龍截斷諸方要道掀翻黃檗家風殃及兒孫不了遍尋到處無迹近日有人報道公然坐在天童本師費和尚贊舌起浪堆眉挂鉗鎚結佛祖讐為生靈災觸著喪身失命擬之怒吼如雷當年錯禮三拜至今懊恨未灰師翁隱元琦老和尚贊良準標雙瞳炯炯氣宇如王主持法道下視諸方令行震旦名播扶桑闔國瞻仰萬里舟航拈出兩枝黃檗苦味難嘗所以吾祖之風山高水長本師廣超宣老和尚贊這阿師沒意智賺殺人遍大地昔日狹路相逢灼然無處回避剛剛觸禮三拜至今無處出氣朝夕聊將一炷香胡亂熏他半邊鼻本師良準標老和尚贊純寬晃惡辣鉗鎚沒從回互打折驢腰脹殺馬肚法戰諸方四會中祕魔杈擎石鞏弩師翁純寬晃老和尚贊慧國祥高峻門墻攀躋不易惡發人前躲跟無地奴視逸多揖釋迦馬郎婦即金沙是本師克明光老和尚贊孤硬頭顱面冷生鐵捋斷虎鬚雷轟電掣煞活垂機廣長掉舌説白道黃證龜成鱉本師慧國祥老和尚贊道暹光怒吼如雷磕著命喪如何若何拳頭一頓傳個無文至今悔恨説是甚麼正法眼藏咦銀山萬仞剎竿懸漢現胡來三十棒道暹禪師贊蘇年鄭光策鰲峯山長我遊福清即耳詩名雖未見面不能忘情師遊無定隨地拄錫垂二十年鴻爪雪迹邇來倦遊復歸故山如風吹雲忽往忽還禪學既深詩境亦進一片光明自得心印問師緣何師亦茫然心知其旨口不能宣譬如尋春出門無得歸聞花香一笑默默道不在遠著意反非吃飯穿衣至平至奇動極必靜夢覺乃醒一箇蒲團妙趣自領空山無人流水無聲寂坐諦聽無情有情誰為此圖現真面目證禪證詩興象具足又侯官蘭卿李彥章中書翰林照影恆河憶遠遊十年退院又熏修自從瓶鉢垂垂老萬里歸來易白頭其二檗山高處古名扃榆檔千函有藏經勞我龍淵搜篆夢海天一十二峰青居士詩梁唐宋明清遊黃檗山梁江淹金紫光祿大夫長望竟何極閩雲連越邊南州饒奇怪赤縣多靈仙金峰各虧日銅石共臨天陽岫飛鸞彩陰溪噴龍泉殘杌千代木牆崒萬古煙鳥鳴丹壁上猿嘯青崖間秦王慕隱淪漢武願長年皆負雄豪威棄劍為名山况我葵藿志松木橫眼前所若同遠好臨風再悠然唐宣宗與黃檗希運禪師觀瀑布聯句千巖萬壑不辭勞遠看方知出處高希運溪澗豈能留得住終歸大海作波濤宣宗香茶供養黃檗長老悟公故人之塔並以小詩見意二首宋朱熹祕閣修撰擺手臨行一寄聲故應離合未忘情炷香瀹茗知何處十二峰前海月明一別人間萬事空他年何處却相逢不須更話三生石紫翠參天十二峰黃檗覽秀閣和韻本邑黃祖舜樞密郕國公諡莊定飛閣凌雲翠幽尋一徑微峰巒長競秀煙水莽相圍景色塵囂外詩情領略歸標題屬大手價重勝留衣敘題十二峰宋王大復寶峰屏幛紫薇邊獅子香爐佛座前羅漢鉢盂天柱上五雲報雨吉祥連咏十二峰陳確寶峰草木分餘潤輝光射斗間誰知天下寶盡聚此名山屏幛微雨一番晴峰巒色轉青笑他摩詰手祇會畫山屏紫薇夾道藤蘿古森森桂木繁夜來天上燦直接紫薇垣獅子頭氣三秋肅悲風萬竅號憑欄傾耳聽哮吼一聲嗥香爐裴公留客一何堅象設爐峰置目前若論本來真面目混成那似此天然佛座氣格非凡局清虛別一家緑陰圍寶蓋倣佛坐蓮花羅漢天台遠勢來化身前峰上日出霧露收巍巍現金相鉢盂峰勢團團就山嵐滴滴濃鉢中無一物只是要降龍天柱峭峭連雲聳迢迢遠地來崚嶒非一狀直是小天台五雲瑞氣浮明空峰巒自不同至今雲五朵猶認是郇公報雨峭拔藏蒼龍煙雲晝長鎖天際雨將來山靈已先報吉祥佳氣何蒼鬱林祥日日開幾多如意事總向此山來題靈淵趙卞靈淵無底石嵌空萬丈飛泉落半峰寄語魚蝦莫相侮此中蟠蟄有蛟龍過黃檗聽彬長老談禪蔡襄一圓靈寂本清真誰向清波更問津欲説西來無見處奈何言句亦前塵登覽秀閣和康侍郎韻夏之文重來登覽秀雨歇暑風微山色長如畫天光不可圍巖幽聞夜嘯花落見春歸莫遣天花墜沾粘座上衣次韻林栗偶來散居上寓目見纖微巖嶂層層出杉松匝匝圍猿攀高樹舞鶴拾枯枝歸坐落雲頭起倏然欲振衣遊黃檗寺李彌遜層巒高處晝常陰此日雲開見遠岑杖底芙蓉峰九疊崖邊石蕊壁千尋苔封洞府蹤難覔山壓樓臺勢欲沉不是老來偏好事攀躋已負十年心同葉太史遊黃檗次和歐陽徑天風濁酒灑蘼蕪面面芙蓉削處孤託乘誰應攀鶴馭裁詩君獨握驪珠黃符絳節還高下瓊樹瑤花定有無著就一家言祕否青山何處坐跏趺遊黃檗林堯俞南宗古德傳心印千載來人尚禮瞻再闢琳宮增崒嵂新頒法藏倍莊嚴羣峰拔地環如障一水從空灑作簾陽岫陰溪尋欲遍慙無彩筆續江淹登黃檗山李開藻黃檗西來自有山石橋初度野雲還分明一滴曹溪水流與龍潭出世間藏經閣岧嶤傑閣倚雲根中有瑤函億萬言努目揚眉都是也憑誰解報聖人恩閲黃檗心要祖祖相傳只一心心心相印到如今當機不遇河東宰千載何曾聞法音苦為捫藤行正坐愛山癖振衣雲中樹洗耳泉上石稍尋優鉢林偶傍瞿曇宅溪行走羊腸山轉回龍脊兩難伴搘笻二老共飛錫望迷落葉秋出斷蒲團夕雲歸繞窗明香盡出簷碧希聲發巖竇妙觀生墻壁塵緣苦推攀勝事成今昔離家月垂鈎歸路月挂壁師今一帆輕我向百里役船子罷持橈趙州行驀直遊黃檗寺翁卷天下兩黃檗此中山是真碑看前代刻僧值故鄉人一宿禪房雨經時客路塵將行更瞻禮十二祖師身又劉克莊猶記垂髫到此山重遊客𩬆已凋殘寺經水後增輪奐僧比年時減鉢單絶壑雲興潭影黑疏林霜下葉聲乾平生酷嗜朱翁字細看荒碑倚石欄又林希逸黃檗山前古梵宮早年屢宿此山中猿啼十二峰頭月鵬送三千里外風日者共遊因朔老期而不至有樗翁騎鯨人去相如病更欲攀躋孰與同讀石間字刻感賦明何御朝自西山還遙遙望黃檗想像二十年于今始登陟芙蓉照清波瀑布懸絶壁洞底白雲興誰復採芝入山鬼嘯林風野狐怒人迹歲深石刻殘讀之不盡識因嘆邑賢心惘然悲今昔人日遊龍潭葉向高人日看山雨乍收溪光山色向人浮晴雲不散澄潭影新水初添曲澗流選石移尊同取醉捫蘿覔伴共尋幽陵源深處何須問但見桃花便好遊同歐陽邑侯遊黃檗千盤厯盡俯平蕪萬頃煙波入望孤竹裏布金留慧月巖前飛瀑放鮫珠中天絳節還臨否玉井仙漿可在無惟有青山憐傲骨不妨終日坐跏趺觀龍潭紀遊四首黃檗道場古乘間載酒過層巒通帝座縣溜落銀河路轉人蹤少林開爽氣多生平愛幽絶對此欲如何其二靈迹何年著鮫宮此地開湍流爭噴霧激響欲奔雷不辨磨崖字空餘翳石苔誰云弱水隔峰頂即蓬萊其三寶地圍青嶂龍湫落翠微晴虹低飲澗寒雨亂侵衣濺石驚珠墜因風作絮飛臨流欣濯足心賞莫言歸其四入谷山如削蒙茸手自披清溪分樹出高岫與雲凝波動龍初戲林喧鳥亂窺不緣避暑飲安得此探奇登絶頂有引黃檗名山也而寺久廢余謝事日適皇上念及海邦遣中使賫經來賜余與親友重興新剎為藏經祝聖之所因同林大默大範藎夫倬夫輝夫吳伯孚鄭叔熙來遊是山之高可數千仞其巔為大小帽二峰有留雪嶂蟒洞九淵潭諸勝而第一潭最奇深碧無底真神龍所居水簾瀑布倣佛九鯉十年前曾與大默約登絶頂蹉跎久之茲乃冒暑而行道甚嶮絶攀木緣磴頗極艱辛從者以為病而余以探奇不暇顧也爰成四律用紀壯遊琳宮新敞古壇場貝葉琅函出尚方自識禪心超色界還憑帝力禮空王龍潭倒影千巖碧鳥道斜縈一線長此地歸依情不染更於何處覓慈航其二第一名山勢鬱盤登臨方覺海天寬丹崖常積千年雪陰洞還生六月寒自製籜冠來野外共扶竹杖上雲端茫茫塵世何須問萬仞峰頭一笑看其三絶巘登來路未窮翛然兩腋起天風山形大小皆成帽石勢高低盡插空瀑水亂侵人面溼巖花交映客衣紅勝遊喜值升平日烽火休傳大海東其四宿禪房千崖石磬一聲孤雙樹庭前日影疏禪意道心俱寂寞片雲何處更安居遊黃檗寺何喬遠黃檗名山只見山我來不得一枝攀心醒百丈吟吟笑經讀裴休得得還御藏罘罳金碧外羣峰餖飣几筵間龍潭老足相欺甚但許中宵夢裏間和葉相國遊黃檗韻金峰與銅石奇怪千萬片吾讀江淹詩未知所麗奠十二祖師身不啻滄海變公來遊其間似睹西域眩既已陟層層猶欲窮面面陽岫及陰崖誰道不能遍遊黃檗曹學佺朝辭石竹路逶迤暮入禪林境自移橋下清渠為草積門前古樹作藤垂諸峰翠黛分深淺一勺寒泉歷歲時昔日江淹來此地縣崖何處有題詩登絶頂高山有奇洞靈物之所處其觀多怪譎大言似誇詡我直持一勇於以勝百阻路長到實難食人有猛虎天陰日無光雲霧作細雨潭壑乍隱見鄉縣悉周溥仙人雞犬鳴聞聲不可覩入木成戈矛叩石如鐘呂遇物雖駭新本質實已古好遊不學道來此亦何補步葉相國遊黃檗寺四韻江朝賓山中隱隱一道場天語迢迢到上方不有廬山居慧遠空談西域夢君王龍湫擬接曹溪近寶籙升封華祝長共説南宗多勝派誰知此地大舟航其二紆迤鳥道鬱千盤到處峰頭入眼寬谷口銜杯為避暑龍淵噴霧轉生寒諸君共愛上方趣此日誰同萬仞端更有詩篇留在壁琳琅應恣客遊看其三獨立孤峰意不窮蕭蕭杖屐度天風河山點綴微成象身世鴻濛總是空倦鳥不忘春谷語歸鴉猶帶夕陽紅何時了却塵緣纍習靜長隨鹿苑東其四青山寂寂暮來陰天際歸雲傍翠岑牧笛已隨溪水去禪鐘還向梵林尋驚心險徑休相問回首晴嵐已欲沉不有空門忘色相更於何處覔初心閲龍湫林大啓久仰靈淵異今朝眼界舒誅茅尋鳥道拂蘚讀蝌書瀑瀉寒威起雲飛暑氣除奇蹤欣乍見登陟興何如萬歷戊申歲仲秋九日慶雲現于黃檗佛座峯志喜黃檗靈鍾十二峰卿雲俄現翠微中凝成五彩諸天麗吐出千章四海紅蓋影輪囷符漢主唱名輝焯應韓公遐方快覩禎祥象為慶明良此日逢卜隱黃檗山歐應昌黃檗名山峙海邦標崇列秀吾之鄉中有九潭龍所藏峰巒十二披霞光珠珠隱隱山色蒼我思結屋蒼山陽山雲隨意入我房山月隨時照我床足當好客無相妨經歲勤力鋤乃荒眷彼黃鵠高飛翔星辰燦燦夜未央山中搔首河漢長遊黃檗山翁紹揚寺沉暮靄石沉苔野竹蕭蕭一徑開報雨峰高連絳節臥雲菴敞接花臺潭深有沫雙龍戲樹老無枝獨鶴回為説遊人貪結果莫教鐘磬亂相催初至黃檗見寺荒涼有感林伯春祇林開創在何年幾樹長松老帶煙經藏舊基渾草坂梵宮遺址半秧田空留寶鐸凌空韻誰捨黃金布地錢佛法西來應未斷蓮花五葉再當鮮觀龍潭靈淵一壑半山頭水色藍光日夜浮百尺珠簾翻澗落千年瀑布貼溪流懸崖峭壁難窺路古木長藤不記秋洗耳挂瓢何處可吾將此地學巢繇陪葉相國登絶頂次和黃檗重開選佛場莊嚴淨土即西方石牀迸處看龍女花徑紅時見象王雙屐登臨逢世泰寸心早晚祝釐長東山未許堅雲臥苦海還須一葦航其二懸崖峭壁路千盤到得上頭覺地寬日影爐峰浮暮紫雲連帽嶽起秋寒從遊最喜來方外續句無能托筆端更欲乘風凌汗漫四埏八極一時看其三諸峰厯盡興無窮轉覺飄飄若御風黃閣暫辭君寵渥白雲新訂宦情空強躋峻嶺瞻天近笑指祥雲捧日紅海上烽煙傳已息遨遊蹤迹任西東其四樹影參差翠色陰秋雲忽起幕西岑携觴與客臨風引歸路呼僧帶月尋竹院鐘聲敲已罷蓮宮漏落夜初沉爭看秉燭題佳句始信當年快賞心黃檗新橋三樹偃蓋如亭因名曰三樹亭余嘗坐息其下神情爽快戲吟三字詩以美之一橋亭三柱下千枝椽萬葉瓦明月篩清風灑坐其間欲仙也天柱峰玉筍成天柱攀躋欲墜魂孤高通帝座秀特迥山羣肩背日摩跳朝昏雲吐吞千峰看盡小獨爾最稱尊宿黃檗寺侯官徐㶿惟起興公青峰十二削芙蓉黃檗開山第一宗陰洞有靈蟠巨蟒古潭無際蟄神龍門通十畝林間竹路指千年壑底松覓得雲房聊借宿半天殘月上方鐘遊黃檗寺鄭履和古殿為灰樹鬱蒼亂山如黛下斜陽竹盤絶磴臨溪緑松帶枯藤間葉黃遠岫雲飛龍噴雨深林風急鳥啼霜跏趺共證無生理也學頭陀禮法王遊龍潭林正立沿流覽勝陟層巔拾翠雲封別一天怪得風雷生足下喜看花雨落岩前潭鍾靈氣聲猶切山待高人色更鮮六十餘年空負也今朝滿地盡皆蓮遊黃檗林茂枝籃輿拓落屢尋幽為法何妨竟日遊宿衲無心能濟世名山有主却忘憂千年猿鶴同招隱萬壑煙霞一望收濁劫那堪人共語惟餘赤膽對林丘檗山阻雨歐玉鉉補天無計步艱難何得羣峰破怒顏淚已鶯啼方在柳人猶燕處不如山縱然學道應須靜豈有關心盡人間偶爾行藏能作主任教溪舌日潺潺春日過黃檗謁隱大師陳匡生十年烽火入門難此日偏開風雨顏高座讓公能漢語向平先我負名山春泉水試茶心苦迷路人羞佛性間夢裏疏鐘天半遠野橋林外故潺潺冒雨檗山訪友跚跚屐齒雨餘痕百里尋君叩寺門方丈好賢輕一拜山中知己重深言禪惟蘇晉能逃入社豈陶潛不許存滿眼干戈荒草路鬚眉難與佛爭尊又林朝見高僧日與話南宗踏遍名山十二峰鐘送月來風掃榻白雲流水冷青松又陳天爵幽棲近與檗山通五里煙光接竹叢草徑緣溪頻屈曲泉聲得石故玲瓏相携有客重探勝借榻從僧細論空自是坐來心境寂梵鐘林外送秋風春日散步黃檗山中吳侗春入春山春可憐芒鞋隨處踏春天臨流瞰石渾疑虎空谷逢人却是仙珠瀑晴飛雙嶂雨石門寒鎖一溪煙峰頭好景須探盡莫向深林聽杜鵑恭迎密雲和尚感賦卓冠邑侯黃檗宗風第一禪大師飛錫振龍天妙雲欲覆槃海法雨先滋熱惱田一春亢暘師至日即雨直令化城安疲衆不殊祗樹禮金仙空餘俠骨成追悔潦倒狂華四十年密雲和尚開期喜頌法鼓逢逢夜正中重看黃檗振宗風拈花一會依然在大地山河月滿空乙亥春日遊黃檗山費道用邑侯幾年聞説此山幽今日方從靜侶求尋路履坡雲影濕隔溪鐘泛樹聲浮峰開十二蓮花碧輪轉三千貝栗流稽首導師寧用語安心無法可相謀其二雨餘羅列玉浮圖萬壑松風帶鳥呼新水平鋪茵正嫩淡煙微綴翠偏腴青鞋布襪招僧侶白社詩壇擯酒徒我倦欲留留不得回頭戀煞竹蔬厨侍費老師遊黃檗山次韻林弘祖十二峰高一徑幽客來曾許靜相求即看潭水何從定莫問山雲底事浮演梵正披新敕賜逢僧偏得古名流不禁此日重回首心目悠然已自謀其二山水難窮只按圖每逢靈異便驚呼何如一策藤根瘦飽嚼三春笋蕨腴棒喝自傳黃檗派詩狂還許白蓮徒移尊試看龍湫好却起青煙竹外厨觀龍湫凌世韶我禮黃檗山陟巘入蕭散靈淵數疊垂中坐石紆坦眺聽疾送迎文字剝空窽茹妙飲晴香息念得幽盥懸簾卷玉輕長瀑依苔緩濺落萬斛珠時起眠龍懶鶴松斫已去鹿草席猶暖更登尋其源齒齒厯玄館歸來問阿師路窮天未斷遊黃檗劉以修嶙峋十二削芙蓉公暇才聞到寺鐘石乳噴珠香玉液瀑花飛雪挂蒼松客尋古洞驚神蟒僧過澄潭制毒龍滿眼春光何處望青青遙送海天峰次葉文忠公韻吳鍾巒敢謂心安即道場救時空切乏良方不參句子依禪子為念君王叩法王風度曲江人未遠謀猷磐石計應長誰知此日新亭淚灑向涼颷到海航其二世路平陂有折盤佛家田地自來寬山空晝永金身靜樹合羣峰碧影寒象教悉皈三藏內龍章曾錫五雲端祝釐當代方全盛丞相風流帶笑看其三驅車何往泣途窮安得冷然善御風經過好山渾若夢坐來大地已成空苔紋階下沉沉緑花蕊庭前細細紅冒雨欲尋名勝處水雲零亂忽西東其四我來訪勝值重陰處處飛流落遠岑方外黃冠隨去住客中白髮苦侵尋愁將孤憤呼天問悶讀離騷嘆陸沉寄語九淵龍子道開雲捧日豈無心觀潭禪關寄語亦何求聊以登臨暫寫憂淵靜抱珠龍德隱山深漱石瀑聲幽來看天上幾千尺出到人間第一流已隔恩波塵世外褰裳此地可淹留塔菴自笑身如不繫舟小菴堪憩亦優遊松間坐石溪雲起竹裏烹茶澗水流微雨忽收山寺午涼風初拂海天秋僧家受用無多許一句彌陀萬念休次葉文忠公遊黃檗韻劉沂春自慚少壯獵名場垂老歸休索禁方無奈煙氛迷眼界空留餘齒恝君王遭時不遇嗟籌短擊楫同流引恨長却羡深山毳衲子莫驚刁斗度慈航其二大塊江山托一盤華夷分畛幅𢄙寬西方教演塵心淨南國風聞素膽寒日近龍蟠知有主夜深虎嗥豈無端太平伊邇浮常慶分付叢林輟唄看其三生來不厭世途窮孤幘恆懷虎嘯風夢裏山河渾是舊眼前光景總成空有冤未雪心徒赤無事看花淚染紅檗岫森森幽絶處那知羣策躍江東其四四望昏霾接地陰陽光久待煥高岑水寒隨澗千條瀉關遠迷雲幾度尋古寺隱藏鐘磬細野廬荒燼柝聲沉忽然風起天開霽萬國歡呼捧日心次曾祖文忠公韻葉霞丞翻來覆去事何窮到底深山有古風悟至一身都是贅判將萬法盡歸空心枯座上嵐光翠睇引天邊返照紅只自閉關成獨寐不教癡夢得西東又百年消息任晴陰且對孤雲挂遠岑錫自卓來宗再振柯曾爛否路難尋燈前孤劍蒼天老竹裏疏鐘白日沉稽首十方諸善信一齊認取本來心遊黃檗林邦翰驚餘殘夢每尋幽撥得間身結伴遊梅幹凌寒初送馥溪聲話舊故爭流三千界事誰紛靖十二峰雲任去留孤憤世情無處説山光踏破忽忘愁寄贈黃檗隱和尚錢肅樂法乳垂垂第一宗深山深處白雲封慧珠散朗三千界德澤飛懸十二峰天際花光分法相岩前潭影落疏鐘生平檗味嘗難盡不及登臨謁瑞容奉侍凌鏡汭公祖觀龍潭林國炳欲得尋幽處凝望幾周回捫藤疑接漢側耳若轟雷簾影噴珠玉瀑沫潤蘚苔草木長年護煙霞旦夕開此日凌雲客當年入定裴獨立空潭際須彌納勺杯宗風舊黃檗江山暫蒿萊蓊翳憑搜剔草野喜追陪逝者如斯爾酣遊興不灰聞師曾一喝能令百川回遊黃檗吳士珊栖心佛國厭名場遊息新成却病方百丈遺風留馬祖九潭澄影隱龍王燈傳本賴因緣合法護應思願力長當日貝函羅御府誰教萬里入車航其二十二巍峰日易陰青青芳草滿層岑僧間始覺農非苦山好當招友共尋到處滄洲容嘯傲此時身世付浮沉題詩説偈真多事坐臥能通靜者心題黃檗寺曾紹烴宗風在處散天香祖印惟人只自當大道迥然超色相初心湛爾絶思量離披今古呈真界廓徹乾坤步大方直下了知無別事不隨雁影過瀟湘又張廷範尋師因覓寺識路始窮峰數葉開蓮座千枝傳幹宗僧參方歇偈客到復鳴鐘報雨前山是澄潭起躍龍寓萬松菴本邑林子春芒鞋竹杖最相宜信步行行隨所之白髮不知明日事青山還似去年時花容未盡春先老雨色初昏日已遲芳草萋萋迷去路王孫何日是歸期其二半似聰明半似癡柴門寂寞也棲遲多因適趣便成韻豈是消愁強賦詩密雨乍來花濺淚亂雲驟起石添衣青山為我羞知己終日無言獨皺眉喜隱和尚開堂林宗澤插草成宮幻幾重翠微環鎖碧芙蓉一燈月印三千界半偈花飄十二峰龍象喜開新法眼風幡長整舊禪宗不知棒喝吹毛動若個能當劍刃鋒遊石門林介石門夢想久相關十載舊觀笑未還今日我來另闢眼收羅萬壑與千山又陳特明經石門深處是雲關來路原從去路還笑却許多門外漢亂雲堆裡撥青山又林啓棻芒鞋踏破幾重關親到龍宮探寶還怪得石門扃不固珠花無數潑春山又趙連城石門無鎖不須關一任間雲自往還洗得門前淨似水只留瀑布漂青山遊龍潭老龍宮裏雨花飛間捲珠簾坐翠微只為年來貪聽法故懸瀑布剪僧衣其二酒花石上雨花啾狂吼驪龍共醉遊頷下一珠藏不得倩風高挂玉簾鈎寄呈隱老和尚浙江海寧姚翼明興公職方法名性日浙西衲子曰明心三十年來出虎林赤腳陸行幾萬里空身浪擲百千金久思黃檗山頭息誓向青蓮窟裏尋從此俗情須斬斷雲中但聽海潮音遊黃檗何旦萬壑寒松作夜流僧窗話許正當秋月經絶巘明猶隱人在深山夢自幽會是心空宜寂寞忽因雲過任沉浮一堂禪定鍾聲斷四望高峰興已悠又池顯方戴笠隨雲入竹叢清香一炷即真空試看內典三千法盡在前峰十二中度母江頭稱大義生兒天下遍宗風猛聽黃鳥松梢語疑是高聲喚遠公又陳尚庚十年清夢訪名山未識名山鬢已斑懶性羞將遲暮遣浮生浪托歲華間衝寒秉燭逢長至結侶扶笻上九灣踏破檗林峰十二叩關直謁老瞿顏壽隱和尚林嵋老人住山在黃檗桃塢桃州開向夕落花片片入窗扉回首白雲又接席石橋玄度斷人行惠公杖屨恆自適獨往之人細萬物手弄元化携金策我臨海嶠一相思城頭霞起城下碧又陳虞文峰開十二紫光浮慧眼高懸四部洲萬顆明珠兜率雨三車演法赤霞秋碧潭洗鉢龍歸藏翠岫談經石點頭古佛由來無量壽漫傳花甲已云周又余志秩不為尊生集衆緣吉祥護擁五雲邊天周花甲逢初度人得薪傳卜大年浴水聞香尋菊後歌嵩聲發咏梅先自慚寅降同斯日何事醒迷若判然又吳葆肅穆聞鐘磬祥雲護法身皈依來鹿鶴貞固比松筠座上鬚眉古山中草木新開士如師者何殊金聖人又薛道人古佛行藏別洞天長生還是不生年推翻獅子無邊岸度却人間沒底船棒吐毫光圓六丈潭空聲色遍三千欲知面目向何處打破關頭只一拳又林宗聖寺門羅衆峰一望蒼浩浩知有壽世人其身合壽考氷雲為精神雲霞為文藻五嶽為真形造物不能老片心化空潭塵慮淨如掃獨笑神仙愚忍劫居蓬島何必西池桃何必羡門棗隨意饌伊蒲自然容顏好禮足我師前敬愛交懷抱泉明對遠公相知恨不早偶入石林來從人效松禱花木難久榮法躬可長保梅福菴環菴不但梅直以梅為主想見種花人寒香入肺腑又吳承啓投杖自跏趺白雲錯認客不待花之開空香如可摘石橋散坐石梁中影隨流水去月痕與樹陰多是澄心處方丈茶話施樵松筠未便隔人間即景栖尋豈是間一榻對師心自遠個中認得萬層山遊黃檗山興何曾滯雨聲善遊原不礙陰晴竹房僧有無窮話春澗雲非一味生違俗已能先領悟隔橋妙在未經行且同細酌夜來靜半是疏鐘濕又明又懸泉高拂竹千尋萬樹未花雨有心路小又侵苔葉半橋危偏引勝情深窮搜古迹如終卷痛快斜暉似惜陰僧偶開門笻偶倦茶香欵欵輔幽吟又王元升老樹槎丫路鬱盤到來方覺道場寬風前試茗松聲壯竹下敲棋日色寒流去世情春水上帶歸遊興暮峰端瞻依名剎緣非偶新舊威儀次第看又歐永堅也將書劍問名山猿鶴無心水自潺滿地黃花因我老數莖緑竹為誰刪疏松密寫千枝恨排石微教一日間屐齒不驚龍臥久潭頭拾得白雲還九日謁隱老和尚林繼焲古剎出上方黃檗名已久伊昔思負笻今茲得稽首陟歷山之巔到來九月九此日啜嘉茗何事傳萸酒登躋未及巘眺望立高阜悠然爽心目曠矣離窠臼三千界一如十二峰左右叢竹森以矗寒潭清且瀏梵宇敞巍峩貝葉列瓊玖經函捧上京展誦瞻我后一拂西方來隱公黃檗壽懺禮問大師洪鐘敢小叩未定思生慧鋤蓮以覔藕未能洗胃腸曷以翻筋斗紛紛處塵俗默默觀空有火坑已墜身丹梯望引手師言指不二我心披荊莠始知探龍湫更聞真獅吼高足立師門論心稱作友禪心與詩思闢戶而啓牖既以發真諦大能掃敝帚相對喜開顏獨我愧掩口未了死生緣可堪棒喝否又林繼京侵曉別崇阿又思躋古寺遙指鬱蔥蔥萬木集秋氣一舍路盤回停午行方至仰看六六峰比連繞蒼異寶剎煥何年莊嚴各位置貝葉與琅函悉皆內藏賜所以山益靈代有高僧寄今日知者誰隱公出相繼臨濟之真傳正宗三十二肩力苦支撑淡泊堅誠志棒喝醒迷途天人均受庇種種救頭然功德難思議余家滄海濱百里來猶易况負泉石懷何由不早乃待晚歲間登高履茲地莫非結宿緣與師有默契入堂頂禮時寸心會真諦遊龍潭劉履丁鮫宮遙望插雲霞開士躬耕擬作家石上心齋多水色頂門香雨噴天花山公説虎牛頭下羽客談龍鳥路賒此地却難休歇處扶笻更上莫周遮登四潭絶頂林百燕杖履翛然絶點塵窮登石磴草痕新亂溪水繞難尋路古徑煙深不認人山外老僧同鳥隱雲端小築與天鄰若能此處投身靜何必桃源可避秦訪隱大師作林崇孚巍堂憶自嶺南來極樂菴同般若臺慧照早懸頭上月機鋒迅喝耳邊雷遡元政爾推黃檗偕隱何人訪大梅老矣竛竮窮子恨空教素手寶山回黃檗夜咏王奐寂寥自是此山秋况復深心見夜幽一磬飯僧歸鳥急數峰迷月暗泉流滄桑事大人難語身世情空佛可求地滿風塵誰得似行將惟許許支遊遊黃檗石愧園飛來峰十二度却界三千境寂如無地僧高別有天青松知入定緑竹也通玄無限崎嶇意行行到此平遊一潭林守穡靈潭勝處譜名山共喜搜笻到碧灣薜荔披來人影出雲根坐憩水聲潺珠生絶壁青天唾月挂長流白練環閩粵圖今已矣低徊疑是釣龍還遊黃檗林之玄霽後千峰淨碧蓉曉雲推夢醒玄宗春山積霧應潛豹夜雨空潭想臥龍人度潺湲支一竹鳥分靜理寂高松離塵數里頻過此不記間聞幾度鐘重遊黃檗施宛駒濯去衣塵上碧岑一聲清磬草年心嘯吟但肯招元亮名理誰堪接道林獨為煙霞留器鉢自然山水見高深半生細省浮頑在今日能無托靜尋遊黃檗林啓棻溪聲怒濺鳥聲寒塵想遙遙共草刪傲骨只餘雙白眼舊交惟是一青山秋風不瘦江淹筆明月長留慧遠關借問九淵誰得似幽心莫負水潺潺觀龍潭有感珠花亂擲碧潭春鳥瞰危濤不怯人幾字滅明石壁上青苔欲奪客衣新脫屐坐雲生遠想冷然喪我不留塵自昔西山來一禱至今流水見精神水流不拖人影去遙遙獨見白雲親世事既如此何須別問津只此潭頭待吐月傷心莫動老龍嗔阮籍空多窮途哭東施枉效西施顰洗心退藏覔箇裏但有清流不厭貧千仞飛崖侵鹿爪御風聽瀑悟前因檗山留別隱大師施宛駒蹤迹思歸方外難千溪未浣厚羞顏春過麥秀皆誰地雨足薇肥獨此山道在斯時偏用拙天生我輩豈耽間他年白社招幽客一杖依依聽水潺遊黃檗訪隱元和尚李琚偶來古檗訪南宗乘興時登十二峰四顧林巒香霧合幾看殿閣紫雲封禪心水湛消塵慮慧語茶清醒世容今日支公能愛客擬將書劍寄行蹤遊黃檗寺與主僧夜話連江一齋陳第季立都督將軍乘春遙入上方遊更喜相逢有惠休雲氣晝將山色瞑竹風夜帶雨聲秋開畬石徑迷荒草説法天花墜小樓千載維摩今未見十年空病海東頭步葉文忠遊黃檗絶頂韻本邑薛敬孟貢士天光圍處水何窮狂嘯聲生四際風白日倒翻河漢落丹梯遙拂斗星空眼前峰岫看兒拜衣上雲霞擁客紅安得逍遙憑羽翰昆崙西去又過東其二日月雙蟠蟒洞陰欲排閶闔上危岑雷轟山半龍疑戰帽落峰頭客未尋鳥下層霄青嶂夕猿啼歸路碧煙沉紅塵飛滿桑田變唯有青山是夙心季秋遊一潭至四潭回厯竹菴諸勝本邑郭祚鴻文學躡屐衝寒破曉嵐沿溪覔路愛奇探畫圖秋色披青嶂雷雨晴空落碧潭客子笻邊花自媚奚奴囊底筆應酣前林斜日忘歸晚買興還來扣竹菴遊黃檗寺有序武林柴望黃檗為福唐名勝余神往久矣丁未春暮偶過玉融因虛白大師招同郭蓮峰夏鷲峰兩先生相携登陟得憑覽其萬一焉此中洞壑林巒爭奇競秀者不可殫述獨第一潭為靈淵而名尤著飛簾捲雪匹練垂虹沉碧渟泓幽深莫覺憶余生平閲厯如黃華白嶽九子百泉諸名山水不少概見然或晴巒珠噴而響寂銀河或陰壑瀑懸而簾空暮雨若雙奇盡美眩目快心惟此龍湫迥然獨絶矣時爰讀葉文忠公詩嘆為此山寫照敬循原韻勉步四章聊展夙懷不自知其句之拙也龍象依然古道場遊蹤何幸到遐方函開貝葉頒天府石湧蓮臺護法王客裏不知春事減靜中始覺俗緣長草年宦海茫無岸願向慈雲濟一航一線清溪曲曲盤泝流直探水源寬危巒磴絶驚身幻陰澗雲深照膽寒玉筯紛披聲有節珠璣錯落影無端龍潛會際需霖雨莫作泥蟠等眼看鳥道紆回徑不窮巢居真有上皇風胸中丘壑毫端見足下煙嵐杖底空衣袂映將春樹緑山椒曳得曉霞紅我來欲結遊仙夢鞚鶴追隨弱水東蒙葺翠滴古藤陰選勝爰登最上岑竹籟松濤心欲寄水瓢雲笠迹難尋猿扳樹嘯高巖徹龍抱珠眠邃谷沉拂蘚遍賡題碣句留連自古有同心夏夜宿黃檗寺劉與可邑侯絶巘紆回路欲迷忽聞仙梵隔林西藏經閣靜風聲細報雨峰明月影低千片白雲新接引數株黃檗古招提遠公已喜同參悟相送何妨過虎溪遊黃檗有引石城鄧獻英邑侯余叨福唐令以便緣過黃檗山登臨十日時乏名山主人從鄉縉紳請迎清斯和尚復來卓錫余迫於簿書未暇重往清斯亦未肯曳屩就也別去又將匝歲因憶山遊詩暨懷清斯之作録以寄之十里煙霞隱上方到來頓覺醒炎涼印心堪對龍淵碧參座遙聞花雨香竹外鐘聲驚鶴夢山頭雲影下僧床乘間暫著登臨屐何似金門問未央其二崔嵬古寺孰堪儔幾見生公石點頭礙日高峯銜落照環橋曲水漲回流枰敲竹裏僧歸院茗啜花間月上樓為問閬仙何處去空留詩卷冷如秋夏日遊黃檗觀瀑布西粵潘德周種齋太史十二芙蓉起鬱谺東南形擁翠屏遮雷聲夜走千山雨雪霰晴飛六月花靈異曾經題帝翰波濤常此護龍窪是間即謂銀河路漢使何勞問海槎黃檗留題張縉雲邑侯兩山留古剎中隔一高峰昨訪俱胝石今聞黃檗鐘規模同廣大蹊境覺從容未踐秋期約靈湫看白龍與一菴暹和尚鼓山與黃檗蹤迹偶然存雲水隨行腳篇章見道根磬聲常在几塔影自當門想識蒲團意無煩貝葉論其二宰官今面目真我詎能存宦味成雞肋厨香憶菜根六年違子舍萬里望君門不有詩僧在吟懷那得論與蘭圃和尚梵宇何年建蕭然古德存清泉穿屋角老樹齧山根共識初來地誰窺衆沙門白頭持一衲住世意難論其二飽腹聊題句應嗤世味存那知翻舌本多事是牙根得意留禪榻忘懷在吏門一菴老禪子近又作何論寄暹禪師用東坡次參寥子韻郭龍光韶溪學正摩尼一照濁水清出入三昧散五形團蒲坐破獅子窟天花滿座飛繁英何言佛法有興廢泡影夢幻皆渺冥庵前古木出巨火頭上積雪空崢嶸毒龍洶洶跳鐵鉢金剛打睡劍不硎十二峰頭石破裂秋雨逗落蒼天驚師時飛錫出山去孤雲飄蕩南昌城江淹詩字剝苔蘚淪隱種植殘空庭行徑犖確亦何有僧徒散落稀晨星問師不歸龍象泣夢中爭遣羅漢迎短笻朅來風雨驟芒屨疾走猿猱輕興衰起廢實吾法彼佛一一如人情先除香積筧流水次築彴略便人行護持松竹比妻子收恤行腳如孤惸琉璃金碧換世界願力雖大知易盈病軀長夏困炎熱未敢烈日紛長征涼秋問法約二妙準取醍醐為我傾祝暹法師六秩江田梁運昌太史嘉慶癸酉冬月十有九日黃檗暹老禪師介陸亭王君識余於榕城聞其論詩蓋貫休齊己流也陸亭為余言明歲八月為師六十之辰俾余以詩為壽輒率爾成篇録呈法鑑並訂後期昔我遊福唐香界屢登矚山水非不佳緇流頗碌碌麈尾弗振塵佛香時斷續見客少寒暄逢人説禾穀了義休問渠倘未識語録久聞黃檗名古剎隱喬木百丈千載還何人接芳躅客有招我遊眉作淵明蹙諒無遠公流枉費尋山足那知輕薄懷及此生悔恧暹師宗門秀行止類野鵠凌晨造我廬問客何不速答云欲論詩令我廢朝沐及乎應接間內潤外朴素高興躡煙霞幽期淡松竹妙解看轉丸清言聽炙轂吾觀沙門儔師韻無適俗昔遊恨不遂憚行失老宿况聞師工詩佳句積縑軸湯休起我病索題紙一幅相知苦不早告別太匆促問師自何年卓錫此崖谷僧臘今幾何眉壽若可卜師言甲戌秋甲子一回復我聞歡喜生遊興乍棖觸我有方外交結茅鼓山麓向亦耽苦吟清韻動哀玉王子師所善同年王陸亭先生與我亦頗熟來秋三人俱訪師溪山曲師能使我留唱和擬皮陸山間月正明巖下桂當馥侑師以清泉芼師以杞菊谷鹿與澗猿隨我為師祝更將師詩篇焚香共細讀又喈庭丁桐郎中宗鉢多應付得人故林歸老説禪因曾經浙水航慈筏幾向閩山轉法輪過眼紅塵渾是幻浮天飛絮不知春芒鞋錫杖耽行腳萬古瞿曇色相新壽暹導師七十芷汀葉申萬太史林巒影裏有真禪彈指空中七十年銀鉢靜涵花雨氣衲衣寒挂雪峰煙吟容賈島稱詩匠醉許劉伶作酒仙別後近聞栖海上白雲深處恣情眠李彥章寶樹種恆春天花不染塵山依般若古心與妙香親黃檗開初地青蓮悟後身法雲終古駐間其演珠輪本邑林萬年大令君本榕城裔來居檗岫巔讀儒超俗類學佛覺人天暹老師遊戲三昧集題辭江右蓮士戴衢亨殿撰中堂栯堂詩句石門禪仙露明珠顆顆圓拈出波羅花一朵法中微妙笑中傳竹針麻線作家禪的的西來大意圓拋撒珍珠彌法界人間天上瓣香傳又閩縣陳賡元瀛仙大尹裁剪文縑信手編芙蓉初日想天然為從古剎參真佛不意人間有閬仙聽雨別尋三竹外論詩應在六朝前羡師咳唾成珠玉散作飛花下九天又侯官鄭德崇象峯大令貝葉優曇綴巨編水光山色趣悠然詩如靈運終成佛才到青蓮是謫仙午榻間吟新雨後小窗對話落花前知君得意揮毫處清磬一聲雲滿天又閩縣林元英辨瀛進士黃檗庵中舊衲子打包走遍幾千里一雙法眼如鏡光飽看人間好山水師精堪輿歸來詩草一寸深自刪自改自哦吟吐屬不留蔬笋氣行藏聊寫水雲心借棲或寓香花地掃徑偶然逢客至一夕清談低劫塵三生慧業歸文字淳粹顏容滿月同詩僧苦吟貌加豐請看廬嶽三峰下山色年年屬遠公
