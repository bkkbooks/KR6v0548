body:
  text: 重興隆琦隱元祖師原本門弟子性幽獨往等編訂續修監寺道昱道升道本宗儀開滋永悅副寺惠秀舜普永施同靜寺宗堂宗愷德科傳圖華懺常澄紹仁本岐紹修校刊僧世所謂僧者圓顱方服已耳然而圓顱方服之倫有名足廁於天朝行堪垂於後世者何哉蓋慧命法身任綦重焉利生筏物績綦弘焉績弘而任重釋教所以鼎立於中天亘萬古而不昧者也試觀古來知識顯晦出處各有其時取豫設施必以其道譜録之記載良多曾圓顱方服云乎哉識者於此盍三復夫張文定公之言唐開山正幹禪師師姓吳莆田人得法於曹溪後辭歸至福唐黃檗山乃曰吾師受記遇苦即止其在是乎遂結菴於茲為黃檗之肇始云右嗣法曹溪斷際運禪師師諱希運法嗣百丈閩之福唐人也幼于本縣黃檗出家額間隆起如珠音辭朗潤志意沖淡遊天台逢一僧與之言笑如舊相識熟視之目光射人乃偕行屬澗水暴漲捐笠植杖而止其僧率師同渡師曰兄要渡自渡彼即褰裳攝波如履平地回顧曰渡來渡來師咄曰者自了漢吾早知當斫汝脛其僧嘆曰真大乘法器我所不及言訖不見後到洛京乞食因一嫗指往南昌見馬祖師至南昌祖已遷化聞塔于石門遂往瞻禮時百丈廬於塔旁乃問巍巍堂堂從何方來師曰巍巍堂堂從嶺南來曰巍巍堂堂當為何事師曰巍巍堂堂不為別事便禮拜問曰從上宗乘如何指示丈良久師曰不可教人斷絶去也丈曰我將謂汝是個人乃起入方丈師隨後入曰某甲特來丈曰若爾則他後不得辜負吾師序遠來之意願聞平日得力句丈遂舉再參馬祖侍立次祖目視繩床角拂子我曰即此用離此用祖曰子向後開兩面皮將何為人我取拂子竪起祖曰即此用離此用我挂拂子於舊處祖震威一喝我直得三日耳聾師聞舉不覺吐舌丈曰子以後莫承嗣馬祖去師曰不然今日因師舉得見馬祖大機之用然且不識馬祖若嗣馬祖已後喪我兒孫丈曰如是如是見與師齊減師半德見過於師方堪傳授子甚有超師之見丈一日問師甚麼處來師曰大雄山下採菌來丈曰還見大蟲麼師便作虎聲丈拈斧作斫勢師即打丈一摑丈吟吟而笑便歸上堂曰大雄山下有一大蟲汝等諸人也須好看百丈老漢今日親遭一口師後曾散衆洪州開元寺裴休相公一日入寺行次見壁間畫乃問寺主云畫是甚麼主云是高僧裴云儀象可觀僧在甚麼處主無語裴云此間莫有禪僧麼主云有一人裴遂請師相見乃舉前話問師師召云裴休休應諾師云在什麼處裴於言下有省遂復請師開堂及會昌二年裴廉鍾陵自山迎至州憩龍興寺旦夕問道大中二年裴又廉宛陵仍禮迎至所部安居開元寺就宛陵建大禪苑請師開法以師酷愛茲山還以黃檗名之今諸方有謂黃檗者皆茲山始也裴一日以所解呈師師接置于座略不披閲良久云會麼裴云不會若便恁麼會得猶較些子若也形於紙墨何有吾宗裴乃贈詩一章曰自從大士傳心印額有圓珠七尺身挂錫十年棲蜀水浮杯今日渡漳濱一千龍象隨高步萬里香華結勝因擬欲事師為弟子不知將法付何人師亦無喜色自爾黃檗宗風盛于江表師接人機用孤峭所被皆上根中下之流莫窺涯涘唐宣宗大中三年示寂敕諡斷際禪師塔曰廣業嗣法弟子六人曰臨濟義玄曰睦州尊宿曰千頃南曰烏石觀曰羅漢徹曰裴休居士惟義玄禪師為正傳建立黃檗宗旨一時道播諸方而臨濟一宗屹起于此歷七百餘年代不乏人兒孫遍天下皆師源遠流長故能赫奕如是也師有宛陵集及心要二卷行于世懶菴禪師師諱大安號曰懶菴福唐陳氏子初受業于黃檗山習律乘嘗自言我雖勤苦未聞玄極之理乃孤錫遊方將往洪州路出上元逢一老父謂師曰師往南昌當有所得師即造百丈禮而問曰學人欲求識佛何者即是丈曰大似騎牛覔牛師曰識得後如何丈曰如人騎牛至家師曰未審始終如何保任丈曰如牧牛人執杖視之不至犯人苗稼師自茲領旨更不馳求有同參靈祐禪師創居溈山師躬耕助道及祐歸寂衆請師接踵住持後住福州長慶大化閩城二十年唐中和三年歸黃檗示寂塔于長慶之楞伽山敕諡圓智禪師右南嶽下鴻庥禪師師姓翁福唐江陰人神宇標挺玄機幹運府宰請師主席黃檗寺叢萃毳客示教之外怡然自樂恆言夙債須償償盡則何憂何懼物我俱逍遙矣人皆不喻其旨及廣明之際巢寇充斥衆邀師逃難師曰捨生就死人之所難我若躡竄賊必窮追山林寧捐我命以活生靈是日雷雨晦冥須臾賊至師出寺外脫衲衣於九龍樹下盤石之上言曰誓不汚清淨之地乃安常引頸待刃賊反問以國事師曰汝輩犬豕矣見龍頭必敗李樹下逢虎狼遂遭女兒手奚敢問大事賊怒戕師師神色不易白乳逆流逈而復合賊翻驚異羅拜懺悔迎師歸山門弟子景先闍維其尸收舍利七顆囊而寶之有篤信者以菽粒如數易之追之靡及遂往筮焉占之曰死生貴賤罔分吾卦在靡在之失寧失矣孰知其然也洎獲置之于塔分七粒于琉璃器中瑩然光色僧清豁著文以紀德焉玉閭子曰師不以罵賊傳以罵賊傳者淺視師矣然即此論之亦足見其曉然于生死也菩提不動順逆同觀人以本來洞徹見奇區區先見之明得手後尋常事耳吳鍾巒曰禪學宗門了生死不及名節事余每謂朝聞夕可及有殺身成仁無求生害仁二語為吾儒了生死處如鴻庥禪師臨難不苟免以犬豕罵賊死豈非仁人志士者乎山窗閲黃檗志取其有合于名教故特表而贊之曰九龍樹下夙因償不動巍巍試劍鋩白乳逆流心血赤人中鐵漢法中王右法系未詳後唐黃山輪禪師師諱月輪福唐許氏子志學之年詣本邑黃檗山寺投觀禪師稟教及圓戒品遂遊方抵淦水謁三峰機緣靡契尋聞夾山盛化乃往叩之山問汝名甚麼師曰月輪山作一圓相曰何似者個師曰和尚恁麼語話諸方大有人不肯在山曰闍黎作麼生師曰還見月輪麼山曰闍黎恁麼道此間大有人不肯諸方師乃服膺參訊一日山抗聲問曰子是甚麼人師曰閩中人山曰還識老僧麼師曰和尚還識得學人麼山曰不然子且還老僧草鞋錢然後老僧還子廬陵米價師曰恁麼則不識和尚也未審廬陵米作麼價山曰真獅子兒善能哮吼乃入室受印依附七年方辭往撫州卜龍濟山隱居玄徒雲集師遂演唱夾山奧旨道聲顯著後歸臨川樂棲黃山謂諸徒曰吾居此山頗諧素志矣僅住十三年學者無虛往以後唐同光十二月草一日示疾二十六日午時坐化壽七十二臘五十三塔于院之西北右青原下明重興大休禪師師諱大休莆田人結茅山中法從頗衆莆心鑑周公聞其名遂往訪之先是師預語行童曰行有檀樾來斯宇其復興乎明日公果至與師語大合公慨棟宇之傾圮不足以嚴佛而居僧悉捐己資重興之所需無巨細皆自莆航海而來於是殿閣從新一時崇盛時洪武二十三年也塔幢幡峰莆狀元林環公為記此蓋據心鑑公行略録其大槩云右法系未詳明第一代黃檗開山請藏賜紫正圓中天祖師師諱正圓姓陳惠安人禮福州高蓋寺大菴為師後過黃檗見祖剎凌替侵屬民間輒卓錫于茲誅茅抉莽備歷辛勤堅志恢復竟還寺業什之二三乃搆佛堂于大殿之址既而思業大力微非帝德法寶難鎮宏基遂奮然赴闕奏請龍藏候命八年孤苦萬殊不少易其志卒以疾終于都下時萬歷庚戌年五月十六日也其後徒孫興慈興壽二祖不替先志上請益堅神宗可葉文忠公奏遂得賜敕乃持靈骨歸天啓改元葬於大溪山塔迄今御典輝煌殿閣巍聳得非祖之願深所致哉第二代重興覺田法欽大師李姓隆慶間中天老人為之剃染協創此山入道童真驅狐兔剪荊棘初無把茅蓋頂不避雨虐風叨手拮據而口卒瘏悉力於畚臿之中結廬巖竇藉草跏趺採蕨療飢牽雲補毳日於單瓢破笠之下與鑑鏡二祖論道證心時多絶粒禪誦不輟二十餘載歷盡菀枯譽訕向背炎涼之態不畏險不憚勞備嘗艱辛百折不回殫志經營必底於成僅得樜仔裏鐵灶底寺業十之一二乃於山鄰波旬肆虐蹂躪瓦礫灰劫之區建大殿數楹倏變榛莽荒穢為清淨道場披星宿霧踏破芒鞋亦自忘其締構之難也厥功詎可泯乎宜當昭垂於奕俾後代兒孫知創業之艱苦萬狀耳寂正月初二日卯刻葬祔四潭寶峰中天祖塔坐辛向乙徒三鑑源公寶燈公鏡源公也第三代護藏賜紫興壽鑑源禪師晉江許氏法欽田公冡徒萬歷辛丑中天圓祖赴闕請藏俟命八載卒于都下之長榮茶菴祖不替先志同師弟鏡源公餐風眠雪備歷勞瘁匍匐數千里叩請益堅越六寒暑蒙神宗皇帝敕賜萬福寺匾御經全藏紫衣三襲錫杖鉢盂還山乙卯鼎建大殿法堂何喬遠少司空贈詩云鑑公一法不離心特乞藏經鎮寶林欲與僧徒開月慧大將文字振潮音衣鞋破綻耐貧久十五年華守闕深斷際裴休為弟子今來閣老布黃金天啓丙寅五年正月初十日辭世書偈云煌煌龍藏永鎮禪林海天萬里波旬不興噁喝散浮雲千嶂淨一輪明月正天心闍維舍利五彩葬祔寶峰祖塔第三代護藏賜紫興慈鏡源禪師福唐萬安所林氏法欽祖季徒卯歲脫白百家文字過目靡遺偈頌數千言搦管立就登藏經臺有感云昔日靈文何處在荒臺惟見鷓鴣飛中天祖進京請經守候多載未旋有懷師祖句云當年杖錫去悠悠薊水閩山萬里秋又云征鴻千里無書至翹首長空看斗文當荒山岑寂鄰魅肆擾采薇作供鹿豕為羣苦淡難堪百計耐守不匱孝思誠為千古所欽式也逮得祖計昆季不憚艱辛跋涉京邸御試楞嚴獲膺高選欽賜藏經六百七十八函帑金三百兩敕書一道寺額紫伽黎鉢盂錫杖特命御馬監王諱舉賫護到閩烜赫天章照耀巖谷萬里海邦莫不駭矚時萬歷甲寅歲也戊午正月念五日入滅第一代住持開法密雲悟禪師師諱圓悟字覺初密雲其別號也宜興蔣氏子依樵為業年二十有七負擔度山曲觸積薪于路忽有省日用昭昭然自是恆自返照雖穿城市涉俗緣不少間越兩年棄室又明年父送之龍池上禹門禪院投幻有傳公出家爾時師自覺心境兩立於古人天地同根萬物一體有礙請益公但云汝若到這田地便乃放身倒臥無別語又一日申前問公良久師不領公云可憐可憐師無語作禮而退嗣是日周旋左右惟聞叱詈慚悶交極遘危疾流汗二七日乃蘇已而掩關越三傳公入都門以院事屬師一日過銅棺山頂豁然大悟尋北上覲公公問曰汝離我三年有新會處麼師云有公云有什麼新會處師云一人有慶兆民樂業公曰汝又作麼生師作禮云某甲特來覲和尚公曰念子遠來放汝三十棒師便出未幾辭公南邁公囑以書曰但適意處斷不可往不適意處作急走過恁麼行去不要記數待十字路口有個跛足阿師與汝印正我自來召汝師於是歸龍池登九華泛普陀陟天台厯覽吳越凡四載公召之歸問曰汝這幾年曾見什麼人師以腳打地手拍膝公曰汝在外幾年一點氣息也無師云和尚疑則別參時年四十有八一日公集衆升座付師衣拂師辭不受公曰汝何意思師云直待和尚天年守塔三載然後可行則行當止則止又一日公曰老僧昨夜起來走一回把柄都在手裏汝等為我扶持佛法師呈偈曰若據某甲扶佛法任他都來總與三十棒莫道分明為賞罰公大笑師接來付火萬歷甲寅春二月十有二日傳公入滅師伴龕三年丁巳諸檀越方請開法乃繼席龍池辛酉冬曳杖長往壬戌乃住天台之通玄峰頂縛茅以棲衲子甲子夏四月鹽官文學蔡聯璧等迎住金粟廣慧禪寺閲五載己巳古瓦頽椽聿為寶坊是年秋僧隆宓隆瑞等同檀越葉益蕃外護林伯春卓冠林宗漢龔士龍修書請師住持黃檗明年仲春師飛錫來閩於三月草七日入院甫一期而鹽官緇素賫書迎師歸金粟衆懇留不可遂以八月朔日出山回金粟辛未元日受阿育王請四月司理黃公請住天童然天童江南第一寶坊自義興開山宋宏智中興至此祖風陵夷極矣師作興修偈曰太白山下天童寺洪水漂流殿如洗普告四方諸檀那大家出手共扶起越十春秋禪林規制全備共住僧衆三萬餘指衆益繁師忌盈滿乃出山曳杖渡江過紹興驥超祁侍御留別業四閲月問道如市應酬益繁壬午春遂至天台通玄四方學者日益盛七月天台百里之內居民咸見通玄峰四山變白夜有流光如火照耀巖谷初三日示微疾初五日手書復驥超居士初六日嗣法問疾至師顰顣曰汝忝為一方化主奈何以我故頻頻往來騷擾諸山哉初七日晨興巡閲工作院務如故日午歸方丈語侍僧倦甚乃登寢榻臥少頃起坐跏趺未竟奄然示寂九月天童門弟子六十餘衆迎龕歸天童全身塔于寺前山幻智菴之右隴師凡六建法幢其升堂語要編成二十卷離為四册其闢妄據評辨天判語諸説編為十卷離為五册與闢救説共刊行以壽於世剃度弟子三百餘人嗣法門人一十二位世壽七十有七法臘四十有四弘法三十年間風行草偃馳走天下宿衲鴻儒道滿神州名傳紫閣愚頑慕德率土欽風津梁百代永垂于千秋矣第二代住持開法費隱通容禪師師諱通容姓何俗諱懋浙邑之江陰松岡人也年十四出家於鎮東三寶殿禮慧山為師後同山住福州華林祖師殿時已十九歲便知有宗門中事遂發憤行腳初參壽昌提狗子無佛性話一日昌上堂與僧問答師在旁不覺激策身心如熱病相似看此話頭始覺綿密成片遽忘寢食至五鼓身世俱空話頭脫落目前虛逼逼地遂走見昌云今日看破和尚家風了昌云有甚麼見處師便喝於是日用自作主宰遂往參博山雲門古卓憨山然在雲門最久後再返壽昌皆不能了手乃有偈見志云吾年二十五氣海吞佛祖不過古人關豈踏今時路祇覺此一件事當陽披露不可指目但不體貼不能休歇每趺坐私謂若此如何了得死生忽然墜淚欲行腳又思諸方無人偶僧持密雲公語録至師閲便知大有過人處必能了我大事然猶懼得失焉未幾傳悟公自江西往天台過寓吼山師聞之冒雨往謁禮拜起便問覿面相提事如何悟公以手中極大番菩提珠盡力照頭一打師云錯悟公立身又盡力一打師盡力一喝悟公祇管打師祇管喝至第七打頭顱幾乎打裂所有伎倆知見一切氷釋直下似塊鈍鐵一宿乃辭去閉關日用得力現前從前知見如布袋盛椎子一一敗露無一句可用及出關復往天台親近悟公一日公問薰風自南來殿閣生微涼汝作麼生會師云水自石邊流出冷風從華裏過來香悟公云離了此又作麼生師云放和尚三十棒悟公云除却棒又作麼生師便喝悟公云喝後聻師云更要重説偈言悟公便休去又一日師問臨濟上黃檗不終夏而去途中却疑此事便回意旨如何悟公便打師亦打過日遂辭公回閩住山時天啓三年癸亥也有居士何行心蔡行莊結菴于福州茶洋山延師住焉跨三年復移菴于鼓山別峰及戊辰秋悟公以書喚師至金粟欲立西堂師遽辭求進侍者寮明年春還閩中越八月福清縣緇素請悟公住持黃檗懇師引領遂同僧隆瑞居士林杰夫過金粟是冬悟公又命師執西堂事庚午春悟公應黃檗請仍立師領衆八月悟公回金粟師隨送至浦城公辭免值蔡居士移居于浦復就彼覓馬峰留師棲止衲子雲從漸成法席癸酉四月僧隆宓等齎居士林朝龍薛秉鉉陳治安林有喜林正立夏春暉吳承啓龔士龍等書請師主黃檗法席九月離馬峰於十月五日入院開堂三載語録八卷刊行師嗣密雲悟公悟公嗣幻有傳公溯源曹溪為三十五世孫右臨濟宗第三代住持佛慈廣鑑慧光普照隱元隆琦國師師諱隆琦號隱元本縣靈得里東林林氏季子也父在田母龔氏六歲父客於湘未歸自是家産日耗難以攻讀至九歲入學十歲廢讀遂漸學耕樵為業每靜夜與二三友坐臥松下仰觀天河運轉星月流輝誰繫誰主躔度不忒心甚惑焉然此道理非佛仙難明才有慕佛仙之念意雖未決志在塵表無心於世十數年來所為頗多顛沛年三十禮本寺鑑源師落髮有嘲者云東林也有佛邪師云嘗聞佛性遍周法界豈外東林耶嘲者嘆妙師即發願云此處若不精修佛行以壞法門生陷泥犂辛酉春領簿往京募化欲完此道場至杭適時仁師京回談及京中多事緣事遂止乃問仁師依經解義三世佛冤離經一字如同魔説如何消釋仁云三十年後與汝道師即私忿意為欺人太甚難道這兩句經有甚麼難會以待三十年耶便不同回山今日思之仁師此句大得力矣當時若依經解説一篇則被摩捋回山安有今日之事乎所謂靠將不如激將飄然遍厯名剎第有一德可稱者亦依同住甲子春上秦住山積善菴景西主人問路中還見有好人麼師云試指個不好的出來看看西默然師云不見道仁見為之仁西又問七處徵心畢竟心在甚麼處師云且坐將茶來西無語師云下文還長付在來日正談及參天台之事忽聞老和尚來應金粟喜不自勝私謂符我所願買舟同到金粟參見和尚問學人初入禪門未知做工夫求和尚開示雲云我這裡無工夫可做要行便行要坐便坐要臥便臥師云蚊子多臥不得時如何雲云一巴掌師拜退致疑不決七晝夜經行坐臥無有間斷至第七日下午老和尚在匡祖堂前過師擡頭一見有省便拜云某甲會得和尚掌中意雲云道看師便喝雲云再道看師又喝雲云三喝四喝後如何師云今歲鹽貴如米雲云走開不得礙人路頭師禮拜退日常自作主宰活潑潑地亦不請問亦無疑情至丙寅冬五峰為西堂師竪拳云識得這個天下太平識得這個天下爭競如何決斷峰云這個從甚麼處得來師便喝峰云那裡學得來師又喝峰便打師再喝峰再打師喝兩喝峰打兩打衆謂老隱今日敗闕師云非汝境界由是坐不得臥不得氣噴噴地平目而行千人之中不見有一人并不見有己身行至次早課誦維那鳴磬一聲忽覺身在此立課畢仍舊而行衆謂老隱著藥了直至第三日上午忽窗外一陳風吹入寒毛卓竪通身白汗大徹源底便知三世諸佛歷代祖師天下老和尚情與無情盡在毫頭上了了分明無二無別不可舉似於人自證乃知心中甚喜逢人即笑人謂老隱被魔所著師云非汝所知但記得經云若作聖證即入群魔遂無喜色尋常如舊續知師知師所得謂峰云此子徹也乃喚進寮云汝有悟處試道看師云道即不難只恐驚羣動衆峰云但説何妨師即打斤斗而出峰云真獅子兒善能哮吼後即出堂領火頭一日老和尚與衆論敬鬼神而遠之衆答已師亦在門外立老和尚云汝進來説説看師進前𥪡火又云離不得這老賊近不得這老賊雲打云汝作賊會耶師即拂又出云賊賊庚午春本寺耆舊請老和尚至山同回寺領命漳南募化見東里王居士云請老和尚到山之意又到潮州草菴月餘師衣衫藍縷其主人疑非黃檗緣事不就占二偈為別草鞋踏破已多年半似風流半似顛滿地黃金渾不顧又拈白紙告青天其二試將冷眼向南看世道紛紛化道難三十年來無取舍相逢盡是鐵心肝即回至漳聞老和尚有答東里公書八月初一日歸浙漳州諸緣不交空手歸來益見山中淒楚則云檗山蒼翠疊層層難掩孤貧一個僧堪笑化工又未瞥春來秋去太忙生辛未春龔夔友夏象晉同石居士請住獅子巖癸酉冬山中請費和尚主席命師為西堂師辭不得遂就職和尚上堂師即問打著昔時舊痛處于今猶恨棒頭輕請師末後一頓師打曰舊瘡瘢上著艾進云恁麼則徹骨徹髓去也師曰如何是汝徹底意進云時清休唱太平歌和尚只引得一半師即禮退一日諸禪人頌百丈再參馬祖一喝百丈耳聾黃檗聞之不覺吐舌因緣師目云總未妥在亦頌云一聲塗毒聞皆喪遍野髑髏沒處藏三寸舌伸安國劍千秋凜凜白如霜和尚即圈出粘在法堂示衆升座云吾有一枝拂子是從上用不盡的顧師云汝作麼生奉持師喝云放下著和尚云再道看師喝便出到方丈和尚下座進方丈師禮拜云適來觸忤和尚和尚舉拂云汝且將去行持師接著便打一拂和尚云將為報恩耶師又打一拂便歸寮甲戌仲夏辭和尚回獅巖隱靜一日泉竭慮無水難以居衆在菴前大石上仰觀南畔壁巖之下懸松翠茂必有水焉攀藤刪棘而上果如其言就壁梘泉砌路得石巖間稍平處堪以寓目靜坐片時謂龔居士曰此處可結團瓢士曰和尚曰可某極力為之是秋重陽之日起基冬畢工移錫居之丙子夏本山同鰲江檀信奉侍御林公書請繼黃檗法席師慮德薄言微不宜應世力卻之衆等虔請再四似不能免姑許之巖下有側石如舟遊者以不平為嘆師云時節若至自然平矣一夜坐石上持大悲呪三遍默祝龍天此去黃檗其道大行為山增色此石可平為徵默坐炷香歸室次早黎明徒良哉報云奇怪奇怪石自已平師云不必説吾祝已驗乃名為自平石説銘為記曰匪石弗平我心不誠心既誠矣其石自平既平且誠吾道大行以此靈驗刊石為銘又一夕夢一老人長皓首荷甑負囊而入師云老老大大負纍若此不亦勞乎彼即放下出書幅單條並所負之物見贈而去醒為玄生侍者説者云斯乃吉兆必有見徵月終果法通尊使送大衣一領源流書幅一封以表法信丁丑仲冬至山開堂拈香以酬法乳之恩越明年開龍藏三閲春秋以答賜藏之恩庚辰正月八日建大殿越四載山門寮舍頗僃甲申春往金粟省覲和尚五月至天童掃塔孟冬應崇德福嚴寺請乙酉春通政馬公請住長樂龍泉寺丙戌玉融鄉紳并本山耆舊接回黃檗示衆語録十卷又録二卷雲濤集一册并行於世云右臨濟宗
